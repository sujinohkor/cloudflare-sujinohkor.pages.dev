<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSD AI Reader</title>
    <link rel="icon" type="image/png" href="/assets/LOGO-orange.png">
    
    <!-- 1. PSD 파서 라이브러리 (unpkg 대체 CDN으로 안정화) -->
    //<script src="https://unpkg.com/psd/dist/psd.min.js"></script>
    <script src="/codes/psd.min.js"></script>
    
    <!-- 2. AI(PDF 호환 데이터) 파서 라이브러리 (PDF.js) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        /* 1. Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #202020; color: #fff; transition: background 0.3s; }
        
        /* 2. Layout */
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { 
            width: 250px; height: 100vh; position: fixed; left: 0; top: 0; 
            background-color: #101010; padding: 20px; z-index: 1000; 
            display: flex; flex-direction: column; transition: transform 0.3s ease;
        }
        
        .main-content { 
            margin-left: 250px; padding: 40px; flex: 1; 
            display: flex; flex-direction: column; height: 100vh; gap: 20px; overflow: hidden; transition: 0.3s;
        }

        .workspace-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 10px;
            min-height: 0;
        }

        #file-name-label {
            color: #ff9e40;
            font-weight: bold;
        }

        /* 3. Components */
        .menu-btn, .theme-btn { 
            width: 100%; padding: 10px; margin-bottom: 10px; cursor: pointer;
            background: #202020; color: #ff9e40; border: 2px solid #ff9e40; 
            border-radius: 50px; font-weight: bold; transition: all 0.3s;
        }
        .menu-btn:hover { background: #ff9e40; color: #101010; }
        .theme-btn:hover { background-color: #FDF5E6; color: #F38020; border-color: #FDF5E6; }
        
        .content-mid { 
            flex: 1; border: 2px solid #ff9e40; border-radius: 16px; display: flex; overflow: auto; 
            padding: 20px; color: #888; font-family: 'Consolas', 'Courier New', 'Monaco', monospace, sans-serif; font-size: 1rem;
            cursor: pointer; transition: all 0.3s ease; user-select: none;
            flex-direction: column; align-items: center; justify-content: center; gap: 10px; text-align: center;
            position: relative;
        }
        .content-mid.dragover { background-color: rgba(255, 158, 64, 0.1); border-style: dashed; color: #ff9e40; }
        .content-mid.has-file {
            background-color: rgba(255, 158, 64, 0.05);
            padding: 10px;
        }

        #resultImg, #viewCanvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), 
                              linear-gradient(-45deg, #ccc 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #ccc 75%), 
                              linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
            background-color: #fff;
            display: none;
        }

        /* 4. Theme (Light Mode) */
        body.light-mode { background-color: #fff; }
        body.light-mode .sidebar { background-color: #FDF5E6; }
        body.light-mode .menu-btn, body.light-mode .theme-btn { background: #FDF5E6; color: #F38020; border-color: #F38020; }
        body.light-mode .menu-btn:hover { background: #F38020; color: #ffffff; border-color: #F38020; }
        body.light-mode .theme-btn:hover { background-color: #202020; color: #ff9e40; border-color: #202020; }
        body.light-mode .top-section h1, body.light-mode .top-section p { color: #202020; }
        body.light-mode .content-mid { color: #666; }
        body.light-mode .content-mid.has-file { background-color: rgba(243, 128, 32, 0.05); }
        body.light-mode .content-mid.dragover { background-color: rgba(243, 128, 32, 0.1); border-style: dashed; color: #f38020; }
        body.light-mode .menu-toggle-btn { color: #000000; }
        body.light-mode #file-name-label { color: #F38020; }

        /* 5. Mobile Responsive */
        .menu-toggle-btn { display: none; position: fixed; bottom: 20px; left: 20px; z-index: 2000; padding: 10px 15px; background: #ff9e40; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
        
        @media (max-width: 600px) {
            .menu-toggle-btn { display: block; color: #ffffff; }
            .sidebar { transform: translateX(-250px); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; width: 100%; max-height: 100svh; flex: 1; display: flex; flex-direction: column; }
            .workspace-container { flex-direction: column; }
            .content-mid { flex: 1; }
        }
    </style>
</head>
<body>

<button class="menu-toggle-btn" onclick="toggleSidebar()">MENU</button>

<input type="file" id="file-selector" accept=".psd,.ai,image/*" style="display: none;">

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <button class="menu-btn" onclick="location.href='../index'">Home</button>
        <button id="theme-toggle" class="theme-btn">DAY / NIGHT</button>
        
        <div class="bottom-btns">
            <button class="menu-btn" onclick="uploadFile()">Upload</button>
            <button class="menu-btn" onclick="savePNG()">Save as PNG</button>
            <button class="menu-btn" onclick="resetAll()">Reset</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-section">
            <h1>PSD AI Reader</h1>
            <p id="status-desc">Upload a file below to view content.</p>
        </header>
        
        <div class="workspace-container">
            <label id="file-name-label">File name will be appeared here.</label>
            <section class="content-mid" id="drop-zone">
                <div id="default-ui">
                    <div style="font-size: 3rem;">🖼️</div>
                    <div>Drag & Drop a PSD, AI, or Image file here or click to upload.</div>
                </div>
                <img id="resultImg" alt="PSD 미리보기">
                <canvas id="viewCanvas"></canvas>
            </section>
        </div>
    </main>
</div>

<script>
    // PDF.js 워커 설정
    if (typeof pdfjsLib !== 'undefined') {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    }

    const sidebar = document.getElementById('sidebar');
    const dropZone = document.getElementById('drop-zone');
    const defaultUI = document.getElementById('default-ui');
    const fileSelector = document.getElementById('file-selector');
    const fileNameLabel = document.getElementById('file-name-label');
    const canvas = document.getElementById('viewCanvas');
    const resultImg = document.getElementById('resultImg');
    const ctx = canvas.getContext('2d');
    
    let loadedFile = null;

    function toggleSidebar() { sidebar.classList.toggle('active'); }
    document.getElementById('theme-toggle').addEventListener('click', () => { document.body.classList.toggle('light-mode'); });
    document.querySelector('.main-content').addEventListener('click', () => { if (sidebar.classList.contains('active')) { sidebar.classList.remove('active'); } });

    function setInitialUI() {
        dropZone.classList.remove('has-file');
        defaultUI.style.display = 'block';
        resultImg.style.display = 'none';
        canvas.style.display = 'none';
        resultImg.src = '';
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        fileNameLabel.innerText = 'File name will be appeared here.';
    }

    async function handleFile(file) {
        if (!file) return;

        loadedFile = file;
        const fileName = file.name.toLowerCase();
        
        defaultUI.style.display = 'none';
        resultImg.style.display = 'none';
        canvas.style.display = 'none';
        dropZone.classList.add('has-file');
        fileNameLabel.innerText = `${file.name} (분석 중...)`;

        try {
            if (fileName.endsWith('.psd')) {
                await renderPSD(file);
            } else if (fileName.endsWith('.ai')) {
                const arrayBuffer = await file.arrayBuffer();
                await renderAI(arrayBuffer, file.name);
            } else if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    resultImg.src = e.target.result;
                    resultImg.style.display = 'inline-block';
                    fileNameLabel.innerText = `${file.name}`;
                };
                reader.readAsDataURL(file);
            } else {
                fileNameLabel.innerText = '지원하지 않는 파일 형식입니다.';
            }
        } catch (err) {
            console.error('File Parsing Error:', err);
            fileNameLabel.innerText = `에러 발생: ${err.message || '파일을 읽을 수 없습니다.'}`;
        }
    }

    // 1. ArrayBuffer 방식으로 개선된 PSD 파싱 함수
    function renderPSD(file) {
        return new Promise((resolve, reject) => {
            fileNameLabel.innerText = `${file.name} (PSD 분석 중...)`;
            
            const PSDParser = window.PSD || (window.require && window.require('psd'));

            if (!PSDParser) {
                reject(new Error('PSD 라이브러리가 로드되지 않았습니다. 인터넷 연결을 확인하세요.'));
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const psd = new PSDParser(new Uint8Array(e.target.result));
                    psd.parse();
                    const image = psd.image.toPng();
                    
                    resultImg.src = image.src;
                    resultImg.style.display = 'inline-block';
                    fileNameLabel.innerText = `${file.name} (${psd.header.width} x ${psd.header.height} px)`;
                    resolve();
                } catch (err) {
                    reject(new Error('PSD 호환성 오류 (8bit RGB PSD만 지원됩니다)'));
                }
            };
            reader.onerror = () => reject(new Error('파일 읽기 실패'));
            reader.readAsArrayBuffer(file);
        });
    }

    // 2. AI 파일 렌더링
    async function renderAI(buffer, originalFileName) {
        fileNameLabel.innerText = `${originalFileName} (AI 분석 중...)`;

        if (typeof pdfjsLib === 'undefined') {
            throw new Error('PDF.js 라이브러리가 로드되지 않았습니다.');
        }

        const loadingTask = pdfjsLib.getDocument({ data: buffer });
        const pdf = await loadingTask.promise;
        
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 1.5 });

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        const renderContext = {
            canvasContext: ctx,
            viewport: viewport
        };

        await page.render(renderContext).promise;
        canvas.style.display = 'inline-block';
        fileNameLabel.innerText = `${originalFileName} (${Math.round(viewport.width)} x ${Math.round(viewport.height)} px)`;
    }

    function savePNG() {
        if (!loadedFile) {
            alert('저장할 파일이 없습니다.');
            return;
        }

        let downloadUrl = '';

        if (canvas.style.display !== 'none' && canvas.width > 0) {
            downloadUrl = canvas.toDataURL('image/png');
        } else if (resultImg.style.display !== 'none' && resultImg.src) {
            if (resultImg.src.startsWith('data:image/png')) {
                downloadUrl = resultImg.src;
            } else {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = resultImg.naturalWidth || resultImg.width;
                tempCanvas.height = resultImg.naturalHeight || resultImg.height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(resultImg, 0, 0);
                downloadUrl = tempCanvas.toDataURL('image/png');
            }
        }

        if (!downloadUrl) {
            alert('이미지 데이터를 추출할 수 없습니다.');
            return;
        }

        const link = document.createElement('a');
        link.download = 'PsdAiReader.png';
        link.href = downloadUrl;
        link.click();
    }

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
    dropZone.addEventListener('drop', (e) => { 
        e.preventDefault(); 
        dropZone.classList.remove('dragover'); 
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
            handleFile(e.dataTransfer.files[0]); 
        }
    });
    dropZone.addEventListener('click', () => { fileSelector.click(); });

    function uploadFile() { fileSelector.click(); }

    fileSelector.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
            handleFile(e.target.files[0]);
            e.target.value = ''; 
        }
    });

    function resetAll() {
        loadedFile = null;
        setInitialUI();
    }

    setInitialUI();
</script>
</body>
</html>
