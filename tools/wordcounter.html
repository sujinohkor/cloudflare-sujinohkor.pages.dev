<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글자 수 및 문단 수 세기</title>
    <style>
        body { 
            font-family: 'Consolas', 'Malgun Gothic', monospace; 
            padding: 20px; 
            line-height: 1.6;
            display: flex;
            justify-content: center;
        }
        .main-container {
            width: 100%;
            max-width: 1000px;
        }
        /* 제목과 버튼을 정렬하는 스타일 */
        .title-area {
            display: flex;
            align-items: center;
            justify-content: space-between; /* 추가: 양 끝 배치 */
            width: 100%;
            gap: 15px;
        }
        textarea { 
            width: 100%; 
            height: 300px; 
            padding: 15px; 
            box-sizing: border-box; 
            font-family: 'Consolas', 'Malgun Gothic', monospace;
            font-size: 14px;
            resize: vertical; 
        }
        .controls { 
            margin-top: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap;
            gap: 10px;
        }
        .result { font-weight: bold; }
        .topbuttons { display: flex; gap: 10px; }
        .buttons { display: flex; gap: 10px; }
        button { padding: 8px 16px; cursor: pointer; }

        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- 제목과 버튼 영역 -->
        <div class="title-area">
            <div class="subtitle">
              <h2>글자 수 및 문단 수 세기</h2>
            </div>
            <div class="topbuttons">
              <button id="homeBtn" onclick="location.href='index.html'">집으로 가기</button>
            </div>
        </div>
        
        <textarea id="textInput" placeholder="내용을 입력하세요."></textarea>
        
        <div class="controls">
            <div class="result">
                공백 포함: <span id="withSpace">0</span>자 | 
                공백 제외: <span id="withoutSpace">0</span>자 | 
                문단 수: <span id="paragraphCount">0</span>개
            </div>
            <div class="buttons">
                <button id="copyBtn">복사하기</button>
                <button id="saveBtn">저장(.txt)</button>
                <button id="resetBtn">초기화</button>
            </div>
        </div>
    </div>
    
    <script>
        const textarea = document.getElementById('textInput');
        const withSpace = document.getElementById('withSpace');
        const withoutSpace = document.getElementById('withoutSpace');
        const paragraphCount = document.getElementById('paragraphCount');
        const saveBtn = document.getElementById('saveBtn');
        const resetBtn = document.getElementById('resetBtn');
        const copyBtn = document.getElementById('copyBtn'); // 추가된 버튼

        textarea.addEventListener('input', updateCounts);

        // 복사하기 기능
        copyBtn.addEventListener('click', () => {
            textarea.select();
            document.execCommand('copy');
            alert("텍스트가 복사되었습니다.");
        });

        resetBtn.addEventListener('click', () => {
            textarea.value = '';
            updateCounts();
        });

        saveBtn.addEventListener('click', () => {
            const text = textarea.value;
            if (!text) { alert("저장할 내용이 없습니다."); return; }

            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            const fileName = `mytext-${year}-${month}-${day}-${hours}-${minutes}-${seconds}.txt`;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(url);
        });

        function updateCounts() {
            const val = textarea.value;
            withSpace.textContent = val.length;
            withoutSpace.textContent = val.replace(/(\s*)/g, "").length;
            const paragraphs = val.split('\n').filter(p => p.trim() !== '');
            paragraphCount.textContent = paragraphs.length;
        }
    </script>
</body>
</html>
