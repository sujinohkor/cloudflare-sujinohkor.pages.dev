<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">글자 수 세기</title>
    <style>
        body { 
            font-family: 'Consolas', 'Malgun Gothic', monospace; 
            padding: 20px; 
            line-height: 1.6;
            display: flex;
            justify-content: center;
            background-color: #FDF5E6;
        }
        .main-container {
            width: 100%;
            max-width: 1000px;
        }
        .title-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 15px;
        }
        textarea { 
            width: 100%; 
            height: 300px; 
            padding: 20px; 
            box-sizing: border-box; 
            font-family: 'Consolas', 'Malgun Gothic', monospace;
            font-size: 14px;
            resize: vertical; 
            border-radius: 20px; 
            border: 2px solid #ddd; 
            outline: none; 
            transition: border-color 0.3s; 
        }
        textarea:focus {
            border-color: #ff9e40; 
            box-shadow: 0 0 8px rgba(255, 158, 64, 0.2); 
        }
        .controls { 
            margin-top: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap;
            gap: 10px;
        }
        .result {
            font-weight: bold;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        #withSpace, #withoutSpace, #wordCount, #paragraphCount {
            color: #F38020;
        }
        .topbuttons { display: flex; gap: 10px; }
        .buttons { display: flex; gap: 10px; }
        button { padding: 8px 16px; cursor: pointer; border-radius: 10px; border: none; background: #ddd; }
        button:hover { background: #ccc; }

        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .result { display: block; width: 100%; }
            .result div { display: block; margin-bottom: 5px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="title-area">
            <div class="subtitle">
                <h2 id="titleText">글자 수 세기</h2>
            </div>
            <div class="topbuttons">
                <button id="homeBtn" onclick="location.href='../index.html'">집으로 가기</button>
            </div>
        </div>
        
        <textarea id="textInput" placeholder="내용을 입력하세요."></textarea>
        
        <div class="controls">
            <div class="result">
                <div><span id="labelWithSpace">공백 포함</span>: <span id="withSpace">0</span></div>
                <div><span id="labelWithoutSpace">공백 제외</span>: <span id="withoutSpace">0</span></div>
                <div><span id="labelWord">단어 수</span>: <span id="wordCount">0</span></div>
                <div><span id="labelParagraph">문단 수</span>: <span id="paragraphCount">0</span></div>
            </div>
            <div class="buttons">
                <button id="copyBtn">복사하기</button>
                <button id="saveBtn">저장(.txt)</button>
                <button id="resetBtn">초기화</button>
            </div>
        </div>
    </div>
    
    <script>
        const textarea = document.getElementById('textInput');
        const withSpace = document.getElementById('withSpace');
        const withoutSpace = document.getElementById('withoutSpace');
        const wordCount = document.getElementById('wordCount');
        const paragraphCount = document.getElementById('paragraphCount');
        const saveBtn = document.getElementById('saveBtn');
        const resetBtn = document.getElementById('resetBtn');
        const copyBtn = document.getElementById('copyBtn');

        textarea.addEventListener('input', updateCounts);

        function updateCounts() {
            const val = textarea.value.trim();
            withSpace.textContent = textarea.value.length;
            withoutSpace.textContent = textarea.value.replace(/(\s*)/g, "").length;
            const words = val ? val.split(/\s+/).filter(w => w.length > 0) : [];
            wordCount.textContent = words.length;
            const paragraphs = textarea.value.split('\n').filter(p => p.trim() !== '');
            paragraphCount.textContent = paragraphs.length;
        }

        // 다국어 처리 로직[cite: 1]
        const userLang = navigator.language || navigator.userLanguage;
        if (!userLang.startsWith('ko')) {
            const titleText = "Word Counter";
            document.getElementById('pageTitle').textContent = titleText; // 탭 제목 업데이트[cite: 1]
            document.getElementById('titleText').textContent = titleText;
            document.getElementById('homeBtn').textContent = "Go Home";
            textarea.placeholder = "Enter text here";
            document.getElementById('labelWithSpace').textContent = "Chars (inc. spaces)";
            document.getElementById('labelWithoutSpace').textContent = "Chars (excl. spaces)";
            document.getElementById('labelWord').textContent = "Words";
            document.getElementById('labelParagraph').textContent = "Paragraphs";
            copyBtn.textContent = "Copy";
            saveBtn.textContent = "Save (.txt)";
            resetBtn.textContent = "Reset";
        }

        copyBtn.addEventListener('click', () => {
            textarea.select();
            document.execCommand('copy');
            alert(userLang.startsWith('ko') ? "텍스트가 복사되었습니다." : "Text copied.");
        });

        resetBtn.addEventListener('click', () => {
            textarea.value = '';
            updateCounts();
        });

        saveBtn.addEventListener('click', () => {
            const text = textarea.value;
            if (!text) { alert(userLang.startsWith('ko') ? "저장할 내용이 없습니다." : "No text to save."); return; }
            const now = new Date();
            const fileName = `mytext-${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}-${String(now.getHours()).padStart(2, '0')}-${String(now.getMinutes()).padStart(2, '0')}-${String(now.getSeconds()).padStart(2, '0')}.txt`;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
