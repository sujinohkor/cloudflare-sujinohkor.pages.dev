<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글자 수 및 문단 수 세기</title>
    <style>
        body { 
            font-family: 'Consolas', 'Malgun Gothic', monospace; 
            padding: 20px; 
            line-height: 1.6;
            display: flex;
            justify-content: center;
        }
        .main-container {
            width: 100%;
            max-width: 1000px;
        }
        .title-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 15px;
        }
        textarea { 
            width: 100%; 
            height: 300px; 
            padding: 15px; 
            box-sizing: border-box; 
            font-family: 'Consolas', 'Malgun Gothic', monospace;
            font-size: 14px;
            resize: vertical; 
        }
        .controls { 
            margin-top: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap;
            gap: 10px;
        }
        /* 결과 표시 영역 CSS 수정 */
        .result {
            font-weight: bold;
            display: flex; /* 데스크톱에서는 가로 정렬 */
            flex-wrap: wrap;
            gap: 10px;
        }
        /* 구분선 제거 및 각 항목을 블록으로 처리 */
        .result span.sep {
            display: none; /* 데스크톱에서도 구분선 대신 gap 사용 */
        }
        .topbuttons { display: flex; gap: 10px; }
        .buttons { display: flex; gap: 10px; }
        button { padding: 8px 16px; cursor: pointer; }

        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
                align-items: stretch; /* 요소를 가로로 꽉 차게 */
            }
    
            /* .result를 블록 요소로 명시적으로 변경 */
            .result {
                display: block; 
                width: 100%;
            }
    
            /* 각 항목을 아래로 한 줄씩 배치 */
            .result div {
               display: block;
               margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="title-area">
            <div class="subtitle">
              <h2 id="titleText">글자 수 세기</h2>
            </div>
            <div class="topbuttons">
              <button id="homeBtn" onclick="location.href='../index.html'">집으로 가기</button>
            </div>
        </div>
        
        <textarea id="textInput" placeholder="내용을 입력하세요."></textarea>
        
        <div class="controls">
            <div class="result">
                <div><span id="labelWithSpace">공백 포함</span>: <span id="withSpace">0</span></div>
                <div><span id="labelWithoutSpace">공백 제외</span>: <span id="withoutSpace">0</span></div>
                <div><span id="labelWord">단어 수</span>: <span id="wordCount">0</span></div>
                <div><span id="labelParagraph">문단 수</span>: <span id="paragraphCount">0</span></div>
            </div>
            <div class="buttons">
                <button id="copyBtn">복사하기</button>
                <button id="saveBtn">저장(.txt)</button>
                <button id="resetBtn">초기화</button>
            </div>
        </div>
    </div>
    
    <script>
        const textarea = document.getElementById('textInput');
        const withSpace = document.getElementById('withSpace');
        const withoutSpace = document.getElementById('withoutSpace');
        const wordCount = document.getElementById('wordCount');
        const paragraphCount = document.getElementById('paragraphCount');
        const saveBtn = document.getElementById('saveBtn');
        const resetBtn = document.getElementById('resetBtn');
        const copyBtn = document.getElementById('copyBtn');

        textarea.addEventListener('input', updateCounts);

        function updateCounts() {
            const val = textarea.value.trim();
            
            // 글자 수
            withSpace.textContent = textarea.value.length;
            
            // 공백 제외 글자 수
            withoutSpace.textContent = textarea.value.replace(/(\s*)/g, "").length;
            
            // 단어 수 (공백 기준으로 나눈 뒤 빈 문자열 필터링)
            const words = val ? val.split(/\s+/).filter(w => w.length > 0) : [];
            wordCount.textContent = words.length;
            
            // 문단 수
            const paragraphs = textarea.value.split('\n').filter(p => p.trim() !== '');
            paragraphCount.textContent = paragraphs.length;
        }

        // 언어 설정 로직 (생략된 코드 수정 포함)
        const userLang = navigator.language || navigator.userLanguage;
        if (!userLang.startsWith('ko')) {
            document.getElementById('titleText').textContent = "Word Counter";
            document.getElementById('homeBtn').textContent = "Go Home";
            textarea.placeholder = "Enter text here";
            document.getElementById('labelWithSpace').textContent = "Chars (inc. spaces)";
            document.getElementById('labelWithoutSpace').textContent = "Chars (excl. spaces)";
            document.getElementById('labelWord').textContent = "Words";
            document.getElementById('labelParagraph').textContent = "Paragraphs";
            document.getElementById('copyBtn').textContent = "Copy";
            document.getElementById('saveBtn').textContent = "Save (.txt)";
            document.getElementById('resetBtn').textContent = "Reset";
        }

        copyBtn.addEventListener('click', () => {
            textarea.select();
            document.execCommand('copy');
            alert("텍스트가 복사되었습니다.");
        });

        resetBtn.addEventListener('click', () => {
            textarea.value = '';
            updateCounts();
        });

        saveBtn.addEventListener('click', () => {
            const text = textarea.value;
            if (!text) { alert("저장할 내용이 없습니다."); return; }
            const now = new Date();
            const fileName = `mytext-${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}-${String(now.getHours()).padStart(2, '0')}-${String(now.getMinutes()).padStart(2, '0')}-${String(now.getSeconds()).padStart(2, '0')}.txt`;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
