<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글자 수 및 문단 수 세기</title>
    <style>
        body { 
            font-family: 'Consolas', 'Malgun Gothic', monospace; 
            padding: 20px; 
            line-height: 1.6;
            display: flex;
            justify-content: center;
        }
        .main-container {
            width: 100%;
            max-width: 1000px;
        }
        textarea { 
            width: 100%; 
            height: 300px; 
            padding: 15px; 
            box-sizing: border-box; 
            font-family: 'Consolas', 'Malgun Gothic', monospace;
            font-size: 14px;
        }
        .controls { 
            margin-top: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap;
            gap: 10px;
        }
        .result { font-weight: bold; }
        .buttons { display: flex; gap: 10px; }
        button { padding: 8px 16px; cursor: pointer; }

        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h2>글자 수 및 문단 수 세기</h2>
        <textarea id="textInput" placeholder="내용을 입력하세요."></textarea>
        
        <div class="controls">
            <div class="result">
                공백 포함: <span id="withSpace">0</span>자 | 
                공백 제외: <span id="withoutSpace">0</span>자 | 
                문단 수: <span id="paragraphCount">0</span>개
            </div>
            <div class="buttons">
                <button id="saveBtn">저장(.txt)</button>
                <button id="resetBtn">초기화</button>
            </div>
        </div>
    </div>
    
    <script>
        const textarea = document.getElementById('textInput');
        const withSpace = document.getElementById('withSpace');
        const withoutSpace = document.getElementById('withoutSpace');
        const paragraphCount = document.getElementById('paragraphCount');
        const saveBtn = document.getElementById('saveBtn');
        const resetBtn = document.getElementById('resetBtn');

        textarea.addEventListener('input', updateCounts);

        // 초기화 버튼
        resetBtn.addEventListener('click', () => {
            textarea.value = '';
            updateCounts();
        });

        // 저장 버튼: Blob 객체를 사용해 파일 생성 및 다운로드
        saveBtn.addEventListener('click', () => {
            const text = textarea.value;
            if (!text) {
                alert("저장할 내용이 없습니다.");
                return;
            }
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mytext.txt'; // 기본 파일명
            a.click();
            URL.revokeObjectURL(url);
        });

        function updateCounts() {
            const val = textarea.value;
            withSpace.textContent = val.length;
            withoutSpace.textContent = val.replace(/(\s*)/g, "").length;
            const paragraphs = val.split('\n').filter(p => p.trim() !== '');
            paragraphCount.textContent = paragraphs.length;
        }
    </script>
</body>
</html>
