<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>대표 색상 추출기</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background-color: #121212; color: #fff; }
    .container { max-width: 600px; margin: 0 auto; }
    .controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
    #toggleBtn { padding: 8px 16px; background-color: #ff9800; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    #toggleBtn.off { background-color: #555; color: #fff; }
    #preview { max-width: 100%; height: auto; border-radius: 8px; }
    .palette { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
    .color-box {
      width: 80px; height: 80px; border-radius: 6px;
      display: flex; align-items: flex-end; justify-content: center;
      padding: 5px; font-size: 12px; font-weight: bold; color: #fff;
      text-shadow: 0 0 3px #000; border: 1px solid #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>대표 색상 추출기</h2>

    <div class="controls">
      <input type="file" id="imageInput" accept="image/*">
      <button id="toggleBtn">무채색 제외: ON</button>
    </div>

    <img id="preview" alt="업로드 이미지 미리보기" style="display:none;">
    <div class="palette" id="palette"></div>
  </div>

  <script>
    const imageInput = document.getElementById('imageInput');
    const preview = document.getElementById('preview');
    const paletteContainer = document.getElementById('palette');
    const toggleBtn = document.getElementById('toggleBtn');

    // 무채색 제외 토글 상태 (기본값: true)
    let filterAchromatic = true;

    // 무채색(검은색, 흰색, 회색) 판별 함수
    function isAchromatic(r, g, b, threshold = 15) {
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      // R, G, B 값의 차이가 작을수록 무채색에 가까움
      return (max - min) <= threshold;
    }

    // 토글 버튼 클릭 이벤트
    toggleBtn.addEventListener('click', () => {
      filterAchromatic = !filterAchromatic;
      if (filterAchromatic) {
        toggleBtn.textContent = '무채색 제외: ON';
        toggleBtn.classList.remove('off');
      } else {
        toggleBtn.textContent = '무채색 제외: OFF';
        toggleBtn.classList.add('off');
      }

      // 이미지가 로드된 상태라면 즉시 재분석
      if (preview.src && preview.style.display !== 'none') { extractColors(); }
    });

    imageInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        preview.src = event.target.result;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    });

    preview.addEventListener('load', extractColors);

    // 색상 추출 및 렌더링 함수
    function extractColors() {
      paletteContainer.innerHTML = '';

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      const scale = Math.min(150 / preview.naturalWidth, 150 / preview.naturalHeight, 1);
      canvas.width = Math.floor(preview.naturalWidth * scale);
      canvas.height = Math.floor(preview.naturalHeight * scale);

      ctx.drawImage(preview, 0, 0, canvas.width, canvas.height);
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

      const colorCounts = {};

      for (let i = 0; i < imgData.length; i += 4) {
        const alpha = imgData[i + 3];
        if (alpha < 128) continue; // 투명 영역 무시

        const quant = 8;
        const r = Math.round(imgData[i] / quant) * quant;
        const g = Math.round(imgData[i + 1] / quant) * quant;
        const b = Math.round(imgData[i + 2] / quant) * quant;

        const clamp = (v) => Math.min(255, Math.max(0, v));
        const finalR = clamp(r);
        const finalG = clamp(g);
        const finalB = clamp(b);

        // 무채색 제외 옵션이 켜져있고 해당 픽셀이 무채색인 경우 스킵
        if (filterAchromatic && isAchromatic(finalR, finalG, finalB)) { continue; }

        const hex = "#" + [finalR, finalG, finalB]
          .map(x => x.toString(16).padStart(2, '0'))
          .join('');

        colorCounts[hex] = (colorCounts[hex] || 0) + 1;
      }

      const sortedColors = Object.keys(colorCounts)
        .sort((a, b) => colorCounts[b] - colorCounts[a])
        .slice(0, 10);

      sortedColors.forEach(hex => {
        const box = document.createElement('div');
        box.className = 'color-box';
        box.style.backgroundColor = hex;
        box.textContent = hex;
        paletteContainer.appendChild(box);
      });
    }

// 두 색상(Hex) 간의 시각적 거리를 계산하는 함수
function getColorDistance(hex1, hex2) {
  const r1 = parseInt(hex1.slice(1, 3), 16);
  const g1 = parseInt(hex1.slice(3, 5), 16);
  const b1 = parseInt(hex1.slice(5, 7), 16);

  const r2 = parseInt(hex2.slice(1, 3), 16);
  const g2 = parseInt(hex2.slice(3, 5), 16);
  const b2 = parseInt(hex2.slice(5, 7), 16);

  // RGB 가중치 적용 유클리드 거리 (사람의 눈에 맞춘 거리 계산식)
  return Math.sqrt(
    0.3 * Math.pow(r1 - r2, 2) +
    0.59 * Math.pow(g1 - g2, 2) +
    0.11 * Math.pow(b1 - b2, 2)
  );
}

function extractColors() {
  paletteContainer.innerHTML = '';

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  const scale = Math.min(150 / preview.naturalWidth, 150 / preview.naturalHeight, 1);
  canvas.width = Math.floor(preview.naturalWidth * scale);
  canvas.height = Math.floor(preview.naturalHeight * scale);

  ctx.drawImage(preview, 0, 0, canvas.width, canvas.height);
  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

  const colorCounts = {};

  for (let i = 0; i < imgData.length; i += 4) {
  const alpha = imgData[i + 3];
  if (alpha < 128) continue;

  // 양자화 과정(quant)을 제거하고 원본 RGB 수치 그대로 사용
  const finalR = imgData[i];
  const finalG = imgData[i + 1];
  const finalB = imgData[i + 2];

  if (filterAchromatic && isAchromatic(finalR, finalG, finalB)) { continue; }

  const hex = "#" + [finalR, finalG, finalB]
    .map(x => x.toString(16).padStart(2, '0'))
    .join('');

  colorCounts[hex] = (colorCounts[hex] || 0) + 1;
}


  // 빈도수 높은 순으로 1차 정렬
  const sortedCandidateColors = Object.keys(colorCounts)
    .sort((a, b) => colorCounts[b] - colorCounts[a]);

  const finalPalette = [];
  const minDistanceThreshold = 35; // 색상 간 최소 거리 임계값 (높을수록 더 서로 다른 색만 뽑힘)

  // 유사한 색상을 걸러내며 상위 10개 선택
  for (const hex of sortedCandidateColors) {
    if (finalPalette.length >= 10) break;

    // 이미 선택된 색상들과 유사한지 검사
    const isTooSimilar = finalPalette.some(selectedHex => {
      return getColorDistance(hex, selectedHex) < minDistanceThreshold;
    });

    // 충분히 다른 색상일 때만 최종 팔레트에 추가
    if (!isTooSimilar) { finalPalette.push(hex); }
  }

  // 화면 출력
  finalPalette.forEach(hex => {
    const box = document.createElement('div');
    box.className = 'color-box';
    box.style.backgroundColor = hex;
    box.textContent = hex;
    paletteContainer.appendChild(box);
  });
}

  </script>
</body>
</html>
