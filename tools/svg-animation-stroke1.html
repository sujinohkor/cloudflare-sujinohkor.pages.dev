<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Text to SVG Grid</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #000; color: white; padding-top: 50px; margin: 0; }
        
        /* 헤더 컨테이너: 가로로 꽉 채우고 요소 배치 */
        .header-container { 
            display: flex; 
            width: 800px; /* SVG 너비와 동일하게 설정 */
            align-items: center; 
            justify-content: space-between;
            margin-bottom: 20px;
        }

        /* 입력창을 가운데 정렬하기 위한 트릭: 빈 div를 이용해 균형 맞춤 */
        .spacer { width: 80px; } 

        #canvas-svg { 
            border: 3px solid #333; 
            border-radius: 20px; 
            background: #000;
        }
        
        input { padding: 10px; width: 300px; text-align: center; }
        
        button { padding: 10px 20px; cursor: pointer; background: #333; color: white; border: 1px solid #555; border-radius: 5px; }
        button:hover { background: #444; }
        
        .dot { transition: fill 0.5s ease; }
    </style>
</head>
<body>

    <div class="header-container">
        <!-- 왼쪽 균형을 위한 빈 공간 -->
        <div class="spacer"></div>
        
        <!-- 중앙 입력창 -->
        <input type="text" id="textInput" placeholder="글자를 입력하세요" maxlength="1">
        
        <!-- 오른쪽 버튼 -->
        <button onclick="location.href='index.html'">집으로</button>
    </div>

    <svg id="canvas-svg" width="800" height="400" viewBox="0 0 800 400"></svg>

    <script>
        const svg = document.getElementById('canvas-svg');
        const input = document.getElementById('textInput');
        
        const rows = 20;
        const cols = 40;
        const size = 15;

        // 격자 초기화
        const circles = [];
        const startX = (800 - (cols - 1) * size) / 2;
        const startY = (400 - (rows - 1) * size) / 2;

        for (let i = 0; i < rows; i++) {
            for (let j = 0; j < cols; j++) {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", startX + j * size);
                circle.setAttribute("cy", startY + i * size);
                circle.setAttribute("r", "3");
                circle.setAttribute("fill", "#21252a");
                circle.classList.add('dot');
                svg.appendChild(circle);
                circles.push(circle);
            }
        }

        // 텍스트 비트맵 변환
        input.addEventListener('input', (e) => {
            const text = e.target.value;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = cols;
            canvas.height = rows;

            ctx.fillStyle = 'white';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, cols / 2, rows / 2);

            const imageData = ctx.getImageData(0, 0, cols, rows).data;

            for (let i = 0; i < rows * cols; i++) {
                const alpha = imageData[i * 4 + 3];
                circles[i].setAttribute("fill", alpha > 128 ? "#ffffff" : "#21252a");
            }
        });
    </script>
</body>
</html>
