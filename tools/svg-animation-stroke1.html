<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- title 태그에 id 추가 -->
    <title id="pageTitle">Text to SVG Grid</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #000; color: white; padding-top: 50px; margin: 0; }
        
        .header-container { 
            display: flex; 
            width: 800px; 
            align-items: center; 
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .spacer { width: 80px; } 

        #canvas-svg { 
            border: 3px solid #333; 
            border-radius: 20px; 
            background: #000;
        }
        
        input { 
            padding: 10px 20px; 
            width: 300px; 
            text-align: center; 
            border-radius: 20px; 
            border: 1px solid #555; 
            background: #111; 
            color: white; 
        }
        
        button { 
            padding: 10px 20px; 
            cursor: pointer; 
            background: #333; 
            color: white; 
            border: 1px solid #555; 
            border-radius: 20px; 
        }
        button:hover { background: #444; }
        
        .dot { transition: fill 0.5s ease; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="spacer"></div>
        <input type="text" id="textInput" maxlength="1">
        <button onclick="location.href='../index.html'" id="homeBtn">집으로</button>
    </div>

    <svg id="canvas-svg" width="800" height="400" viewBox="0 0 800 400"></svg>

    <script>
        // 언어 설정 로직
        const isKorean = navigator.language.startsWith('ko');
        const pageTitle = document.getElementById('pageTitle');
        const textInput = document.getElementById('textInput');
        const homeBtn = document.getElementById('homeBtn');

        if (isKorean) {
            pageTitle.innerText = "텍스트 SVG 그리드";
            textInput.placeholder = "글자를 입력하세요";
            homeBtn.innerText = "집으로";
        } else {
            pageTitle.innerText = "Text to SVG Grid";
            textInput.placeholder = "Enter a character";
            homeBtn.innerText = "Go Home";
        }

        const svg = document.getElementById('canvas-svg');
        const rows = 20, cols = 40, size = 15;
        const circles = [];
        const startX = (800 - (cols - 1) * size) / 2;
        const startY = (400 - (rows - 1) * size) / 2;

        for (let i = 0; i < rows; i++) {
            for (let j = 0; j < cols; j++) {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", startX + j * size);
                circle.setAttribute("cy", startY + i * size);
                circle.setAttribute("r", "3");
                circle.setAttribute("fill", "#21252a");
                circle.classList.add('dot');
                svg.appendChild(circle);
                circles.push(circle);
            }
        }

        textInput.addEventListener('input', (e) => {
            const text = e.target.value;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = cols;
            canvas.height = rows;

            ctx.fillStyle = 'white';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, cols / 2, rows / 2);

            const imageData = ctx.getImageData(0, 0, cols, rows).data;

            for (let i = 0; i < rows * cols; i++) {
                const alpha = imageData[i * 4 + 3];
                circles[i].setAttribute("fill", alpha > 128 ? "#ffffff" : "#21252a");
            }
        });
    </script>
</body>
</html>
