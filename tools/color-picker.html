<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #202020; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .editor-container { display: flex; gap: 20px; align-items: flex-start; }
        
        /* 1. 컬러 필드(좌) 및 미리보기(중) */
        #colorField { width: 300px; height: 300px; cursor: crosshair; border: 1px solid #444; }
        #previewBox { width: 50px; height: 300px; border: 1px solid #444; }
        
        /* 2. Hue 슬라이더(우) */
        #hueSlider { width: 30px; height: 300px; cursor: pointer; border: 1px solid #444; }
        
        /* 3. 입력 폼 */
        .controls { display: flex; flex-direction: column; gap: 10px; width: 140px; }
        .input-row { display: flex; align-items: center; justify-content: space-between; }
        input { background: #3c3c3c; border: 1px solid #555; color: white; padding: 6px; width: 80px; }
    </style>
</head>
<body>

<div class="editor-container">
    <canvas id="colorField" width="300" height="300"></canvas>
    <div id="previewBox"></div>
    <canvas id="hueSlider" width="30" height="300"></canvas>
    
    <div class="controls">
        <input type="text" id="hex" value="#05360E" style="width:120px">
        <div class="input-row">R <input type="number" id="r" value="5"></div>
        <div class="input-row">G <input type="number" id="g" value="54"></div>
        <div class="input-row">B <input type="number" id="b" value="14"></div>
    </div>
</div>

<script>
    const field = document.getElementById('colorField');
    const ctx = field.getContext('2d', {willReadFrequently: true});
    const slider = document.getElementById('hueSlider');
    const sCtx = slider.getContext('2d');
    const preview = document.getElementById('previewBox');

    // Hue 슬라이더 그리기
    function drawHue() {
        let grad = sCtx.createLinearGradient(0, 0, 0, 300);
        for(let i=0; i<=6; i++) grad.addColorStop(i/6, `hsl(${i*60}, 100%, 50%)`);
        sCtx.fillStyle = grad; sCtx.fillRect(0, 0, 30, 300);
    }

    // 컬러 필드 그리기 (선택된 Hue 반영)
    function drawField(hue) {
        ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
        ctx.fillRect(0, 0, 300, 300);
        let gradW = ctx.createLinearGradient(0, 0, 300, 0);
        gradW.addColorStop(0, '#fff'); gradW.addColorStop(1, 'transparent');
        ctx.fillStyle = gradW; ctx.fillRect(0, 0, 300, 300);
        let gradB = ctx.createLinearGradient(0, 0, 0, 300);
        gradB.addColorStop(0, 'transparent'); gradB.addColorStop(1, '#000');
        ctx.fillStyle = gradB; ctx.fillRect(0, 0, 300, 300);
    }

    function updateColor(x, y) {
        const data = ctx.getImageData(x, y, 1, 1).data;
        document.getElementById('r').value = data[0];
        document.getElementById('g').value = data[1];
        document.getElementById('b').value = data[2];
        const hex = '#' + ((1<<24)+(data[0]<<16)+(data[1]<<8)+data[2]).toString(16).slice(1).toUpperCase();
        document.getElementById('hex').value = hex;
        preview.style.backgroundColor = hex;
    }

    drawHue(); drawField(0);

    // 이벤트
    slider.addEventListener('click', (e) => {
        const h = (e.offsetY / 300) * 360;
        drawField(h);
    });

    field.addEventListener('click', (e) => updateColor(e.offsetX, e.offsetY));
</script>
</body>
</html>
