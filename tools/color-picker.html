<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #202020; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 20px; }
        .window { background: #2d2d2d; padding: 20px; border-radius: 8px; width: 500px; }
        
        /* 메인 영역 */
        .main-area { display: flex; gap: 15px; margin-bottom: 20px; }
        #sbBox { width: 250px; height: 250px; cursor: crosshair; }
        #preview { width: 50px; height: 250px; border-radius: 4px; }
        #hueSlider { width: 30px; height: 250px; cursor: pointer; }
        
        /* 우측 입력창 */
        .inputs { display: flex; flex-direction: column; gap: 10px; width: 120px; }
        input { background: #3c3c3c; border: 1px solid #555; color: white; padding: 8px; }
        
        /* 팔레트 영역 */
        .palette-area { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .swatch-grid { display: grid; grid-template-columns: repeat(8, 25px); gap: 5px; }
        .swatch { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; }
        
        /* 하단 버튼 */
        .footer { display: flex; gap: 10px; }
        button { flex: 1; padding: 10px; cursor: pointer; border: none; }
        .confirm { background: #ff8c69; }
    </style>
</head>
<body>

<div class="window">
    <h3>색 편집</h3>
    <div class="main-area">
        <canvas id="sbBox" width="250" height="250"></canvas>
        <div id="preview"></div>
        <canvas id="hueSlider" width="30" height="250"></canvas>
        <div class="inputs">
            <input type="text" id="hex" value="#05360E">
            <input type="number" id="r" value="5">
            <input type="number" id="g" value="54">
            <input type="number" id="b" value="14">
        </div>
    </div>

    <div class="palette-area">
        <div>
            <div>기본 색</div>
            <div class="swatch-grid" id="basicPalette"></div>
        </div>
        <div>
            <div>사용자 지정 색</div>
            <div class="swatch-grid" id="customPalette"></div>
        </div>
    </div>

    <div class="footer">
        <button class="confirm">확인</button>
        <button>취소</button>
    </div>
</div>

<script>
    // 1. 팔레트 생성
    const basic = document.getElementById('basicPalette');
    const colors = ['#f88', '#f00', '#844', '#800', '#400', '#8ff', '#0ff', '#88f', '#00f', '#008'];
    colors.forEach(c => {
        const s = document.createElement('div');
        s.className = 'swatch'; s.style.backgroundColor = c;
        basic.appendChild(s);
    });

    // 2. 캔버스 로직 (생략: 이전과 동일한 로직을 적용하면 됩니다)
    // 윈도우 스타일의 '색 편집'은 내부적으로 마우스 좌표를 추적해 실시간 업데이트하는 방식입니다.
    console.log("윈도우 그림판 UI 구조 구현 완료");
</script>
</body>
</html>
