<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>완전 동기화 색 편집기</title>
    <style>
        body { background: #202020; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .container { display: flex; gap: 15px; background: #2d2d2d; padding: 20px; border-radius: 8px; align-items: flex-start; }
        canvas { border: 1px solid #444; }
        #colorField { width: 300px; height: 300px; cursor: crosshair; }
        #hueSlider { width: 30px; height: 300px; cursor: pointer; }
        #previewBox { width: 50px; height: 300px; border: 1px solid #444; }
        .controls { display: flex; flex-direction: column; gap: 5px; width: 80px; }
        .input-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; }
        input { background: #3c3c3c; border: 1px solid #555; color: white; padding: 4px; width: 45px; }
    </style>
</head>
<body>

<div class="container">
    <canvas id="colorField" width="300" height="300"></canvas>
    <div id="previewBox"></div>
    <canvas id="hueSlider" width="30" height="300"></canvas>
    
    <div class="controls">
        <input type="text" id="hex" value="#6E2828" style="width: 75px; margin-bottom: 5px;">
        <div class="input-row">R <input type="number" id="r" value="110"></div>
        <div class="input-row">G <input type="number" id="g" value="40"></div>
        <div class="input-row">B <input type="number" id="b" value="40"></div>
        <div class="input-row">H <input type="number" id="h" value="0"></div>
        <div class="input-row">S <input type="number" id="s" value="64"></div>
        <div class="input-row">V <input type="number" id="v" value="43"></div>
    </div>
</div>

<script>
    const field = document.getElementById('colorField');
    const ctx = field.getContext('2d');
    const slider = document.getElementById('hueSlider');
    const sCtx = slider.getContext('2d');
    const preview = document.getElementById('previewBox');
    
    let hueY = 0;
    let isDraggingField = false;
    let isDraggingSlider = false;

    // 변환 공식
    function rgbToHsv(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        let max = Math.max(r, g, b), min = Math.min(r, g, b), d = max - min, h, s = (max === 0 ? 0 : d / max), v = max;
        if (max === min) h = 0; else {
            switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }
            h /= 6;
        }
        return { h: Math.round(h * 360), s: Math.round(s * 100), v: Math.round(v * 100) };
    }

    function hsvToRgb(h, s, v) {
        h /= 360; s /= 100; v /= 100;
        let i = Math.floor(h * 6), f = h * 6 - i, p = v * (1 - s), q = v * (1 - f * s), t = v * (1 - (1 - f) * s);
        let r, g, b;
        switch (i % 6) {
            case 0: r = v, g = t, b = p; break;
            case 1: r = q, g = v, b = p; break;
            case 2: r = p, g = v, b = t; break;
            case 3: r = p, g = q, b = v; break;
            case 4: r = t, g = p, b = v; break;
            case 5: r = v, g = p, b = q; break;
        }
        return { r: Math.round(r * 255), g: Math.round(g * 255), b: Math.round(b * 255) };
    }

    // 화면 동기화 통합 함수
    function syncAll(r, g, b, h, s, v) {
        document.getElementById('r').value = Math.round(r);
        document.getElementById('g').value = Math.round(g);
        document.getElementById('b').value = Math.round(b);
        document.getElementById('h').value = Math.round(h);
        document.getElementById('s').value = Math.round(s);
        document.getElementById('v').value = Math.round(v);
        
        let hex = '#' + ((1<<24)+(Math.round(r)<<16)+(Math.round(g)<<8)+Math.round(b)).toString(16).slice(1).toUpperCase();
        document.getElementById('hex').value = hex;
        preview.style.backgroundColor = hex;
        
        hueY = (h / 360) * 299;
        drawHue(); 
        drawField(h, s, v);
    }

    function drawHue() {
        sCtx.clearRect(0, 0, 30, 300);
        let grad = sCtx.createLinearGradient(0, 0, 0, 300);
        for(let i=0; i<=6; i++) grad.addColorStop(i/6, `hsl(${i*60}, 100%, 50%)`);
        sCtx.fillStyle = grad; sCtx.fillRect(0, 0, 30, 300);
        
        sCtx.strokeStyle = '#fff'; sCtx.lineWidth = 2;
        sCtx.beginPath(); sCtx.arc(15, hueY, 8, 0, Math.PI * 2); sCtx.stroke();
        sCtx.strokeStyle = '#000'; sCtx.lineWidth = 1;
        sCtx.beginPath(); sCtx.arc(15, hueY, 9, 0, Math.PI * 2); sCtx.stroke();
    }

    function drawField(h, s, v) {
        ctx.fillStyle = `hsl(${h}, 100%, 50%)`;
        ctx.fillRect(0, 0, 300, 300);
        let gradW = ctx.createLinearGradient(0, 0, 300, 0); gradW.addColorStop(0, '#fff'); gradW.addColorStop(1, 'transparent');
        ctx.fillStyle = gradW; ctx.fillRect(0, 0, 300, 300);
        let gradB = ctx.createLinearGradient(0, 0, 0, 300); gradB.addColorStop(0, 'transparent'); gradB.addColorStop(1, '#000');
        ctx.fillStyle = gradB; ctx.fillRect(0, 0, 300, 300);
        
        let px = (s / 100) * 299;
        let py = (1 - (v / 100)) * 299;
        
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(px, py, 7, 0, Math.PI * 2); ctx.stroke();
    }

    // 마우스 드래그 연산
    function updateFromField(e) {
        const rect = field.getBoundingClientRect();
        let x = Math.max(0, Math.min(e.clientX - rect.left, 299));
        let y = Math.max(0, Math.min(e.clientY - rect.top, 299));
        let h = (hueY / 299) * 360;
        let s = (x / 299) * 100;
        let v = (1 - (y / 299)) * 100;
        let rgb = hsvToRgb(h, s, v);
        syncAll(rgb.r, rgb.g, rgb.b, h, s, v);
    }

    function updateFromSlider(e) {
        const rect = slider.getBoundingClientRect();
        hueY = Math.max(0, Math.min(e.clientY - rect.top, 299));
        let h = (hueY / 299) * 360;
        let s = parseFloat(document.getElementById('s').value) || 0;
        let v = parseFloat(document.getElementById('v').value) || 0;
        let rgb = hsvToRgb(h, s, v);
        syncAll(rgb.r, rgb.g, rgb.b, h, s, v);
    }

    // 1. RGB 텍스트박스 입력 이벤트
    ['r', 'g', 'b'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => {
            let r = Math.max(0, Math.min(255, parseInt(document.getElementById('r').value) || 0));
            let g = Math.max(0, Math.min(255, parseInt(document.getElementById('g').value) || 0));
            let b = Math.max(0, Math.min(255, parseInt(document.getElementById('b').value) || 0));
            let hsv = rgbToHsv(r, g, b);
            syncAll(r, g, b, hsv.h, hsv.s, hsv.v);
        });
    });

    // 2. HSV 텍스트박스 입력 이벤트
    ['h', 's', 'v'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => {
            let h = Math.max(0, Math.min(360, parseInt(document.getElementById('h').value) || 0));
            let s = Math.max(0, Math.min(100, parseInt(document.getElementById('s').value) || 0));
            let v = Math.max(0, Math.min(100, parseInt(document.getElementById('v').value) || 0));
            let rgb = hsvToRgb(h, s, v);
            syncAll(rgb.r, rgb.g, rgb.b, h, s, v);
        });
    });

    // 3. Hex 텍스트박스 입력 이벤트
    document.getElementById('hex').addEventListener('input', (e) => {
        let val = e.target.value.replace('#', '');
        if(val.length === 6) {
            let r = parseInt(val.substr(0,2), 16), g = parseInt(val.substr(2,2), 16), b = parseInt(val.substr(4,2), 16);
            let hsv = rgbToHsv(r, g, b);
            syncAll(r, g, b, hsv.h, hsv.s, hsv.v);
        }
    });

    // 4. 마우스 이벤트 연동
    field.addEventListener('mousedown', (e) => { isDraggingField = true; updateFromField(e); });
    slider.addEventListener('mousedown', (e) => { isDraggingSlider = true; updateFromSlider(e); });
    window.addEventListener('mousemove', (e) => {
        if (isDraggingField) updateFromField(e);
        else if (isDraggingSlider) updateFromSlider(e);
    });
    window.addEventListener('mouseup', () => { isDraggingField = false; isDraggingSlider = false; });

    // 초기화
    syncAll(110, 40, 40, 0, 64, 43);
</script>
</body>
</html>
