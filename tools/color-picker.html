<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>색 편집기</title>
    <style>
        body { background: #202020; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .container { display: flex; gap: 15px; background: #2d2d2d; padding: 20px; border-radius: 8px; align-items: flex-start; }
        canvas { border: 1px solid #444; }
        #colorField { width: 300px; height: 300px; cursor: crosshair; }
        #hueSlider { width: 30px; height: 300px; cursor: pointer; }
        #previewBox { width: 50px; height: 300px; border: 1px solid #444; }
        .controls { display: flex; flex-direction: column; gap: 5px; width: 80px; }
        .input-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; }
        input { background: #3c3c3c; border: 1px solid #555; color: white; padding: 4px; width: 45px; }
    </style>
</head>
<body>

<div class="container">
    <canvas id="colorField" width="300" height="300"></canvas>
    <div id="previewBox"></div>
    <canvas id="hueSlider" width="30" height="300"></canvas>
    
    <div class="controls">
        <input type="text" id="hex" value="#6E2828" style="width: 75px; margin-bottom: 5px;">
        <div class="input-row">R <input type="number" id="r" value="110"></div>
        <div class="input-row">G <input type="number" id="g" value="40"></div>
        <div class="input-row">B <input type="number" id="b" value="40"></div>
        <div class="input-row">H <input type="number" id="h" value="0"></div>
        <div class="input-row">S <input type="number" id="s" value="100"></div>
        <div class="input-row">V <input type="number" id="v" value="100"></div>
    </div>
</div>

<script>
    const field = document.getElementById('colorField');
    const ctx = field.getContext('2d', {willReadFrequently: true});
    const slider = document.getElementById('hueSlider');
    const sCtx = slider.getContext('2d');
    const preview = document.getElementById('previewBox');
    
    let pointerPos = { x: 150, y: 150 };
    let hueY = 0;

    function rgbToHsv(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        let max = Math.max(r, g, b), min = Math.min(r, g, b);
        let d = max - min, h, s = (max === 0 ? 0 : d / max), v = max;
        if (max === min) h = 0;
        else {
            switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }
            h /= 6;
        }
        return { h: Math.round(h * 360), s: Math.round(s * 100), v: Math.round(v * 100) };
    }

    function drawHue() {
        sCtx.clearRect(0, 0, 30, 300);
        let grad = sCtx.createLinearGradient(0, 0, 0, 300);
        for(let i=0; i<=6; i++) grad.addColorStop(i/6, `hsl(${i*60}, 100%, 50%)`);
        sCtx.fillStyle = grad; sCtx.fillRect(0, 0, 30, 300);
        
        // 슬라이더 포인터: 흰색 테두리를 가진 원으로 표시
        sCtx.strokeStyle = '#fff';
        sCtx.lineWidth = 2;
        sCtx.beginPath();
        sCtx.arc(15, hueY, 8, 0, Math.PI * 2);
        sCtx.stroke();
    }

    function drawField(hue) {
        ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
        ctx.fillRect(0, 0, 300, 300);
        let gradW = ctx.createLinearGradient(0, 0, 300, 0);
        gradW.addColorStop(0, '#fff'); gradW.addColorStop(1, 'transparent');
        ctx.fillStyle = gradW; ctx.fillRect(0, 0, 300, 300);
        let gradB = ctx.createLinearGradient(0, 0, 0, 300);
        gradB.addColorStop(0, 'transparent'); gradB.addColorStop(1, '#000');
        ctx.fillStyle = gradB; ctx.fillRect(0, 0, 300, 300);

        // 컬러 필드 포인터: 흰색 원
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(pointerPos.x, pointerPos.y, 6, 0, Math.PI * 2);
        ctx.stroke();
    }

    function updateColor(x, y) {
        pointerPos = { x: Math.max(0, Math.min(x, 299)), y: Math.max(0, Math.min(y, 299)) };
        const h = (hueY / 300) * 360;
        drawField(h);
        
        const data = ctx.getImageData(pointerPos.x, pointerPos.y, 1, 1).data;
        const [r, g, b] = [data[0], data[1], data[2]];
        const hsv = rgbToHsv(r, g, b);

        document.getElementById('r').value = r;
        document.getElementById('g').value = g;
        document.getElementById('b').value = b;
        document.getElementById('h').value = hsv.h;
        document.getElementById('s').value = hsv.s;
        document.getElementById('v').value = hsv.v;
        
        const hex = '#' + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1).toUpperCase();
        document.getElementById('hex').value = hex;
        preview.style.backgroundColor = hex;
    }

    drawHue(); drawField(0);

    field.addEventListener('mousedown', (e) => { 
        updateColor(e.offsetX, e.offsetY);
        field.onmousemove = (e) => updateColor(e.offsetX, e.offsetY);
    });
    window.addEventListener('mouseup', () => field.onmousemove = null);

    slider.addEventListener('click', (e) => {
        hueY = e.offsetY;
        drawHue();
        updateColor(pointerPos.x, pointerPos.y);
    });
</script>
</body>
</html>
