<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>색 편집기</title>
    <style>
        body { background: #202020; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .container { display: flex; gap: 15px; background: #2d2d2d; padding: 20px; border-radius: 8px; align-items: flex-start; }
        canvas { border: 1px solid #444; }
        #colorField { width: 300px; height: 300px; cursor: crosshair; }
        #hueSlider { width: 30px; height: 300px; cursor: pointer; }
        #previewBox { width: 50px; height: 300px; border: 1px solid #444; }
        .controls { display: flex; flex-direction: column; gap: 8px; width: 150px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group span { font-size: 0.9rem; }
        input { background: #3c3c3c; border: 1px solid #555; color: white; padding: 5px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <canvas id="colorField" width="300" height="300"></canvas>
    <div id="previewBox"></div>
    <canvas id="hueSlider" width="30" height="300"></canvas>
    
    <div class="controls">
        <input type="text" id="hex" value="#6E2828">
        <div class="input-group"><span>R</span><input type="number" id="r" value="110"></div>
        <div class="input-group"><span>G</span><input type="number" id="g" value="40"></div>
        <div class="input-group"><span>B</span><input type="number" id="b" value="40"></div>
        <div class="input-group"><span>H</span><input type="number" id="h" value="0"></div>
        <div class="input-group"><span>S</span><input type="number" id="s" value="100"></div>
        <div class="input-group"><span>V</span><input type="number" id="v" value="100"></div>
    </div>
</div>

<script>
    const field = document.getElementById('colorField');
    const ctx = field.getContext('2d', {willReadFrequently: true});
    const slider = document.getElementById('hueSlider');
    const sCtx = slider.getContext('2d');
    const preview = document.getElementById('previewBox');
    let isDragging = false;

    function drawHue() {
        let grad = sCtx.createLinearGradient(0, 0, 0, 300);
        for(let i=0; i<=6; i++) grad.addColorStop(i/6, `hsl(${i*60}, 100%, 50%)`);
        sCtx.fillStyle = grad; sCtx.fillRect(0, 0, 30, 300);
    }

    function drawField(hue) {
        ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
        ctx.fillRect(0, 0, 300, 300);
        let gradW = ctx.createLinearGradient(0, 0, 300, 0);
        gradW.addColorStop(0, '#fff'); gradW.addColorStop(1, 'transparent');
        ctx.fillStyle = gradW; ctx.fillRect(0, 0, 300, 300);
        let gradB = ctx.createLinearGradient(0, 0, 0, 300);
        gradB.addColorStop(0, 'transparent'); gradB.addColorStop(1, '#000');
        ctx.fillStyle = gradB; ctx.fillRect(0, 0, 300, 300);
    }

    function updateColor(x, y) {
        const data = ctx.getImageData(x, y, 1, 1).data;
        document.getElementById('r').value = data[0];
        document.getElementById('g').value = data[1];
        document.getElementById('b').value = data[2];
        const hex = '#' + ((1<<24)+(data[0]<<16)+(data[1]<<8)+data[2]).toString(16).slice(1).toUpperCase();
        document.getElementById('hex').value = hex;
        preview.style.backgroundColor = hex;
    }

    drawHue(); drawField(0);

    // 드래그 및 클릭 이벤트 연동
    field.addEventListener('mousedown', (e) => { isDragging = true; updateColor(e.offsetX, e.offsetY); });
    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const rect = field.getBoundingClientRect();
        updateColor(Math.max(0, Math.min(e.clientX - rect.left, 299)), Math.max(0, Math.min(e.clientY - rect.top, 299)));
    });
    window.addEventListener('mouseup', () => isDragging = false);

    slider.addEventListener('click', (e) => {
        const h = (e.offsetY / 300) * 360;
        drawField(h);
    });
</script>
</body>
</html>
