<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>그림판 색 편집기</title>
    <style>
        body { background: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .container { display: flex; gap: 20px; background: #f0f0f0; padding: 20px; border: 1px solid #999; }
        canvas { border: 1px solid #777; }
        #sbBox { cursor: crosshair; }
        #hueSlider { cursor: crosshair; }
        .controls { display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; align-items: center; gap: 10px; }
        input { width: 50px; padding: 4px; }
        #previewBox { width: 60px; height: 60px; border: 2px solid #555; background: red; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <canvas id="sbBox" width="256" height="256"></canvas>
    <canvas id="hueSlider" width="30" height="256"></canvas>
    
    <div class="controls">
        <div id="previewBox"></div>
        <div class="input-row">RGB:</div>
        <div class="input-row">R <input type="number" id="rInput" value="255" min="0" max="255"></div>
        <div class="input-row">G <input type="number" id="gInput" value="0" min="0" max="255"></div>
        <div class="input-row">B <input type="number" id="bInput" value="0" min="0" max="255"></div>
    </div>
</div>

<script>
    const sb = document.getElementById('sbBox').getContext('2d', {willReadFrequently: true});
    const hue = document.getElementById('hueSlider').getContext('2d');
    const preview = document.getElementById('previewBox');
    
    let isDragging = false;
    let currentHue = 0; // 0 ~ 360

    function drawHue() {
        let grad = hue.createLinearGradient(0, 0, 0, 256);
        for(let i=0; i<=6; i++) grad.addColorStop(i/6, `hsl(${i*60}, 100%, 50%)`);
        hue.fillStyle = grad; hue.fillRect(0, 0, 30, 256);
    }

    function drawSB(h) {
        sb.fillStyle = `hsl(${h}, 100%, 50%)`;
        sb.fillRect(0, 0, 256, 256);
        let gradW = sb.createLinearGradient(0, 0, 256, 0);
        gradW.addColorStop(0, '#fff'); gradW.addColorStop(1, 'transparent');
        sb.fillStyle = gradW; sb.fillRect(0, 0, 256, 256);
        let gradB = sb.createLinearGradient(0, 0, 0, 256);
        gradB.addColorStop(0, 'transparent'); gradB.addColorStop(1, '#000');
        sb.fillStyle = gradB; sb.fillRect(0, 0, 256, 256);
    }

    function updateColor(x, y) {
        const data = sb.getImageData(x, y, 1, 1).data;
        document.getElementById('rInput').value = data[0];
        document.getElementById('gInput').value = data[1];
        document.getElementById('bInput').value = data[2];
        preview.style.backgroundColor = `rgb(${data[0]}, ${data[1]}, ${data[2]})`;
    }

    // 초기화
    drawHue(); drawSB(0);

    // 이벤트 리스너
    document.getElementById('hueSlider').addEventListener('mousedown', (e) => {
        isDragging = true;
        const data = hue.getImageData(0, e.offsetY, 1, 1).data;
        currentHue = (e.offsetY / 256) * 360;
        drawSB(currentHue);
    });

    document.getElementById('sbBox').addEventListener('mousedown', (e) => {
        isDragging = true;
        updateColor(e.offsetX, e.offsetY);
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        // 캔버스 범위 내에서만 작동하도록 처리
        updateColor(e.offsetX, e.offsetY);
    });

    window.addEventListener('mouseup', () => isDragging = false);

</script>
</body>
</html>
