<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>색 편집기</title>
    <style>
        body { background-color: #222; color: white; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .container { display: flex; gap: 10px; align-items: flex-start; }
        
        /* 1. 왼쪽: Color Field (SB Box) */
        #sbBox { width: 300px; height: 300px; cursor: crosshair; border-radius: 2px; }
        
        /* 2. 중앙: Color Preview */
        #previewBox { width: 50px; height: 300px; border-radius: 2px; border: 1px solid #444; background: red; }
        
        /* 3. 오른쪽: Hue Slider */
        #hueSlider { width: 30px; height: 300px; cursor: pointer; border-radius: 2px; }
        
        .controls { display: flex; flex-direction: column; gap: 10px; width: 140px; margin-left: 10px; }
        input { background: #333; color: white; border: 1px solid #555; padding: 8px; border-radius: 2px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <canvas id="sbBox" width="300" height="300"></canvas>
    <div id="previewBox"></div>
    <canvas id="hueSlider" width="30" height="300"></canvas>
    
    <div class="controls">
        <input type="text" id="hexInput" value="#FF0000">
        <input type="number" id="rInput" value="255">
        <input type="number" id="gInput" value="0">
        <input type="number" id="bInput" value="0">
    </div>
</div>

<script>
    const sb = document.getElementById('sbBox').getContext('2d', {willReadFrequently: true});
    const hue = document.getElementById('hueSlider').getContext('2d');
    const preview = document.getElementById('previewBox');

    // Hue Slider 생성
    function drawHue() {
        let grad = hue.createLinearGradient(0, 0, 0, 300);
        grad.addColorStop(0, '#f00'); grad.addColorStop(0.17, '#ff0');
        grad.addColorStop(0.33, '#0f0'); grad.addColorStop(0.5, '#0ff');
        grad.addColorStop(0.67, '#00f'); grad.addColorStop(0.83, '#f0f');
        grad.addColorStop(1, '#f00');
        hue.fillStyle = grad; hue.fillRect(0, 0, 30, 300);
    }

    // Color Field 생성
    function drawSB(color) {
        sb.fillStyle = color; sb.fillRect(0, 0, 300, 300);
        let gradW = sb.createLinearGradient(0, 0, 300, 0);
        gradW.addColorStop(0, 'white'); gradW.addColorStop(1, 'transparent');
        sb.fillStyle = gradW; sb.fillRect(0, 0, 300, 300);
        let gradB = sb.createLinearGradient(0, 0, 0, 300);
        gradB.addColorStop(0, 'transparent'); gradB.addColorStop(1, 'black');
        sb.fillStyle = gradB; sb.fillRect(0, 0, 300, 300);
    }

    drawHue(); drawSB('#f00');

    // 클릭 이벤트
    document.getElementById('sbBox').addEventListener('click', (e) => {
        const data = sb.getImageData(e.offsetX, e.offsetY, 1, 1).data;
        updateUI(data[0], data[1], data[2]);
    });

    document.getElementById('hueSlider').addEventListener('click', (e) => {
        const data = hue.getImageData(0, e.offsetY, 1, 1).data;
        const color = `rgb(${data[0]},${data[1]},${data[2]})`;
        drawSB(color);
    });

    function updateUI(r, g, b) {
        document.getElementById('rInput').value = r;
        document.getElementById('gInput').value = g;
        document.getElementById('bInput').value = b;
        const hex = '#' + ((1 << 24) + (parseInt(r) << 16) + (parseInt(g) << 8) + parseInt(b)).toString(16).slice(1).toUpperCase();
        document.getElementById('hexInput').value = hex;
        preview.style.backgroundColor = hex;
    }
</script>
</body>
</html>
