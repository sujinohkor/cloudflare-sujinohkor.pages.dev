<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Text to SVG Grid</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #000; color: white; padding-top: 50px; }
        #canvas-svg { border: 1px solid #333; margin-top: 20px; }
        input { padding: 10px; width: 300px; }
        .dot { transition: fill 0.5s ease; }
    </style>
</head>
<body>

    <input type="text" id="textInput" placeholder="글자를 입력하세요 (한 글자 권장)" maxlength="1">
    <svg id="canvas-svg" width="800" height="400" viewBox="0 0 800 400"></svg>

    <script>
        const svg = document.getElementById('canvas-svg');
        const input = document.getElementById('textInput');
        
        const rows = 20;
        const cols = 40;
        const size = 15; // 원의 간격

        // 1. 격자 초기화 (모든 점 생성)
        const circles = [];
        for (let i = 0; i < rows; i++) {
            for (let j = 0; j < cols; j++) {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", 50 + j * size);
                circle.setAttribute("cy", 50 + i * size);
                circle.setAttribute("r", "3");
                circle.setAttribute("fill", "#21252a");
                circle.classList.add('dot');
                svg.appendChild(circle);
                circles.push(circle);
            }
        }

        // 2. 텍스트를 비트맵으로 변환하여 점 상태 변경
        input.addEventListener('input', (e) => {
            const text = e.target.value;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = cols;
            canvas.height = rows;

            ctx.fillStyle = 'white';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, cols / 2, rows / 2);

            const imageData = ctx.getImageData(0, 0, cols, rows).data;

            // 알파 채널이 높으면(글자가 있으면) 밝게, 아니면 어둡게
            for (let i = 0; i < rows * cols; i++) {
                const alpha = imageData[i * 4 + 3];
                circles[i].setAttribute("fill", alpha > 128 ? "#ffffff" : "#21252a");
            }
        });
    </script>
</body>
</html>
