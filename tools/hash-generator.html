<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/md5.min.js"></script>
    <style>
        /* 1. Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #202020; color: #fff; transition: background 0.3s; }
        
        /* 2. Layout */
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { 
            width: 250px; height: 100vh; position: fixed; left: 0; top: 0; 
            background-color: #101010; padding: 20px; z-index: 1000; 
            display: flex; flex-direction: column; transition: transform 0.3s ease;
        }
        .main-content { 
            margin-left: 250px; padding: 40px; flex: 1; 
            display: flex; flex-direction: column; height: 100vh; gap: 10px; overflow-y: auto; overflow: hidden; transition: 0.3s;
        }

        /* 3. Components */
        .menu-btn, .theme-btn { 
            width: 100%; padding: 10px; margin-bottom: 10px; cursor: pointer;
            background: #202020; color: #ff9e40; border: 2px solid #ff9e40; 
            border-radius: 50px; font-weight: bold; transition: all 0.3s;
        }
        .menu-btn:hover { background: #ff9e40; color: #101010; }
        .theme-btn:hover { background-color: #FDF5E6; color: #F38020; border-color: #FDF5E6; }
        
        .menu-list { margin: 20px 0; display: flex; flex-direction: column; gap: 10px; }
        .menu-list a { display: flex; justify-content: space-between; color: #fff; font-size: 0.95rem; }
        .menu-list span { color: #e68a35; font-weight: bold; }

        .content-top { flex: 1; border: 2px solid #ff9e40; border-radius: 16px; display: flex; overflow: hidden; }
        .content-middle { flex: 1; border: 2px solid #ff9e40; border-radius: 16px; display: flex; overflow: hidden; }
        .content-down { flex: 2; border: 2px solid #ff9e40; border-radius: 16px; display: flex; overflow: hidden; }
        textarea { flex: 1; padding: 20px; background: transparent; border: none; color: #fff; font-family: 'Consolas', 'Courier New', 'Monaco', monospace, sans-serif; font-size: 1rem; resize: none; outline: none; overflow-y: auto; white-space: pre; }

        /* 4. Theme (Light Mode) */
        body.light-mode { background-color: #fff; }
        body.light-mode .sidebar { background-color: #FDF5E6; }
        body.light-mode .menu-btn, body.light-mode .theme-btn { background: #FDF5E6; color: #F38020; border-color: #F38020; }
        body.light-mode .menu-btn:hover { background: #F38020; color: #ffffff; border-color: #F38020; }
        body.light-mode .theme-btn:hover { background-color: #202020; color: #ff9e40; border-color: #202020; }
        body.light-mode .top-section h1, body.light-mode .top-section p, body.light-mode .menu-list a { color: #202020; }
        body.light-mode textarea { color: #000; }
        body.light-mode .menu-toggle-btn { color: #000000; }

        /* 5. Mobile Responsive */
        .menu-toggle-btn { display: none; position: fixed; bottom: 20px; left: 20px; z-index: 2000; padding: 10px 15px; background: #ff9e40; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
        
        @media (max-width: 600px) {
            .menu-toggle-btn { display: block; color: #ffffff; }
            .sidebar { transform: translateX(-250px); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; width: 100%; max-height: 100svh; flex: 1; display: flex; flex-direction: column; }
            .main-content-section { flex: 1; min-height: 0; }
            .content-top, .content-down { flex-direction: column; overflow-y: visible; }
            #hash-output { font-family: monospace; white-space: pre; overflow-x: auto; word-break: keep-all; }
        }
    </style>
</head>
<body>

<button class="menu-toggle-btn" onclick="toggleSidebar()">MENU</button>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <button class="menu-btn" onclick="location.href='../index'">Home</button>
        <button id="theme-toggle" class="theme-btn">DAY / NIGHT</button>
        
        <nav class="menu-list">
            <a>Characters (with spaces) <span id="char-count-all">0</span></a>
            <a>Characters (no spaces) <span id="char-count-no-space">0</span></a>
            <a>Word Count <span id="word-count">0</span></a>
            <a>Paragraph Count <span id="para-count">0</span></a>
            <a>Byte Count <span id="byte-count">0</span></a>
        </nav>

        <div class="bottom-btns">
            <button class="menu-btn" onclick="generateHashes()">Genertate</button>
            <button class="menu-btn" onclick="copyHashes()">Copy</button>
            <button class="menu-btn" onclick="saveHashes()">Save as Text File</button>
            <button class="menu-btn" onclick="resetAll()">Reset</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-section">
            <h1>Hash Generator</h1>
            <p>Enter text below to generate hash values.</p>
        </header>
        <section class="content-top" style="margin-top: 20px;">
            <textarea id="text-input" placeholder="Enter text here."></textarea>
        </section>
        <section class="content-middle">
        </section>
        <section class="content-down">
            <textarea id="hash-output" placeholder="Enter text to generate hash values." readonly></textarea>
        </section>
    </main>
</div>

<script>
    const textInput = document.getElementById('text-input');
    const hashOutput = document.getElementById('hash-output');
    const sidebar = document.getElementById('sidebar');

    function toggleSidebar() { sidebar.classList.toggle('active'); }

    textInput.addEventListener('input', () => {
        const text = textInput.value;
        document.getElementById('char-count-all').innerText = text.length;
        document.getElementById('char-count-no-space').innerText = text.replace(/\s/g, '').length;
        document.getElementById('word-count').innerText = text.trim().split(/\s+/).filter(w => w.length > 0).length;
        document.getElementById('para-count').innerText = text.split('\n').filter(p => p.trim().length > 0).length;
        
        let bytes = 0;
        for (let i = 0; i < text.length; i++) bytes += (text.charCodeAt(i) > 127) ? 2 : 1;
        document.getElementById('byte-count').innerText = bytes;
    });

    document.getElementById('theme-toggle').addEventListener('click', () => {
        document.body.classList.toggle('light-mode');
    });

    function generateHashes() {
        const text = textInput.value;
        
        // 입력값 검증
        if (!text) { alert("Please enter text."); return; }
    
        try {
            // 각 알고리즘별 해시 값 계산 (CryptoJS 사용)
            const md5Hash = CryptoJS.MD5(text).toString();
            const sha1Hash = CryptoJS.SHA1(text).toString();
            const sha256Hash = CryptoJS.SHA256(text).toString();
    
            // 결과를 보기 좋게 포맷팅하여 출력창에 주입
            hashOutput.value = [
                `MD5: ${md5Hash}\n`,
                `SHA-1: ${sha1Hash}\n`,
                `SHA-256: ${sha256Hash}`
            ].join('\n');
    
        } catch (error) {
            hashOutput.value = "Hash generation failed.";
            console.error(error);
        }
    }

    function resetAll() {
        textInput.value = '';
        textInput.dispatchEvent(new Event('input'));
        hashOutput.value = '';
        hashOutput.dispatchEvent(new Event('input'));
    }

    function copyHashes() {
        if (!hashOutput.value) return alert('No hash values to copy.');
        hashOutput.select();
        document.execCommand('copy');
        alert('ASCII art copied!');
    }

    function saveHashes() {
        const text = hashOutput.value;
        if (!text.trim()) return alert("No hash values to save.");
        const blob = new Blob(['\uFEFF', text], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'Hashes.txt';
        link.click();
        URL.revokeObjectURL(link.href);
    }
</script>
</body>
</html>
