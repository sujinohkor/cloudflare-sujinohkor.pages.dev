<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Generator</title>
    <!-- 파비콘 설정 추가 -->
    <link rel="icon" type="image/png" href="/assets/LOGO-orange.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/md5.min.js"></script>
    <style>
        /* 1. Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #202020; color: #fff; transition: background 0.3s; }
        
        /* 2. Layout */
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { 
            width: 250px; height: 100vh; position: fixed; left: 0; top: 0; 
            background-color: #101010; padding: 20px; z-index: 1000; 
            display: flex; flex-direction: column; transition: transform 0.3s ease;
        }
        .main-content { 
            margin-left: 250px; padding: 40px; flex: 1; 
            display: flex; flex-direction: column; height: 100vh; gap: 10px; overflow-y: auto; overflow: hidden; transition: 0.3s;
        }

        /* 3. Components */
        .menu-btn, .theme-btn { 
            width: 100%; padding: 10px; margin-bottom: 10px; cursor: pointer;
            background: #202020; color: #ff9e40; border: 2px solid #ff9e40; 
            border-radius: 50px; font-weight: bold; transition: all 0.3s;
        }
        .menu-btn:hover { background: #ff9e40; color: #101010; }
        .theme-btn:hover { background-color: #FDF5E6; color: #F38020; border-color: #FDF5E6; }
        
        .menu-list { margin: 20px 0; display: flex; flex-direction: column; gap: 10px; }
        .menu-list a { display: flex; justify-content: space-between; color: #fff; font-size: 0.95rem; }
        .menu-list span { color: #e68a35; font-weight: bold; }

        .content-top { flex: 1; border: 2px solid #ff9e40; border-radius: 16px; display: flex; overflow: hidden; }
        
        .content-mid { 
            flex: 1; border: 2px solid #ff9e40; border-radius: 16px; display: flex; overflow: hidden; 
            padding: 20px; color: #888; font-family: 'Consolas', 'Courier New', 'Monaco', monospace, sans-serif; font-size: 1rem;
            cursor: pointer; transition: all 0.3s ease; user-select: none;
            flex-direction: column; align-items: center; justify-content: center; gap: 10px; text-align: center;
        }
        .content-mid.dragover { background-color: rgba(255, 158, 64, 0.1 ); border-style: dashed; color: #ff9e40; }
        
        .content-mid.has-file {
            background-color: rgba(255, 158, 64, 0.05);
            color: #ff9e40;
            font-weight: bold;
        }
        body.light-mode .content-mid.has-file {
            background-color: rgba(243, 128, 32, 0.05);
            color: #F38020;
        }

        .content-down { flex: 2; border: 2px solid #ff9e40; border-radius: 16px; display: flex; overflow: hidden; }
        textarea { flex: 1; padding: 20px; background: transparent; border: none; color: #fff; font-family: 'Consolas', 'Courier New', 'Monaco', monospace, sans-serif; font-size: 1rem; resize: none; outline: none; overflow-y: auto; white-space: pre; }

        /* 4. Theme (Light Mode) */
        body.light-mode { background-color: #fff; }
        body.light-mode .sidebar { background-color: #FDF5E6; }
        body.light-mode .menu-btn, body.light-mode .theme-btn { background: #FDF5E6; color: #F38020; border-color: #F38020; }
        body.light-mode .menu-btn:hover { background: #F38020; color: #ffffff; border-color: #F38020; }
        body.light-mode .theme-btn:hover { background-color: #202020; color: #ff9e40; border-color: #202020; }
        body.light-mode .top-section h1, body.light-mode .top-section p, body.light-mode .menu-list a { color: #202020; }
        body.light-mode textarea { color: #000; }
        body.light-mode .content-mid { color: #666; }
        body.light-mode .content-mid.dragover { background-color: rgba(243, 128, 32, 0.1 ); border-style: dashed; color: #f38020; }
        body.light-mode .menu-toggle-btn { color: #000000; }

        /* 5. Mobile Responsive */
        .menu-toggle-btn { display: none; position: fixed; bottom: 20px; left: 20px; z-index: 2000; padding: 10px 15px; background: #ff9e40; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
        
        @media (max-width: 600px) {
            .menu-toggle-btn { display: block; color: #ffffff; }
            .sidebar { transform: translateX(-250px); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; width: 100%; max-height: 100svh; flex: 1; display: flex; flex-direction: column; }
            .main-content-section { flex: 1; min-height: 0; }
            .content-top, .content-down { flex-direction: column; overflow-y: visible; }
            #hash-output { font-family: monospace; white-space: pre; overflow-x: auto; word-break: keep-all; }
        }
    </style>
</head>
<body>

<button class="menu-toggle-btn" onclick="toggleSidebar()">MENU</button>

<input type="file" id="file-selector" style="display: none;">

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <button class="menu-btn" onclick="location.href='../index'">Home</button>
        <button id="theme-toggle" class="theme-btn">DAY / NIGHT</button>
        
        <nav class="menu-list">
            <a>Characters (with spaces) <span id="char-count-all">0</span></a>
            <a>Characters (no spaces) <span id="char-count-no-space">0</span></a>
            <a>Word Count <span id="word-count">0</span></a>
            <a>Paragraph Count <span id="para-count">0</span></a>
            <a>Byte Count <span id="byte-count">0</span></a>
        </nav>

        <div class="bottom-btns">
            <button class="menu-btn" onclick="uploadFile()">Upload</button>
            <button class="menu-btn" onclick="copyHashes()">Copy</button>
            <button class="menu-btn" onclick="saveHashes()">Save as Text File</button>
            <button class="menu-btn" onclick="resetAll()">Reset</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-section">
            <h1>Hash Generator</h1>
            <p>Enter text below to generate hash values.</p>
        </header>
        <section class="content-top" style="margin-top: 20px;">
            <textarea id="text-input" placeholder="Enter text here."></textarea>
        </section>
        <section class="content-mid">
        </section>
        <section class="content-down">
            <textarea id="hash-output" placeholder="Hashes will be generated here." readonly></textarea>
        </section>
    </main>
</div>

<script>
    const textInput = document.getElementById('text-input');
    const hashOutput = document.getElementById('hash-output');
    const sidebar = document.getElementById('sidebar');
    const contentMid = document.querySelector('.content-mid');
    const fileSelector = document.getElementById('file-selector');

    function toggleSidebar() { sidebar.classList.toggle('active'); }
    document.getElementById('theme-toggle').addEventListener('click', () => { document.body.classList.toggle('light-mode'); } );
    // 메인 콘텐츠 클릭 시 사이드바 닫기 기능 추가
    document.querySelector('.main-content').addEventListener('click', () => { if (sidebar.classList.contains('active')) { sidebar.classList.remove('active'); } });

    // 사이드바 카운터 초기화 함수
    function clearCounters() {
        document.getElementById('char-count-all').innerText = '0';
        document.getElementById('char-count-no-space').innerText = '0';
        document.getElementById('word-count').innerText = '0';
        document.getElementById('para-count').innerText = '0';
        document.getElementById('byte-count').innerText = '0';
    }

    // 텍스트 타이핑 실시간 감지
    textInput.addEventListener('input', () => {
        const text = textInput.value;
        
        // 텍스트 창에 타이핑이 시작되면 content-mid 파일 업로드 상태를 초기화
        if (contentMid.classList.contains('has-file')) {
            contentMid.classList.remove('has-file');
            contentMid.innerHTML = `<div style="font-size: 3rem;">📄</div><div>Drag & Drop a file here or click to upload.</div>`;
        }

        document.getElementById('char-count-all').innerText = text.length;
        document.getElementById('char-count-no-space').innerText = text.replace(/\s/g, '').length;
        document.getElementById('word-count').innerText = text.trim().split(/\s+/).filter(w => w.length > 0).length;
        document.getElementById('para-count').innerText = text.split('\n').filter(p => p.trim().length > 0).length;
        
        let bytes = 0;
        for (let i = 0; i < text.length; i++) bytes += (text.charCodeAt(i) > 127) ? 2 : 1;
        document.getElementById('byte-count').innerText = bytes;

        generateHashes(text);
    });

    // 해시 연산 함수 (호출 시 텍스트나 WordArray 객체를 인자로 받음)
    function generateHashes(targetData) {
        if (!targetData) { hashOutput.value = ''; return; }
    
        try {
            const md5Hash = CryptoJS.MD5(targetData).toString();
            const sha1Hash = CryptoJS.SHA1(targetData).toString();
            const sha256Hash = CryptoJS.SHA256(targetData).toString();
            const sha224Hash = CryptoJS.SHA224(targetData).toString();
            const sha512Hash = CryptoJS.SHA512(targetData).toString();
            const sha384Hash = CryptoJS.SHA384(targetData).toString();
            const sha3Hash = CryptoJS.SHA3(targetData).toString();
            const ripemd160Hash = CryptoJS.RIPEMD160(targetData).toString();
            
            hashOutput.value = [
                `MD5: ${md5Hash}\n`,
                `SHA-1: ${sha1Hash}\n`,
                `SHA-256: ${sha256Hash}\n`,
                `SHA-224: ${sha224Hash}\n`,
                `SHA-512: ${sha512Hash}\n`,
                `SHA-384: ${sha384Hash}\n`,
                `SHA-3: ${sha3Hash}\n`,
                `RIPEMD-160: ${ripemd160Hash}`
            ].join('\n');
    
        } catch (error) {
            hashOutput.value = "Hash generation failed.";
            console.error(error);
        }
    }

    contentMid.innerHTML = `<div style="font-size: 3rem;">📄</div><div>Drag & Drop a file here or click to upload.</div>`;
    
    // 💡 변경된 핵심 로직: 파일을 ArrayBuffer(바이너리)로 읽어 직접 해싱
    function handleFile(file) {
        if (!file) return;
    
        const reader = new FileReader();
        reader.onload = (e) => {
            const arrayBuffer = e.target.result;
            
            // ArrayBuffer를 CryptoJS가 연산할 수 있는 WordArray 형태로 변환 (바이너리 직접 매핑)
            const wordArray = CryptoJS.lib.WordArray.create(arrayBuffer);
            
            // 파일 크기를 기준으로 사이드바 메타데이터 카운터 업데이트
            clearCounters();
            document.getElementById('byte-count').innerText = file.size;
            
            // text-input 창은 건드리지 않고 비워둔 채 해시값 생성
            textInput.value = ''; 
            generateHashes(wordArray);
            
            // content-mid 영역 업로드 완료 피드백 표시
            contentMid.classList.add('has-file');
            contentMid.innerHTML = `
                <div style="font-size: 3rem;">✅</div>
                <div style="word-break: break-all;">Uploaded File: ${file.name}</div>
                <div style="font-size: 0.8rem; font-weight: normal; opacity: 0.7;">(Click or drag another file to change)</div>
            `;
        };
        // 텍스트가 아닌 원시 바이너리 배열 구조로 파일을 읽습니다.
        reader.readAsArrayBuffer(file);
    }
    
    contentMid.addEventListener('dragover', (e) => { e.preventDefault(); contentMid.classList.add('dragover'); });
    contentMid.addEventListener('dragleave', () => { contentMid.classList.remove('dragover'); });
    contentMid.addEventListener('drop', (e) => { e.preventDefault(); contentMid.classList.remove('dragover'); const file = e.dataTransfer.files[0]; handleFile(file); });
    contentMid.addEventListener('click', () => { fileSelector.click(); });
    
    function uploadFile() { fileSelector.click(); }
    
    fileSelector.addEventListener('change', (e) => {
        const file = e.target.files[0];
        handleFile(file);
        e.target.value = ''; 
    });

    function copyHashes() {
        if (!hashOutput.value || hashOutput.value === 'Hashes will be generated here.') return alert('No hash values to copy.');
        hashOutput.select();
        document.execCommand('copy');
        alert('Hash values copied!');
    }

    function saveHashes() {
        const text = hashOutput.value;
        if (!text.trim() || text === 'Hashes will be generated here.') return alert("No hash values to save.");
        const blob = new Blob(['\uFEFF', text], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'Hashes.txt';
        link.click();
        URL.revokeObjectURL(link.href);
    }
    
    function resetAll() {
        textInput.value = ''; 
        contentMid.classList.remove('has-file');
        contentMid.innerHTML = `<div style="font-size: 3rem;">📄</div><div>Drag & Drop a file here or click to upload.</div>`;
        clearCounters();
        generateHashes('');
    }
</script>
</body>
</html>
