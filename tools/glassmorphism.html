
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Generator</title>
    <link rel="icon" type="image/png" href="/assets/LOGO-orange.png">
    <style>
        /* 1. Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #202020;
            color: #fff;
            transition: background 0.3s;
        }

        /* 2. Layout */
        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background-color: #101010;
            padding: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .main-content {
            margin-left: 250px;
            padding: 40px;
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            gap: 20px;
            overflow: hidden;
            transition: 0.3s;
        }

        /* 3. Components */
        .menu-btn, .theme-btn {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            background: #202020;
            color: #ff9e40;
            border: 2px solid #ff9e40;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .menu-btn:hover {
            background: #ff9e40;
            color: #101010;
        }

        .theme-btn:hover {
            background-color: #FDF5E6;
            color: #F38020;
            border-color: #FDF5E6;
        }

        /* Workspace Structure */
        .workspace-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        /* ===== [Controls / Code Editor 영역] ===== */
        .content-mid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            height: 100%;
            min-height: 0;
            min-width: 0;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            height: 100%;
            min-height: 0;
        }

        .sliders-wrapper {
            background: #181818;
            border: 2px solid #ff9e40;
            border-radius: 16px;
            padding: 15px 20px;
            flex-shrink: 0;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .control-group {
            margin-bottom: 10px;
        }
        .control-group:last-child {
            margin-bottom: 0;
        }

        .control-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: bold;
            margin-bottom: 3px;
            color: #ff9e40;
        }

        .control-group input {
            width: 100%;
            accent-color: #ff9e40;
            cursor: pointer;
        }

        .content-mid-header {
            color: #ff9e40;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .code-editor-container {
            position: relative;
            display: flex;
            width: 100%;
            flex: 1;
            min-height: 0;
            background: #141414;
            border: 2px solid #ff9e40;
            border-radius: 16px;
            overflow: hidden;
            font-family: 'Consolas', 'Fira Code', Monaco, monospace;
            font-size: 0.85rem;
            line-height: 1.4;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .line-numbers {
            padding: 12px 6px 12px 10px;
            background: #0a0a0a;
            color: #555;
            text-align: right;
            user-select: none;
            border-right: 1px solid #282828;
            font-family: inherit;
            overflow-y: hidden;
        }

        .code-output-wrapper {
            position: relative;
            flex: 1;
            height: 100%;
            overflow: hidden;
        }

        .editor-textarea, .code-output-display {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 12px;
            margin: 0;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: inherit;
            line-height: inherit;
            white-space: pre;
            overflow: auto;
            tab-size: 2;
        }

        .editor-textarea {
            color: transparent;
            background: transparent;
            caret-color: #fff;
            resize: none;
            z-index: 2;
        }

        .code-output-display {
            pointer-events: none;
            z-index: 1;
            color: #fff;
        }

        /* Syntax Highlighting Colors (Dark Mode) */
        .hl-property { color: #8be9fd; }
        .hl-string   { color: #f1fa8c; }
        .hl-number   { color: #bd93f9; }
        .hl-bracket  { color: #ff79c6; }

        /* Copy Button */
        .copy-btn {
            background: transparent;
            border: 1px solid #ff9e40;
            color: #ff9e40;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #ff9e40;
            color: #101010;
        }

        /* ===== [Preview 영역] ===== */
        .content-down-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
            height: 100%;
            min-height: 0;
            min-width: 0;
        }

        .content-down-wrapper label {
            color: #ff9e40;
            font-weight: bold;
            flex-shrink: 0;
        }

        .content-down {
            position: relative;
            flex: 1;
            min-height: 0;
            border: 2px solid #ff9e40;
            border-radius: 16px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #a1c4fd 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .preview-area {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        #glass-preview {
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            transition: all 0.1s ease;
        }

        /* 4. Theme (Light Mode) */
        body.light-mode { background-color: #fff; }
        body.light-mode .sidebar { background-color: #FDF5E6; box-shadow: 4px 0 15px rgba(0, 0, 0, 0.05); }
        body.light-mode .menu-btn, body.light-mode .theme-btn { background: #FDF5E6; color: #F38020; border-color: #F38020; }
        body.light-mode .menu-btn:hover { background: #F38020; color: #ffffff; }
        body.light-mode .top-section h1, body.light-mode .top-section p { color: #202020; }
        body.light-mode .menu-toggle-btn { color: #000000; }

        body.light-mode .sliders-wrapper { background: #fff; border-color: #F38020; box-shadow: 0 10px 20px rgba(243, 128, 32, 0.15); }
        body.light-mode .control-group label { color: #F38020; }
        body.light-mode .control-group input { accent-color: #F38020; }

        body.light-mode .code-editor-container { background: #fafafa; border-color: #F38020; box-shadow: 0 10px 20px rgba(243, 128, 32, 0.15); }
        body.light-mode .line-numbers { background: #f0f0f0; color: #aaa; border-right-color: #ddd; }
        body.light-mode .editor-textarea { caret-color: #000; }
        
        /* Light Mode Syntax Highlighting */
        body.light-mode .code-output-display { color: #24292e; }
        body.light-mode .hl-property { color: #005cc5; }
        body.light-mode .hl-string   { color: #032f62; }
        body.light-mode .hl-number   { color: #d73a49; }
        body.light-mode .hl-bracket  { color: #22863a; }

        body.light-mode .copy-btn { border-color: #F38020; color: #F38020; }
        body.light-mode .copy-btn:hover { background: #F38020; color: #fff; }

        body.light-mode .content-down { border-color: #F38020; box-shadow: 0 10px 20px rgba(243, 128, 32, 0.15); }

        /* 5. Mobile Responsive */
        .menu-toggle-btn {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 2000;
            padding: 10px 15px;
            background: #ff9e40;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .app-container {
                height: auto;
                min-height: 100vh;
                overflow: auto;
            }
            .main-content {
                margin-left: 0;
                padding: 20px;
                width: 100%;
                height: auto;
                min-height: 100vh;
                overflow: visible;
            }
            .menu-toggle-btn {
                display: block;
                color: #ffffff;
            }
            .sidebar {
                transform: translateX(-250px);
            }
            .sidebar.active {
                transform: translateX(0);
            }
            .workspace-container {
                display: flex;
                flex-direction: column;
                gap: 20px;
                height: auto;
            }
            .content-mid, .content-down-wrapper {
                height: 450px;
            }
        }
    </style>
</head>
<body>

<button class="menu-toggle-btn" onclick="toggleSidebar()">MENU</button>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <button class="menu-btn" onclick="location.href='../index'">Home</button>
        <button id="theme-toggle" class="theme-btn">DAY / NIGHT</button>
        <div>
            <button class="menu-btn" onclick="resetAll()">Reset</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-section">
            <h1>Glassmorphism Generator</h1>
            <p>Customize glass effect style and copy CSS code easily.</p>
        </header>

        <div class="workspace-container">
            <!-- 좌측: 슬라이더 컨트롤 + 커스텀 에디터창 -->
            <div class="content-mid">
                <div class="controls">
                    <div class="sliders-wrapper">
                        <div class="control-group">
                            <label>Blur (블러): <span id="blur-val">10</span>px</label>
                            <input type="range" id="blur" min="0" max="20" value="10">
                        </div>
                        <div class="control-group">
                            <label>Opacity (투명도): <span id="opacity-val">0.2</span></label>
                            <input type="range" id="opacity" min="0" max="1" step="0.05" value="0.2">
                        </div>
                        <div class="control-group">
                            <label>Border Radius (둥글기): <span id="radius-val">16</span>px</label>
                            <input type="range" id="radius" min="0" max="100" value="16">
                        </div>
                        <div class="control-group">
                            <label>Border Width (테두리 두께): <span id="border-val">1</span>px</label>
                            <input type="range" id="border-width" min="0" max="10" value="1">
                        </div>
                        <div class="control-group">
                            <label>Shadow Opacity (그림자): <span id="shadow-val">0.1</span></label>
                            <input type="range" id="shadow-opacity" min="0" max="0.5" step="0.01" value="0.1">
                        </div>
                    </div>

                    <div class="content-mid-header" style="margin-top: 4px;">
                        <span>CSS Output</span>
                        <button class="copy-btn" onclick="copyCode()">Copy</button>
                    </div>

                    <div class="code-editor-container">
                        <div class="line-numbers" id="line-numbers">1</div>
                        <div class="code-output-wrapper">
                            <textarea id="code-textarea" class="editor-textarea" spellcheck="false" readonly></textarea>
                            <pre id="code-output-display" class="code-output-display"></pre>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 우측: 미리보기 영역 -->
            <div class="content-down-wrapper">
                <label>Preview</label>
                <div class="content-down">
                    <div class="preview-area">
                        <div id="glass-preview">Glass Box</div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const sidebar = document.getElementById('sidebar');
    function toggleSidebar() { sidebar.classList.toggle('active'); }
    document.getElementById('theme-toggle').addEventListener('click', () => { document.body.classList.toggle('light-mode'); });
    document.querySelector('.main-content').addEventListener('click', () => { if (sidebar.classList.contains('active')) { sidebar.classList.remove('active'); } });

    const blurInput = document.getElementById('blur');
    const opacityInput = document.getElementById('opacity');
    const radiusInput = document.getElementById('radius');
    const borderWidthInput = document.getElementById('border-width');
    const shadowOpacityInput = document.getElementById('shadow-opacity');

    const blurVal = document.getElementById('blur-val');
    const opacityVal = document.getElementById('opacity-val');
    const radiusVal = document.getElementById('radius-val');
    const borderVal = document.getElementById('border-val');
    const shadowVal = document.getElementById('shadow-val');

    const preview = document.getElementById('glass-preview');
    const codeTextarea = document.getElementById('code-textarea');
    const codeDisplay = document.getElementById('code-output-display');
    const lineNumbers = document.getElementById('line-numbers');

    function highlightCSS(code) {
        const escaped = code
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');

        // CSS 구문 강조 정규식 매핑
        const tokenPattern = /([a-zA-Z\-]+)(?=\s*:)|("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')|(\d+(?:\.\d+)?(?:px|%|deg)?)?([(),])/g;

        return escaped.replace(/([a-zA-Z\-]+)(\s*:\s*)([^;]+)(;)/g, (match, prop, colon, val, semi) => {
            return `<span class="hl-property">${prop}</span>${colon}<span class="hl-string">${val}</span><span class="hl-bracket">${semi}</span>`;
        });
    }

    function updateStyle() {
        const blur = blurInput.value;
        const opacity = opacityInput.value;
        const radius = radiusInput.value;
        const borderWidth = borderWidthInput.value;
        const shadowOpacity = shadowOpacityInput.value;

        blurVal.innerText = blur;
        opacityVal.innerText = opacity;
        radiusVal.innerText = radius;
        borderVal.innerText = borderWidth;
        shadowVal.innerText = shadowOpacity;

        // 스타일 적용
        preview.style.background = `rgba(255, 255, 255, ${opacity})`;
        preview.style.backdropFilter = `blur(${blur}px)`;
        preview.style.webkitBackdropFilter = `blur(${blur}px)`;
        preview.style.borderRadius = `${radius}px`;
        preview.style.border = `${borderWidth}px solid rgba(255, 255, 255, 0.3)`;
        preview.style.boxShadow = `0 8px 32px 0 rgba(0, 0, 0, ${shadowOpacity})`;

        // CSS 코드 문자열 생성
        const cssCode = 
`background: rgba(255, 255, 255, ${opacity});
backdrop-filter: blur(${blur}px);
-webkit-backdrop-filter: blur(${blur}px);
border-radius: ${radius}px;
border: ${borderWidth}px solid rgba(255, 255, 255, 0.3);
box-shadow: 0 8px 32px 0 rgba(0, 0, 0, ${shadowOpacity});`;

        codeTextarea.value = cssCode;
        codeDisplay.innerHTML = highlightCSS(cssCode) + (cssCode.endsWith('\n') ? ' ' : '');

        const lineCount = cssCode.split('\n').length;
        lineNumbers.innerHTML = Array.from({ length: lineCount }, (_, i) => i + 1).join('<br>');
    }

    blurInput.addEventListener('input', updateStyle);
    opacityInput.addEventListener('input', updateStyle);
    radiusInput.addEventListener('input', updateStyle);
    borderWidthInput.addEventListener('input', updateStyle);
    shadowOpacityInput.addEventListener('input', updateStyle);

    codeTextarea.addEventListener('scroll', () => {
        codeDisplay.scrollTop = codeTextarea.scrollTop;
        codeDisplay.scrollLeft = codeTextarea.scrollLeft;
        lineNumbers.scrollTop = codeTextarea.scrollTop;
    });

    updateStyle();

    function copyCode() {
        const code = codeTextarea.value;
        if (!code) return;
        navigator.clipboard.writeText(code).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.textContent = 'Copied!';
            setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
        });
    }

    function resetAll() {
        blurInput.value = 10;
        opacityInput.value = 0.2;
        radiusInput.value = 16;
        borderWidthInput.value = 1;
        shadowOpacityInput.value = 0.1;
        updateStyle();
    }
</script>
</body>
</html>
