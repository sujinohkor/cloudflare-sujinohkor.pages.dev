<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한영 번역기</title>
    <style>
        body { font-family: 'Consolas', 'Malgun Gothic', monospace; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        textarea { width: 100%; height: 150px; padding: 10px; box-sizing: border-box; }
        .controls { margin: 10px 0; }
        /* 번역 결과를 보여줄 영역 */
        #translateFrame { width: 100%; height: 300px; border: 1px solid #ccc; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>한영 번역기</h2>
    <textarea id="textInput" placeholder="번역할 내용을 입력하세요"></textarea>
    
    <div class="controls">
        <button id="translateBtn">번역하기</button>
    </div>

    <!-- 결과가 표시될 영역 -->
    <iframe id="translateFrame" src="about:blank"></iframe>
</div>

<script>
    document.getElementById('translateBtn').addEventListener('click', () => {
        const text = document.getElementById('textInput').value;
        if (!text.trim()) {
            alert("내용을 입력하세요.");
            return;
        }
        // 구글 번역의 '임베디드' URL을 사용 (op=translate는 전체 화면용, 
        // iframe 내부에서 쓰기엔 구글 정책상 제한이 있을 수 있으나 작동 확인 가능)
        const url = `https://translate.google.com/?sl=ko&tl=en&text=${encodeURIComponent(text)}&op=translate`;
        document.getElementById('translateFrame').src = url;
    });
</script>
</body>
</html>
