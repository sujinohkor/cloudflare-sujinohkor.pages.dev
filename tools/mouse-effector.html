<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Effector</title>
    <link rel="icon" type="image/png" href="/assets/LOGO-orange.png">
    <style>
        /* 1. Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #202020; color: #fff; transition: background 0.3s; }
        
        /* 2. Layout */
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { 
            width: 250px; height: 100vh; position: fixed; left: 0; top: 0; 
            background-color: #101010; padding: 20px; z-index: 1000; 
            display: flex; flex-direction: column; transition: transform 0.3s ease;
        }
        .main-content { 
            margin-left: 250px; padding: 40px; flex: 1; 
            display: flex; flex-direction: column; min-height: 100vh; gap: 20px; overflow-y: auto; transition: 0.3s;
        }

        /* 3. Components */
        .menu-btn, .theme-btn { 
            width: 100%; padding: 10px; margin-bottom: 10px; cursor: pointer;
            background: #202020; color: #ff9e40; border: 2px solid #ff9e40; 
            border-radius: 50px; font-weight: bold; transition: all 0.3s;
        }
        .menu-btn:hover, .menu-btn.active { background: #ff9e40; color: #101010; }
        .theme-btn:hover { background-color: #FDF5E6; color: #F38020; border-color: #FDF5E6; }
        
        /* Workspace Structure */
        .workspace-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
        }

        .content-top { display: flex; flex-direction: column; gap: 8px; }
        .content-top label { color: #ff9e40; font-weight: bold; }
        .content-top input[type="text"] {
            width: 100%; padding: 12px; background: #101010; border: 2px solid #ff9e40;
            border-radius: 16px; color: #fff; font-size: 1rem; outline: none;
        }

        .content-mid { display: flex; flex-direction: column; gap: 8px; }
        .content-mid label { color: #ff9e40; font-weight: bold; }
        .content-mid textarea {
            width: 100%; height: 100%; min-height: 250px; padding: 12px;
            background: #101010; border: 2px solid #ff9e40; border-radius: 16px;
            color: #00ff66; font-family: 'Consolas', monospace; font-size: 0.9rem;
            resize: none; outline: none;
        }

        .content-down-wrapper { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .content-down-wrapper label { color: #ff9e40; font-weight: bold; }
        .content-down {
            position: relative; flex: 1; min-height: 250px;
            border: 2px dashed #ff9e40; border-radius: 16px; display: flex;
            align-items: center; justify-content: center; background: rgba(255, 158, 64, 0.05);
            overflow: hidden; cursor: crosshair;
        }
        .content-down p { color: #888; font-size: 1.1rem; pointer-events: none; user-select: none; }

        /* 마우스 효과용 클래스 */
        .rain-char, .trail-char, .cursor-text {
            position: absolute; pointer-events: none; font-weight: bold;
            color: #ff9e40; text-shadow: 0 0 5px rgba(255, 158, 64, 0.8);
            user-select: none; z-index: 100;
        }
        
        /* Type C 전용: 미리보기 영역 내 커서 숨기기 */
        .content-down.hide-cursor {
            cursor: none;
        }

        /* 4. Theme (Light Mode) */
        body.light-mode { background-color: #fff; }
        body.light-mode .sidebar { background-color: #FDF5E6; }
        body.light-mode .menu-btn, body.light-mode .theme-btn { background: #FDF5E6; color: #F38020; border-color: #F38020; }
        body.light-mode .menu-btn:hover, body.light-mode .menu-btn.active { background: #F38020; color: #ffffff; }
        body.light-mode .top-section h1, body.light-mode .top-section p { color: #202020; }
        body.light-mode .content-mid textarea, body.light-mode .content-top input { background: #FDF5E6; color: #000; }
        body.light-mode .menu-toggle-btn { color: #000000; }

        /* 5. Mobile Responsive */
        .menu-toggle-btn { display: none; position: fixed; bottom: 20px; left: 20px; z-index: 2000; padding: 10px 15px; background: #ff9e40; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
        
        @media (min-width: 769px) {
            .workspace-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
            .content-mid { flex: 1; }
        }

        @media (max-width: 768px) {
            .menu-toggle-btn { display: block; color: #ffffff; }
            .sidebar { transform: translateX(-250px); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; width: 100%; min-height: 100svh; }
            .workspace-container { gap: 15px; }
            .content-mid { flex: initial; }
            .content-mid textarea { height: 180px; min-height: 180px; }
            .content-down-wrapper { flex: 1; }
            .content-down { height: 100%; min-height: 200px; }
        }
    </style>
</head>
<body>

<button class="menu-toggle-btn" onclick="toggleSidebar()">MENU</button>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <button class="menu-btn" onclick="location.href='../index'">Home</button>
        <button id="theme-toggle" class="theme-btn">DAY / NIGHT</button>
        
        <div class="bottom-btns">
            <button class="menu-btn active" id="btn-none" onclick="switchMode('none')">None</button>
            <button class="menu-btn" id="btn-type-a" onclick="switchMode('typeA')">Type A</button>
            <button class="menu-btn" id="btn-type-b" onclick="switchMode('typeB')">Type B</button>
            <button class="menu-btn" id="btn-type-c" onclick="switchMode('typeC')">Type C</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-section">
            <h1 id="page-title">Mouse Effector</h1>
            <p id="page-desc">Select a mode from the sidebar to generate custom mouse effects.</p>
        </header>

        <div class="content-top">
            <label for="text-input">Text</label>
            <input type="text" id="text-input" value="Hello World!" placeholder="Type text here...">
        </div>

        <div class="workspace-container">
            <div class="content-mid">
                <label for="code-output">HTML</label>
                <textarea id="code-output" readonly></textarea>
            </div>

            <div class="content-down-wrapper">
                <label>Preview</label>
                <div class="content-down" id="preview-area">
                    <p id="preview-msg">Hover over this area to preview the effect.</p>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const sidebar = document.getElementById('sidebar');
    const textInput = document.getElementById('text-input');
    const codeOutput = document.getElementById('code-output');
    const previewArea = document.getElementById('preview-area');
    const previewMsg = document.getElementById('preview-msg');

    let currentMode = 'none';
    let trailElements = [];
    let mousePos = { x: 0, y: 0 };
    let charPositions = [];
    let trailAnimationId = null;
    let typeBCharIndex = 0;
    let lastTypeBTime = 0;
    let customCursorEl = null;

    function toggleSidebar() { sidebar.classList.toggle('active'); }
    document.getElementById('theme-toggle').addEventListener('click', () => { document.body.classList.toggle('light-mode'); });
    document.querySelector('.main-content').addEventListener('click', () => { if (sidebar.classList.contains('active')) { sidebar.classList.remove('active'); } });

    // 모드 변경 제어
    function switchMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.bottom-btns .menu-btn').forEach(btn => btn.classList.remove('active'));

        if (trailAnimationId) cancelAnimationFrame(trailAnimationId);
        clearTrailElements();
        previewArea.classList.remove('hide-cursor');

        if (mode === 'none') {
            document.getElementById('btn-none').classList.add('active');
            previewMsg.textContent = "No mouse effect currently applied (None).";
            updateUI();
        } else if (mode === 'typeA') {
            document.getElementById('btn-type-a').classList.add('active');
            previewMsg.textContent = "Hover over this area to preview the effect.";
            updateUI();
            animate();
        } else if (mode === 'typeB') {
            document.getElementById('btn-type-b').classList.add('active');
            previewMsg.textContent = "Move your mouse over this area to scatter and drop the text.";
            updateUI();
        } else if (mode === 'typeC') {
            document.getElementById('btn-type-c').classList.add('active');
            previewMsg.textContent = "Hover over this area to change the cursor to your entered text.";
            previewArea.classList.add('hide-cursor');
            updateUI();
        }
    }

    function clearTrailElements() {
        trailElements.forEach(el => el.remove());
        trailElements = [];
        charPositions = [];
        if (customCursorEl) {
            customCursorEl.remove();
            customCursorEl = null;
        }
    }

    // UI 및 생성 소스코드 갱신
    function updateUI() {
        const text = textInput.value;

        if (currentMode === 'none') {
            codeOutput.value = `<!-- No Mouse Effect Applied -->\n<span>${text}</span>`;
            clearTrailElements();
        } 
        else if (currentMode === 'typeA') {
            codeOutput.value = `<script>
(function() {
  const text = "${text}";
  const chars = [];
  let pos = { x: 0, y: 0 };
  let history = [];

  text.split('').forEach((ch, i) => {
    const el = document.createElement('span');
    el.style.cssText = 'position:fixed; pointer-events:none; color:#ff9e40; font-weight:bold; z-index:9999; transition:transform 0.1s ease-out;';
    el.textContent = ch === ' ' ? '\\u00A0' : ch;
    document.body.appendChild(el);
    chars.push(el);
    history.push({ x: 0, y: 0 });
  });

  window.addEventListener('mousemove', (e) => {
    pos.x = e.clientX;
    pos.y = e.clientY;
  });

  function render() {
    history.unshift({ ...pos });
    history.pop();
    chars.forEach((el, i) => {
      const p = history[Math.min(i * 3, history.length - 1)];
      el.style.transform = \`translate(\${p.x + (i * 12) + 15}px, \${p.y + 15}px)\`;
    });
    requestAnimationFrame(render);
  }
  render();
})();
<\/script>`;
            setupPreviewText(text);
        }
        else if (currentMode === 'typeB') {
            codeOutput.value = `<script>
(function() {
  const text = "${text}";
  const chars = text.split('');
  let charIndex = 0;
  let lastTime = 0;
  const cooldown = 50;

  window.addEventListener('mousemove', (e) => {
    const now = Date.now();
    if (now - lastTime < cooldown) return;
    lastTime = now;

    const el = document.createElement('span');
    const ch = chars[charIndex % chars.length];
    charIndex++;

    el.textContent = ch === ' ' ? '\\u00A0' : ch;
    el.style.cssText = \`
      position: fixed;
      left: \${e.clientX + (Math.random() * 20 - 10)}px;
      top: \${e.clientY + 10}px;
      pointer-events: none;
      color: #ff9e40;
      font-weight: bold;
      z-index: 9999;
      transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1), opacity 1.2s ease-out;
      opacity: 1;
      transform: translateY(0px);
    \`;
    document.body.appendChild(el);

    requestAnimationFrame(() => {
      el.style.transform = \`translateY(\${80 + Math.random() * 40}px) rotate(\${Math.random() * 40 - 20}deg)\`;
      el.style.opacity = '0';
    });

    setTimeout(() => {
      el.remove();
    }, 1200);
  });
})();
<\/script>`;
            clearTrailElements();
        }
        else if (currentMode === 'typeC') {
            // Type C: 커서 자체를 텍스트로 바꾸는 스크립트 생성
            codeOutput.value = `<script>
(function() {
  const text = "${text}";
  
  // 마우스 커서 숨기기
  document.body.style.cursor = 'none';

  // 커서 대체 텍스트 엘리먼트 생성
  const cursorEl = document.createElement('div');
  cursorEl.textContent = text;
  cursorEl.style.cssText = \`
    position: fixed;
    pointer-events: none;
    color: #ff9e40;
    font-weight: bold;
    font-size: 1.1rem;
    z-index: 99999;
    white-space: nowrap;
    text-shadow: 0 0 5px rgba(255, 158, 64, 0.8);
    transform: translate(0, 0);
  \`;
  document.body.appendChild(cursorEl);

  window.addEventListener('mousemove', (e) => {
    cursorEl.style.left = \`\${e.clientX + 10}px\`;
    cursorEl.style.top = \`\${e.clientY + 10}px\`;
  });
})();
<\/script>`;

            setupCustomCursor(text);
        }
    }

    function setupPreviewText(text) {
        clearTrailElements();
        const chars = text.split('');
        chars.forEach((ch) => {
            const span = document.createElement('span');
            span.className = 'trail-char';
            span.textContent = ch === ' ' ? '\u00A0' : ch;
            span.style.opacity = '0';
            previewArea.appendChild(span);
            trailElements.push(span);
            charPositions.push({ x: 0, y: 0 });
        });
    }

    function setupCustomCursor(text) {
        clearTrailElements();
        customCursorEl = document.createElement('div');
        customCursorEl.className = 'cursor-text';
        customCursorEl.textContent = text;
        customCursorEl.style.opacity = '0';
        previewArea.appendChild(customCursorEl);
    }

    // 이벤트 처리
    textInput.addEventListener('input', updateUI);

    previewArea.addEventListener('mousemove', (e) => {
        if (currentMode === 'none') return;

        const rect = previewArea.getBoundingClientRect();
        
        if (currentMode === 'typeA') {
            mousePos.x = e.clientX - rect.left;
            mousePos.y = e.clientY - rect.top;
            trailElements.forEach(el => el.style.opacity = '1');
        } 
        else if (currentMode === 'typeB') {
            const now = Date.now();
            if (now - lastTypeBTime < 50) return;
            lastTypeBTime = now;

            const text = textInput.value;
            if (!text) return;

            const chars = text.split('');
            const ch = chars[typeBCharIndex % chars.length];
            typeBCharIndex++;

            const el = document.createElement('span');
            el.className = 'rain-char';
            el.textContent = ch === ' ' ? '\u00A0' : ch;
            
            const startX = e.clientX - rect.left + (Math.random() * 24 - 12);
            const startY = e.clientY - rect.top + 10;
            
            el.style.left = `${startX}px`;
            el.style.top = `${startY}px`;
            el.style.opacity = '1';
            el.style.transition = 'transform 1.2s cubic-bezier(0.25, 1, 0.5, 1), opacity 1.2s ease-out';

            previewArea.appendChild(el);

            requestAnimationFrame(() => {
                const dropDistance = 80 + Math.random() * 40;
                const rotateDeg = Math.random() * 40 - 20;
                el.style.transform = `translateY(${dropDistance}px) rotate(${rotateDeg}deg)`;
                el.style.opacity = '0';
            });

            setTimeout(() => {
                el.remove();
            }, 1200);
        }
        else if (currentMode === 'typeC') {
            if (customCursorEl) {
                customCursorEl.style.left = `${e.clientX - rect.left + 8}px`;
                customCursorEl.style.top = `${e.clientY - rect.top + 8}px`;
                customCursorEl.style.opacity = '1';
            }
        }
    });

    previewArea.addEventListener('mouseleave', () => {
        if (currentMode === 'typeA') {
            trailElements.forEach(el => el.style.opacity = '0');
        } else if (currentMode === 'typeC' && customCursorEl) {
            customCursorEl.style.opacity = '0';
        }
    });

    function animate() {
        if (currentMode === 'typeA') {
            let currentX = mousePos.x;
            let currentY = mousePos.y;

            for (let i = 0; i < trailElements.length; i++) {
                if (i === 0) {
                    charPositions[i].x += (currentX + 12 - charPositions[i].x) * 0.3;
                    charPositions[i].y += (currentY + 12 - charPositions[i].y) * 0.3;
                } else {
                    const prev = charPositions[i - 1];
                    charPositions[i].x += (prev.x + 12 - charPositions[i].x) * 0.3;
                    charPositions[i].y += (prev.y - charPositions[i].y) * 0.3;
                }

                if (trailElements[i]) {
                    trailElements[i].style.left = `${charPositions[i].x}px`;
                    trailElements[i].style.top = `${charPositions[i].y}px`;
                }
            }
        }
        trailAnimationId = requestAnimationFrame(animate);
    }

    // 초기 실행
    switchMode('none');
</script>
</body>
</html>
