<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #202020; color: #fff; transition: background 0.3s; }
        
        /* Layout */
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; height: 100vh; position: fixed; left: 0; top: 0; background-color: #101010; padding: 20px; z-index: 1000; display: flex; flex-direction: column; transition: transform 0.3s ease; }
        .main-content { margin-left: 250px; padding: 40px; flex: 1; display: flex; flex-direction: column; height: 100vh; gap: 10px; overflow: hidden; transition: 0.3s; }

        /* Buttons & Menu */
        .menu-btn, .theme-btn { width: 100%; padding: 10px; margin-bottom: 10px; cursor: pointer; background: #202020; color: #ff9e40; border: 2px solid #ff9e40; border-radius: 50px; font-weight: bold; transition: all 0.3s; }
        .menu-btn:hover { background: #ff9e40; color: #101010; }
        .theme-btn:hover { background-color: #FDF5E6; color: #F38020; border-color: #FDF5E6; }
        .menu-list { margin: 20px 0; display: flex; flex-direction: column; gap: 10px; }
        .menu-list a { display: flex; justify-content: space-between; color: #fff; font-size: 0.95rem; }
        .menu-list span { color: #e68a35; font-weight: bold; }

        /* Sections */
        .top-section { margin-bottom: 0; padding-bottom: 10px; }
        .content-top, .content-down { flex: 2; border: 2px solid #ff9e40; border-radius: 16px; display: flex; overflow: hidden; }
        .content-down { flex: 1; }
        textarea { flex: 1; padding: 20px; background: transparent; border: none; color: #fff; font-family: 'Consolas', sans-serif; font-size: 1rem; resize: none; outline: none; }
        
        /* Controls */
        .qr-generator-controls, .qr-decoder-controls { background-color: #101010; padding: 20px; display: flex; flex-direction: column; gap: 15px; align-items: center; justify-content: flex-start; flex-shrink: 0; overflow-y: auto; }
        .qr-generator-controls { width: auto; min-width: 500px; min-height: 500px; border-left: 2px dashed #ff9e40; }
        .qr-decoder-controls { width: auto; min-width: 300px; min-height: 200px; border-right: 2px dashed #ff9e40; }
        
        .button-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .action-btn { width: 100px; padding: 10px; cursor: pointer; background: #202020; color: #ff9e40; border: 2px solid #ff9e40; border-radius: 50px; font-weight: bold; transition: all 0.3s; }
        .action-btn:hover { background: #ff9e40; color: #101010; }
        
        #qr-image { max-width: 100%; margin-top: 10px; border: none; display: none; }

        /* Light Mode */
        body.light-mode { background-color: #fff; color: #000; }
        body.light-mode .sidebar { background-color: #FDF5E6; }
        body.light-mode .top-section { color: #202020; }
        body.light-mode .qr-generator-controls, body.light-mode .qr-decoder-controls { background-color: #FDF5E6; }
        body.light-mode textarea { color: #000; }
        body.light-mode .menu-btn, body.light-mode .theme-btn, body.light-mode .action-btn { background: #FDF5E6; color: #F38020; border-color: #F38020; }
        body.light-mode .menu-btn:hover, body.light-mode .action-btn:hover { background: #F38020; color: #fff; }
        body.light-mode .theme-btn:hover { background-color: #202020; color: #ff9e40; border-color: #202020; }
        body.light-mode .menu-list a { color: #202020; }
        body.light-mode #byte-count { color: #F38020; }
        body.light-mode .menu-toggle-btn { color: #000000; }

        /* Responsive */
        .menu-toggle-btn { display: none; position: fixed; bottom: 20px; left: 20px; z-index: 2000; padding: 10px 15px; background: #ff9e40; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
        @media (max-width: 768px) {
            .menu-toggle-btn { display: block; color: #fff; }
            .sidebar { transform: translateX(-250px); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; }
            
            .content-top, .content-down { flex-direction: column; overflow-y: visible; }
            
            /* 1. 컨트롤러 전체 구조 변경: 가로 배치 */
            .qr-generator-controls { flex-direction: row; width: 100%; min-width: 0; min-height: auto; border-left: none; border-top: 2px dashed #ff9e40; align-items: flex-start; justify-content: flex-start; gap: 20px; }
        
            /* 2. 버튼 그룹을 세로로 정렬 */
            .button-group { flex-direction: column; width: 100px; flex-shrink: 0; }
            
            /* 버튼 모양도 살짝 다듬기 */
            .action-btn { width: 100px; margin-bottom: 5px; }

            /* placeholder-container가 전체 높이를 차지하며 중앙 정렬되도록 */
            #placeholder-container { width: calc(100% - 120px); height: 100%; flex-grow: 1; display: flex; flex-direction: column; align-items: flex-start; }
            
            /* 3. 이미지 영역 설정 */
            #qr-image { width: 150px; height: 150px; margin-top: 0; }
            #qr-placeholder { margin-top: 0; }
        
            #text-input { min-height: 150px; }
            .qr-decoder-controls { width: 100%; border-right: none; border-top: 2px dashed #ff9e40; display: flex; flex-direction: column; align-items: center; gap 10px; }

            /* 로드 이미지 영역의 span 스타일 조정 */
            #file-name { max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        }
    </style>
</head>
<body>

<button class="menu-toggle-btn" onclick="toggleSidebar()">MENU</button>
<input type="file" id="fileInput" accept="image/*" style="display:none;">

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <button class="menu-btn" onclick="location.href='../index'">Home</button>
        <button id="theme-toggle" class="theme-btn">DAY / NIGHT</button>
        <nav class="menu-list">
            <a>Byte Count <span id="byte-count">0/1000 B</span></a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-section">
            <h1>QR Generator</h1>
            <p>You can make your own QR, etc.</p>
        </header>

        <section class="content-top">
            <textarea id="text-input" placeholder="Enter text or url here. Maximum 1,000 bytes."></textarea>
            <div class="qr-generator-controls">
                <div class="button-group">
                    <button class="action-btn" onclick="generateQR()">Generate</button>
                    <button class="action-btn" onclick="saveQR()">Save QR</button>
                    <button class="action-btn" onclick="resetGenerator()">Reset</button>
                </div>
                <img id="qr-image" alt="QR">
                <div id="placeholder-container" style="display: flex; align-items: center; justify-content: center; flex-grow: 1;">
                    <div id="qr-placeholder" style="color: #888;">QR will be here.</div>
                </div>
            </div>
        </section>
        
        <section class="content-down">
            <div class="qr-decoder-controls">
                <!-- 가로 배치를 위해 컨테이너로 감쌈 -->
                <div style="display: flex; align-items: center; gap: 10px; width: 100%; justify-content: center;">
                    <button class="action-btn" onclick="document.getElementById('fileInput').click()">Load Image</button>
                    <span id="file-name" style="font-size: 0.8rem;">No file chosen</span>
                </div>
                <button class="action-btn" onclick="decodeQR()">Decode QR</button>
                <button class="action-btn" onclick="resetDecoder()">Reset</button>
            </div>
            <textarea id="resultText" readonly placeholder="Decoded text will appear here."></textarea>
        </section>
    </main>
</div>

<script>
    const textInput = document.getElementById('text-input');
    const qrImage = document.getElementById('qr-image');
    const qrPlaceholder = document.getElementById('qr-placeholder');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('file-name');
    const resultText = document.getElementById('resultText');
    const byteCountDisplay = document.getElementById('byte-count');

    // UI 및 이벤트 설정
    document.getElementById('theme-toggle').addEventListener('click', () => document.body.classList.toggle('light-mode'));
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    
    // 바이트 계산 및 제한
    function updateByteCount() {
        const encoder = new TextEncoder();
        let text = textInput.value;
        if (encoder.encode(text).length > 1000) {
            while (encoder.encode(text).length > 1000) text = text.slice(0, -1);
            textInput.value = text;
        }
        byteCountDisplay.textContent = encoder.encode(text).length + '/1000 B';
    }
    textInput.addEventListener('input', updateByteCount);

    // QR 생성
    async function generateQR() {
        updateByteCount();
        const text = textInput.value.trim();
        if (!text) return alert("Please enter text first.");
        
        const url = `https://api.qrserver.com/v1/create-qr-code/?size=350x350&data=${encodeURIComponent(text)}`;
        try {
            const response = await fetch(url);
            if (response.ok) {
                qrImage.src = url;
                qrImage.style.display = "inline-block";
                qrPlaceholder.style.display = "none";
            } else {
                alert("Failed to generate QR.");
            }
        } catch (e) {
            alert("An error occurred.");
        }
    }

    // QR 저장
    async function saveQR() {
        if (!qrImage.src || qrImage.style.display === 'none') return alert("Please generate a QR first.");
        const response = await fetch(qrImage.src);
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'QRGenerator.png';
        link.click();
    }

    // 리셋
    function resetGenerator() {
        textInput.value = '';
        qrImage.style.display = 'none';
        qrPlaceholder.style.display = 'block';
        updateByteCount();
    }
    function resetDecoder() {
        fileInput.value = '';
        fileName.innerText = "No file chosen";
        resultText.value = '';
    }

    // 디코딩
    fileInput.addEventListener('change', (e) => { if (e.target.files[0]) fileName.innerText = e.target.files[0].name; });
    async function decodeQR() {
        const file = fileInput.files[0];
        if (!file) return alert("Please load a QR first.");
        const formData = new FormData();
        formData.append('file', file);
        try {
            const response = await fetch('https://api.qrserver.com/v1/read-qr-code/', { method: 'POST', body: formData });
            const data = await response.json();
            resultText.value = data[0]?.symbol[0]?.data || "QR not found.";
        } catch { alert("Failed to decode."); }
    }
</script>
</body>
</html>
