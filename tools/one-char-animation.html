<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title id="pageTitle">Text to SVG Grid</title>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; 
            background: #000; color: white; padding-top: 50px; margin: 0; 
            font-family: sans-serif;
        }
        
        /* 전체 컨테이너를 800px로 맞춤 */
        .main-container { width: 800px; display: flex; flex-direction: column; align-items: center; }

        /* 헤더: 3등분 그리드 배치 */
        .header-container { 
            display: grid; 
            grid-template-columns: 100px 1fr 100px; 
            width: 100%; 
            align-items: center; 
            margin-bottom: 20px;
        }

        /* 텍스트박스 */
        #textInput { 
            padding: 12px 20px; width: 300px; justify-self: center;
            text-align: center; border-radius: 25px; 
            border: 2px solid #555; background: #111; color: white; 
        }
        
        /* 버튼 */
        #homeBtn { 
            padding: 10px 20px; cursor: pointer; justify-self: end;
            background: #333; color: white; border: 1px solid #555; border-radius: 20px; 
        }
        #homeBtn:hover { background: #444; }
        
        /* SVG 테두리 및 둥근 모서리 */
        #canvas-svg { 
            border: 3px solid #333; 
            border-radius: 30px; 
            background: #000;
        }
        
        .dot { transition: fill 0.3s ease; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-container">
            <div></div> <!-- 왼쪽 여백용 -->
            <input type="text" id="textInput" maxlength="1">
            <button onclick="location.href='../index.html'" id="homeBtn">집으로</button>
        </div>

        <svg id="canvas-svg" width="800" height="400" viewBox="0 0 800 400"></svg>
    </div>

    <script>
        const isKorean = navigator.language.startsWith('ko');
        const pageTitle = document.getElementById('pageTitle');
        const textInput = document.getElementById('textInput');
        const homeBtn = document.getElementById('homeBtn');

        if (isKorean) {
            pageTitle.innerText = "텍스트 SVG 그리드";
            textInput.placeholder = "글자를 입력하세요";
            homeBtn.innerText = "집으로";
        } else {
            pageTitle.innerText = "Text to SVG Grid";
            textInput.placeholder = "Enter a character";
            homeBtn.innerText = "Go Home";
        }

        const svg = document.getElementById('canvas-svg');
        const rows = 20, cols = 40, size = 15;
        const circles = [];
        const startX = (800 - (cols - 1) * size) / 2;
        const startY = (400 - (rows - 1) * size) / 2;

        for (let i = 0; i < rows; i++) {
            for (let j = 0; j < cols; j++) {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", startX + j * size);
                circle.setAttribute("cy", startY + i * size);
                circle.setAttribute("r", "3");
                circle.setAttribute("fill", "#21252a");
                circle.classList.add('dot');
                svg.appendChild(circle);
                circles.push(circle);
            }
        }

        textInput.addEventListener('input', (e) => {
            const text = e.target.value;
            // 초기화
            circles.forEach(c => c.setAttribute("fill", "#21252a"));
            if (!text) return;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = cols; canvas.height = rows;
            ctx.fillStyle = 'white';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, cols / 2, rows / 2);

            const imageData = ctx.getImageData(0, 0, cols, rows).data;
            for (let i = 0; i < rows * cols; i++) {
                if (imageData[i * 4 + 3] > 128) {
                    circles[i].setAttribute("fill", "#ffffff");
                }
            }
        });
    </script>
</body>
</html>
