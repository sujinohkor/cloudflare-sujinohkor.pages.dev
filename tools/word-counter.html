<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #202020; transition: background 0.3s; }

        .app-container { display: flex; min-height: 100vh; }

        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed; 
            left: 0;
            top: 0;
            background-color: #101010;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .menu-btn {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            background: #202020;
            color: #ff9e40;
            border: 2px solid #ff9e40;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .menu-btn:hover { background: #ff9e40; color: #101010; }

        .theme-btn {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            cursor: pointer;
            background: #202020;
            color: #ff9e40;
            border: 2px solid #ff9e40;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .theme-btn:hover { 
            background-color: #FDF5E6; 
            color: #F38020; 
            border-color: #FDF5E6; 
        }

        .menu-list { 
            margin: 20px 0; 
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-list a {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            text-decoration: none;
            color: #FFFFFF;
            font-size: 0.95rem;
            cursor: default;
        }

        .menu-list a span {
            color: #e68a35;
            font-weight: bold;
        }

        .bottom-btns {
            margin-top: 10px; /* 여기서 하단 버튼과의 간격을 조절하세요 */
        }

        .top-section { margin-bottom: 30px; }
        .top-section h1, .top-section p { color: #FFFFFF; }

        .main-content {
            margin-left: 250px;
            padding: 40px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .content-card {
            background: transparent;
            border-radius: 16px;
            border: 2px solid #ff9e40;
            width: 100%;
            min-height: calc(100vh - 180px);
            display: flex; 
            overflow: hidden;
        }

        .content-card textarea {
            width: 100%;
            flex: 1; 
            border: none;
            outline: none;
            resize: none;
            font-family: inherit;
            /* textarea에만 적용되는 폰트 설정 */
            font-family: 'Consolas', 'Malgun Gothic', sans-serif;
            font-size: 1rem;
            padding: 40px;
            background-color: transparent; 
            color: #ffffff;
            border-radius: 16px;
        }

        .content-card textarea::placeholder { color: #888888; opacity: 1; }

        body.light-mode { background-color: #ffffff; }
        body.light-mode .sidebar { background-color: #FDF5E6; }
        body.light-mode .menu-btn { background: #FDF5E6; color: #F38020; border-color: #F38020; }
        body.light-mode .menu-btn:hover { background: #F38020; color: #ffffff; }
        body.light-mode .theme-btn { background: #FDF5E6; color: #F38020; border-color: #F38020; }
        body.light-mode .top-section h1, body.light-mode .top-section p { color: #202020; }
        body.light-mode .content-card { background: #ffffff; }
        body.light-mode .content-card textarea { color: #000000; }
        body.light-mode .menu-list a { color: #202020; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <button class="menu-btn" onclick="location.href='#'">Home</button>
        <button id="theme-toggle" class="theme-btn">DAY / NIGHT</button>
        
        <nav class="menu-list">
            <a>Characters (with spaces) <span id="char-count-all">0</span></a>
            <a>Characters (no spaces) <span id="char-count-no-space">0</span></a>
            <a>Word Count <span id="word-count">0</span></a>
            <a>Paragraph Count <span id="para-count">0</span></a>
            <a>Byte Count <span id="byte-count">0</span></a>
        </nav>

        <div class="bottom-btns">
            <button class="menu-btn" onclick="copyText()">Copy</button>
            <button class="menu-btn" onclick="saveText()">Save as Text File</button>
            <button class="menu-btn" onclick="resetText()">Reset</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-section">
            <h1>Word Counter</h1>
            <p>You can count the number of words, etc.</p>
        </header>

        <section class="main-content-section">
            <div class="content-card">
                <textarea id="text-input" placeholder="Enter text here."></textarea>
            </div>
        </section>
    </main>
</div>

<script>
    const textInput = document.getElementById('text-input');

    textInput.addEventListener('input', () => {
        const text = textInput.value;
        document.getElementById('char-count-all').innerText = text.length;
        document.getElementById('char-count-no-space').innerText = text.replace(/\s/g, '').length;
        
        const words = text.trim().split(/\s+/).filter(w => w.length > 0);
        document.getElementById('word-count').innerText = words.length;
        
        const paras = text.split('\n').filter(p => p.trim().length > 0);
        document.getElementById('para-count').innerText = paras.length;
        
        let byteCount = 0;
        for (let i = 0; i < text.length; i++) {
            byteCount += (text.charCodeAt(i) > 127) ? 2 : 1;
        }
        document.getElementById('byte-count').innerText = byteCount;
    });

    document.getElementById('theme-toggle').addEventListener('click', () => {
        document.body.classList.toggle('light-mode');
    });

    function resetText() {
        textInput.value = '';
        textInput.dispatchEvent(new Event('input'));
    }

    function copyText() {
        const text = textInput.value;
        if (text === "") {
            alert('No text to copy.');
        } else {
            textInput.select();
            document.execCommand('copy');
            textInput.selectionStart = textInput.selectionEnd;
            alert('Text copied!');
        }
    }

    function saveText() {
        const text = textInput.value;
        const blob = new Blob([text], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'WordCounter.txt';
        link.click();
    }
</script>

</body>
</html>
