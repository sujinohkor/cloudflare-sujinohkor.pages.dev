<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Sequential Stroke Animation</title>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; 
            background: #000; color: white; padding-top: 50px; margin: 0; 
            font-family: sans-serif;
        }
        .main-container { width: 800px; display: flex; flex-direction: column; align-items: center; }
        .header-container { 
            display: grid; grid-template-columns: 100px 1fr 100px; 
            width: 100%; align-items: center; margin-bottom: 20px; 
        }
        .control-container { display: flex; gap: 10px; margin-bottom: 20px; }
        #textInput { 
            padding: 12px 20px; width: 300px; justify-self: center;
            text-align: center; border-radius: 25px; 
            border: 2px solid #555; background: #111; color: white; 
        }
        button { 
            padding: 10px 20px; cursor: pointer;
            background: #333; color: white; border: 1px solid #555; border-radius: 20px; 
        }
        button:hover { background: #444; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        #homeBtn { justify-self: end; }
        #canvas-svg { 
            border: 3px solid #333; 
            border-radius: 30px; 
            background: #000;
        }
        .dot { transition: fill 0.1s linear; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-container">
            <div></div>
            <input type="text" id="textInput" placeholder="텍스트를 입력하세요" maxlength="333">
            <button id="homeBtn" onclick="location.href='../index.html'">집으로</button>
        </div>

        <div class="control-container">
            <button class="animBtn" id="showOneCharBtn">한글자씩 보여주기</button>
            <button class="animBtn" id="showTopDownBtn">위에서 아래로 보여주기</button>
            <button class="animBtn" id="showTickerTapeBtn">전광판처럼 보여주기</button>
            <button id="resetBtn">초기화</button>
        </div>

        <svg id="canvas-svg" width="800" height="400" viewBox="0 0 800 400"></svg>
    </div>

    <script>
        const svg = document.getElementById('canvas-svg');
        const input = document.getElementById('textInput');
        const animBtns = document.querySelectorAll('.animBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        const rows = 20, cols = 40, size = 15;
        const circles = [];
        let isRunning = false;

        const startX = (800 - (cols - 1) * size) / 2;
        const startY = (400 - (rows - 1) * size) / 2;

        for (let i = 0; i < rows; i++) {
            for (let j = 0; j < cols; j++) {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", startX + j * size);
                circle.setAttribute("cy", startY + i * size);
                circle.setAttribute("r", "3");
                circle.setAttribute("fill", "#21252a");
                svg.appendChild(circle);
                circles.push(circle);
            }
        }

        function getCharData(char) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = cols; canvas.height = rows;
            ctx.fillStyle = 'white';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(char, cols / 2, rows / 2);
            return ctx.getImageData(0, 0, cols, rows).data;
        }

        function setButtonsDisabled(disabled) {
            animBtns.forEach(btn => btn.disabled = disabled);
        }

        function resetAnimation() {
            isRunning = false;
            setButtonsDisabled(false);
            circles.forEach(c => c.setAttribute("fill", "#21252a"));
        }

        resetBtn.addEventListener('click', () => {
            resetAnimation();
            input.value = '';
        });

        // 1. 한글자씩 보여주기
        document.getElementById('showOneCharBtn').addEventListener('click', async () => {
            isRunning = true; setButtonsDisabled(true);
            for (let char of input.value) {
                if (!isRunning) break;
                circles.forEach(c => c.setAttribute("fill", "#21252a"));
                const data = getCharData(char);
                circles.forEach((c, i) => { if(data[i*4+3] > 128) c.setAttribute("fill", "#ffffff"); });
                await new Promise(r => setTimeout(r, 800));
            }
            isRunning = false; setButtonsDisabled(false);
            circles.forEach(c => c.setAttribute("fill", "#21252a"));
        });

        // 2. 위에서 아래로 보여주기 (Stroke)
        document.getElementById('showTopDownBtn').addEventListener('click', async () => {
            isRunning = true; setButtonsDisabled(true);
            for (let char of input.value) {
                if (!isRunning) break;
                const data = getCharData(char);
                for (let i = 0; i < circles.length; i++) {
                    if (!isRunning) break;
                    if (data[i*4+3] > 128) {
                        circles[i].setAttribute("fill", "#ffffff");
                        await new Promise(r => setTimeout(r, 30));
                    }
                }
                await new Promise(r => setTimeout(r, 500));
                circles.forEach(c => c.setAttribute("fill", "#21252a"));
            }
            isRunning = false; setButtonsDisabled(false);
        });

        // 3. 전광판처럼 보여주기 (Ticker Tape)
        document.getElementById('showTickerTapeBtn').addEventListener('click', async () => {
            isRunning = true; setButtonsDisabled(true);
            const text = input.value;
            const scrollCanvas = document.createElement('canvas');
            const scrollCtx = scrollCanvas.getContext('2d');
            scrollCanvas.width = text.length * cols + cols;
            scrollCanvas.height = rows;
            scrollCtx.fillStyle = 'white';
            scrollCtx.font = 'bold 20px Arial';
            scrollCtx.textBaseline = 'middle';
            scrollCtx.fillText(text, cols, rows / 2);

            for (let offset = 0; offset <= text.length * cols; offset++) {
                if (!isRunning) break;
                const frameData = scrollCtx.getImageData(offset, 0, cols, rows).data;
                circles.forEach((c, i) => {
                    c.setAttribute("fill", frameData[i*4+3] > 128 ? "#ffffff" : "#21252a");
                });
                await new Promise(r => setTimeout(r, 80));
            }
            isRunning = false; setButtonsDisabled(false);
            circles.forEach(c => c.setAttribute("fill", "#21252a"));
        });
    </script>
</body>
</html>
