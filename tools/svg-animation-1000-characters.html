<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Sequential Stroke Animation</title>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; 
            background: #000; color: white; padding-top: 50px; margin: 0; 
            font-family: sans-serif;
        }

        .main-container { width: 800px; display: flex; flex-direction: column; align-items: center; }

        /* 상단 헤더: 입력창과 집으로 버튼 */
        .header-container { 
            display: grid; grid-template-columns: 100px 1fr 100px; 
            width: 100%; align-items: center; margin-bottom: 20px; 
        }

        /* 컨트롤 영역: 보여주기, 초기화 버튼 */
        .control-container { display: flex; gap: 10px; margin-bottom: 20px; }

        /* 텍스트박스 */
        #textInput { 
            padding: 12px 20px; width: 300px; justify-self: center;
            text-align: center; border-radius: 25px; 
            border: 2px solid #555; background: #111; color: white; 
        }

        /* 버튼 공통 스타일 */
        button { 
            padding: 10px 20px; cursor: pointer;
            background: #333; color: white; border: 1px solid #555; border-radius: 20px; 
        }
        button:hover { background: #444; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        #homeBtn { justify-self: end; }

        /* SVG 박스 테두리 */
        #canvas-svg { 
            border: 3px solid #333; 
            border-radius: 30px; 
            background: #000;
        }

        .dot { transition: fill 0.1s linear; }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- 상단: 입력창과 집으로 -->
        <div class="header-container">
            <div></div>
            <input type="text" id="textInput" placeholder="텍스트를 입력하세요" maxlength="333">
            <button id="homeBtn" onclick="location.href='../index.html'">집으로</button>
        </div>

        <!-- 중단: 버튼들 -->
        <div class="control-container">
            <button id="showOneCharBtn">한글자씩 보여주기</button>
            <button id="showTopDownBtn">위에서 아래로 보여주기</button>
            <button id="showTickerTapeBtn">전광판처럼 보여주기</button>
            <button id="resetBtn">초기화</button>
        </div>

        <svg id="canvas-svg" width="800" height="400" viewBox="0 0 800 400"></svg>
    </div>

    <script>
        const svg = document.getElementById('canvas-svg');
        const input = document.getElementById('textInput');
        const showOneCharBtn = document.getElementById('showOneCharBtn');
        const showTopDownBtn = document.getElementById('showTopDownBtn');
        const showTickerTapeBtn = document.getElementById('showTickerTapeBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        const rows = 20, cols = 40, size = 15;
        const circles = [];
        let isRunning = false; // 애니메이션 상태 플래그

        // 1. 점들을 캔버스 가운데에 정렬하기 위한 좌표 계산
        const startX = (800 - (cols - 1) * size) / 2;
        const startY = (400 - (rows - 1) * size) / 2;

        for (let i = 0; i < rows; i++) {
            for (let j = 0; j < cols; j++) {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", startX + j * size);
                circle.setAttribute("cy", startY + i * size);
                circle.setAttribute("r", "3");
                circle.setAttribute("fill", "#21252a");
                svg.appendChild(circle);
                circles.push(circle);
            }
        }

        function getCharData(char) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = cols; canvas.height = rows;
            ctx.fillStyle = 'white';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(char, cols / 2, rows / 2);
            return ctx.getImageData(0, 0, cols, rows).data;
        }

        // 초기화 함수
        function resetAnimation() {
            isRunning = false;
            showTopDownBtn.disabled = false;
            input.value = ''; // 텍스트 박스 내용까지 초기화
            circles.forEach(c => c.setAttribute("fill", "#21252a"));
        }

        showTopDownBtn.addEventListener('click', async () => {
            isRunning = true;
            showTopDownBtn.disabled = true;
            circles.forEach(c => c.setAttribute("fill", "#21252a"));
            
            const text = input.value;
            for (let char of text) {
                if (!isRunning) break; 
                
                const imageData = getCharData(char);
                const activeIndices = [];
                for (let i = 0; i < circles.length; i++) {
                    if (imageData[i * 4 + 3] > 128) activeIndices.push(i);
                }

                for (let index of activeIndices) {
                    if (!isRunning) break;
                    circles[index].setAttribute("fill", "#ffffff");
                    await new Promise(r => setTimeout(r, 30));
                }

                if (!isRunning) break;
                await new Promise(r => setTimeout(r, 500));
                circles.forEach(c => c.setAttribute("fill", "#21252a"));
            }
            showTopDownBtn.disabled = false;
        });

        resetBtn.addEventListener('click', resetAnimation);
    </script>
</body>
</html>
