<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="pageTitle">ASCII Art Converter</title>
    <style>
        body { font-family: 'Consolas', monospace; background-color: #FDF5E6; padding: 40px 20px; text-align: center; }
        h2 { font-size: 2.2rem; margin-bottom: 30px; }
        
        #asciiOutput { 
            white-space: pre; 
            margin-top: 40px; 
            background: white; 
            padding: 30px; 
            display: block; /* 중앙 정렬을 위해 block으로 변경 */
            border-radius: 20px;
            width: 90%; 
            margin-left: auto; /* 좌우 여백 자동화 */
            margin-right: auto; /* 좌우 여백 자동화 */
            overflow-x: auto;
            text-align: center;
        }
        canvas { display: none !important; width: 0; height: 0; }
        .file-upload-btn { display: inline-block; padding: 20px 40px; background-color: #ff9e40; color: white; border-radius: 20px; cursor: pointer; font-size: 1.5rem; font-weight: bold; transition: background-color 0.3s; }
        .buttons { margin-top: 40px; display: flex; justify-content: center; gap: 10px; flex-wrap: nowrap; }
        button { padding: 15px 10px; cursor: pointer; border-radius: 15px; border: none; background: #ddd; font-size: 1rem; flex: 1; min-width: 0; }
    </style>
</head>
<body>
    <h2 id="mainHeading">이미지 → 아스키 아트 변환기</h2>
    <label for="imageInput" class="file-upload-btn" id="fileLabel">이미지 선택하기</label>
    <input type="file" id="imageInput" accept="image/*" style="display:none;">
    <br>
    <div id="asciiOutput"></div>
    <div class="buttons">
        <button id="copyBtn">복사하기</button>
        <button id="saveBtn">저장</button>
        <button id="resetBtn">초기화</button>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const lang = {
            ko: { heading: "이미지 → 아스키 아트 변환기", label: "이미지 선택하기", copy: "복사하기", save: "저장", reset: "초기화", alertCopy: "복사되었습니다." },
            en: { heading: "Image to ASCII Art Converter", label: "Select Image", copy: "Copy", save: "Save", reset: "Reset", alertCopy: "Copied!" }
        };
        const userLang = (navigator.language || navigator.userLanguage).startsWith('ko') ? 'ko' : 'en';
        const t = lang[userLang];
        document.getElementById('mainHeading').textContent = t.heading;
        document.getElementById('fileLabel').textContent = t.label;
        document.getElementById('copyBtn').textContent = t.copy;
        document.getElementById('saveBtn').textContent = t.save;
        document.getElementById('resetBtn').textContent = t.reset;

        const imageInput = document.getElementById('imageInput'), asciiOutput = document.getElementById('asciiOutput'), canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d'), chars = " .:-=+*#%@";

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    // 이미지 크기에 따른 글자 크기 동적 조절
                    const baseWidth = 100;
                    const fontSize = Math.max(2, 800 / img.width); 
                    asciiOutput.style.fontSize = fontSize + "px";
                    asciiOutput.style.lineHeight = fontSize + "px";

                    canvas.width = baseWidth;
                    canvas.height = Math.floor((img.height / img.width) * baseWidth * 0.5);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    let asciiStr = "";
                    for (let y = 0; y < canvas.height; y++) {
                        for (let x = 0; x < canvas.width; x++) {
                            const offset = (y * canvas.width + x) * 4;
                            const avg = (imageData.data[offset] + imageData.data[offset+1] + imageData.data[offset+2]) / 3;
                            asciiStr += chars[Math.min(Math.floor((avg / 255) * (chars.length - 1)), chars.length - 1)];
                        }
                        asciiStr += "\n";
                    }
                    asciiOutput.textContent = asciiStr;
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
        // (버튼 이벤트 리스너는 이전과 동일)
    </script>
</body>
</html>
