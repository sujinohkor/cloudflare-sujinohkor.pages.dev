<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="pageTitle">ASCII Art Converter</title>
    <style>
        body { 
            font-family: 'Malgun Gothic', 'Consolas', monospace; 
            background-color: #FDF5E6; 
            padding: 40px 20px; 
            text-align: center; 
            margin: 0;
        }
        h2 { font-size: 2.2rem; margin-bottom: 30px; }
        
        #asciiOutput { 
            white-space: pre; 
            margin-top: 40px; 
            background: white; 
            padding: 15px; 
            display: block; 
            border-radius: 20px;
            /* 테두리 색상 적용 */
            border: 3px solid #ff9e40; 
            width: calc(100% - 40px); 
            max-width: 800px; 
            margin-left: auto; 
            margin-right: auto;
            overflow-x: hidden; 
            word-break: break-all;
            box-sizing: border-box; 
            text-align: center;
        }
        
        /* 캔버스 완전히 숨김[cite: 3] */
        canvas { 
            display: none !important; 
            visibility: hidden; 
            width: 0; 
            height: 0; 
        }
        
        .btn-container { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            flex-wrap: nowrap; 
            max-width: 600px; 
            margin: 20px auto; 
        }
        
        .btn-style { 
            padding: 15px 10px; 
            cursor: pointer; 
            border-radius: 15px; 
            border: none; 
            background: #ddd; 
            font-size: 1rem; 
            flex: 1; 
            min-width: 0; 
            max-width: 150px; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: black;
            font-family: inherit;
        }
        
        .file-upload-btn { background-color: #ff9e40; color: white; font-weight: bold; }
        .file-upload-btn:hover { background-color: #e68a35; }
        .btn-style:hover { background-color: #ccc; }
    </style>
</head>
<body>
    <h2 id="mainHeading">이미지 → 아스키 아트 변환기</h2>
    
    <div class="btn-container">
        <label for="imageInput" class="btn-style file-upload-btn" id="fileLabel">이미지 선택하기</label>
        <a href="../index" class="btn-style" id="homeBtn">집으로</a>
    </div>
    <input type="file" id="imageInput" accept="image/*" style="display:none;">
    
    <div id="asciiOutput"></div>

    <div class="btn-container">
        <button class="btn-style" id="copyBtn">복사하기</button>
        <button class="btn-style" id="saveBtn">저장</button>
        <button class="btn-style" id="resetBtn">초기화</button>
    </div>
    
    <canvas id="canvas"></canvas>

    <script>
        const lang = {
            ko: { heading: "이미지 → 아스키 아트 변환기", label: "이미지 선택하기", home: "집으로", copy: "복사하기", save: "저장", reset: "초기화", alertCopy: "복사되었습니다." },
            en: { heading: "Image to ASCII Art Converter", label: "Select Image", home: "Go Home", copy: "Copy", save: "Save", reset: "Reset", alertCopy: "Copied!" }
        };
        const userLang = (navigator.language || navigator.userLanguage).startsWith('ko') ? 'ko' : 'en';
        const t = lang[userLang];
        
        document.getElementById('mainHeading').textContent = t.heading;
        document.getElementById('fileLabel').textContent = t.label;
        document.getElementById('homeBtn').textContent = t.home;
        document.getElementById('copyBtn').textContent = t.copy;
        document.getElementById('saveBtn').textContent = t.save;
        document.getElementById('resetBtn').textContent = t.reset;

        const imageInput = document.getElementById('imageInput'), asciiOutput = document.getElementById('asciiOutput'), canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d'), chars = " .:-=+*#%@";

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const baseWidth = 60; 
                    const fontSize = Math.min(8, 350 / baseWidth); 
                    asciiOutput.style.fontSize = fontSize + "px";
                    asciiOutput.style.lineHeight = fontSize + "px";
                    canvas.width = baseWidth;
                    canvas.height = Math.floor((img.height / img.width) * baseWidth * 0.5);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    let asciiStr = "";
                    for (let y = 0; y < canvas.height; y++) {
                        for (let x = 0; x < canvas.width; x++) {
                            const offset = (y * canvas.width + x) * 4;
                            const avg = (imageData.data[offset] + imageData.data[offset+1] + imageData.data[offset+2]) / 3;
                            asciiStr += chars[Math.min(Math.floor((avg / 255) * (chars.length - 1)), chars.length - 1)];
                        }
                        asciiStr += "\n";
                    }
                    asciiOutput.textContent = asciiStr;
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            if (!asciiOutput.textContent) return;
            navigator.clipboard.writeText(asciiOutput.textContent);
            alert(t.alertCopy);
        });

        document.getElementById('saveBtn').addEventListener('click', () => {
            if (!asciiOutput.textContent) return;
            const blob = new Blob([asciiOutput.textContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ascii-art.txt';
            a.click();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            asciiOutput.textContent = '';
            imageInput.value = '';
        });
    </script>
</body>
</html>
