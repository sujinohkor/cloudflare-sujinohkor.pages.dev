<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Calculator</title>
    <link rel="icon" type="image/png" href="/assets/LOGO-orange.png">
    <style>
        /* 1. Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #202020; color: #fff; transition: background 0.3s; }
                
        /* 2. Layout */
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { 
            width: 250px; height: 100vh; position: fixed; left: 0; top: 0; 
            background-color: #101010; padding: 20px; z-index: 1000; 
            display: flex; flex-direction: column; transition: transform 0.3s ease; 
        }
                
        .main-content { 
            margin-left: 250px; padding: 40px; flex: 1; 
            display: flex; flex-direction: column; height: 100vh; gap: 20px; overflow: hidden; transition: 0.3s; 
        }

        .workspace-container {
            display: flex;
            flex-direction: row;
            flex: 1;
            gap: 20px;
            min-height: 0;
            overflow-y: auto;
            align-items: flex-start;
        }

        /* 3. Components */
        .menu-btn, .theme-btn { 
            width: 100%; padding: 10px; margin-bottom: 10px; cursor: pointer;
            background: #202020; color: #ff9e40; border: 2px solid #ff9e40; 
            border-radius: 50px; font-weight: bold; transition: all 0.3s; text-align: center;
        }
        .menu-btn:hover { background: #ff9e40; color: #101010; }
        .theme-btn:hover { background-color: #FDF5E6; color: #F38020; border-color: #FDF5E6; }

        /* 왼쪽: 달력 영역 (계산기 폭을 줄인 만큼 크게 확장) */
        .calendar-section {
            width: 580px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: #1c1c1c;
            border: 2px solid #ff9e40;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-header h2 {
            color: #ff9e40;
            font-size: 1.35rem;
        }

        .nav-btn {
            background: #202020;
            color: #ff9e40;
            border: 1px solid #ff9e40;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background: #ff9e40;
            color: #101010;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: bold;
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 12px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(6, 68px);
            gap: 8px;
        }

        .day {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #252525;
            border-radius: 10px;
            font-size: 1.15rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .day:hover {
            background: #333;
            color: #ff9e40;
        }

        .day.empty {
            background: transparent;
            cursor: default;
        }

        .day.today {
            border: 2px solid #ff9e40;
            color: #ff9e40;
            font-weight: bold;
        }

        /* 오른쪽: 계산기 영역 (아래 코드가 가졌던 전체 폭 내부에서 컴팩트하게 축소) */
        .calculator-section {
            width: 360px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .calc-card {
            background: #1c1c1c;
            border: 2px solid #ff9e40;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .calc-card h3 {
            font-size: 0.9rem;
            color: #ff9e40;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-group label {
            font-size: 0.75rem;
            color: #aaa;
        }

        .input-group input {
            background: #252525;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 8px 10px;
            color: #fff;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .input-group input:focus {
            outline: none;
            border-color: #ff9e40;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #ccc;
            cursor: pointer;
            margin-top: 2px;
        }

        .checkbox-group input {
            accent-color: #ff9e40;
            width: 15px;
            height: 15px;
            cursor: pointer;
        }

        .result-box {
            background: #252525;
            border-radius: 8px;
            padding: 8px;
            font-size: 0.9rem;
            color: #fff;
            text-align: center;
            font-weight: bold;
            border: 1px dashed #444;
        }

        /* 4. Theme (Light Mode) */
        body.light-mode { background-color: #fff; }
        body.light-mode .sidebar { background-color: #FDF5E6; box-shadow: 4px 0 15px rgba(0, 0, 0, 0.05); }
        body.light-mode .menu-btn, body.light-mode .theme-btn { background: #FDF5E6; color: #F38020; border-color: #F38020; }
        body.light-mode .menu-btn:hover { background: #F38020; color: #ffffff; border-color: #F38020; }
        body.light-mode .theme-btn:hover { background-color: #202020; color: #ff9e40; border-color: #202020; }
        body.light-mode .top-section h1, body.light-mode .top-section p { color: #202020; }
        body.light-mode .menu-toggle-btn { color: #000000; }
        body.light-mode .calendar-section, body.light-mode .calc-card {
            background-color: #fafafa;
            border-color: #F38020;
            box-shadow: 0 10px 20px rgba(243, 128, 32, 0.15);
        }
        body.light-mode .day { background: #eee; color: #333; }
        body.light-mode .day:hover { background: #ddd; color: #F38020; }
        body.light-mode .day.today { border-color: #F38020; color: #F38020; }
        body.light-mode .input-group input, body.light-mode .result-box { background: #fff; color: #000; border-color: #ccc; }
        body.light-mode .input-group label, body.light-mode .checkbox-group { color: #555; }
        body.light-mode .nav-btn { background: #FDF5E6; color: #F38020; border-color: #F38020; }
        body.light-mode .nav-btn:hover { background: #F38020; color: #fff; }

        /* 5. Mobile Responsive */
        .menu-toggle-btn { display: none; position: fixed; bottom: 20px; left: 20px; z-index: 2000; padding: 10px 15px; background: #ff9e40; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }

        @media (max-width: 980px) {
            .menu-toggle-btn { display: block; color: #ffffff; }
            .sidebar { transform: translateX(-250px); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; width: 100%; height: auto; overflow: visible; }
            .workspace-container { flex-direction: column; overflow: visible; }
            .calendar-section, .calculator-section { width: 100%; }
        }
    </style>
</head>
<body>

<button class="menu-toggle-btn" onclick="toggleSidebar()">MENU</button>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <button class="menu-btn" onclick="location.href='../index'">Home</button>
        <button id="theme-toggle" class="theme-btn">DAY / NIGHT</button>
        <div class="bottom-btns">
            <button class="menu-btn" onclick="resetAll()">Reset</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-section">
            <h1>Date Calculator</h1>
            <p>Calculate dates and intervals easily with a convenient calendar.</p>
        </header>

        <div class="workspace-container">
            <!-- 왼쪽: 달력 영역 (폭과 높이를 넓게 확장) -->
            <section class="calendar-section">
                <div class="calendar-header">
                    <button class="nav-btn" onclick="changeMonth(-1)">&lt;</button>
                    <h2 id="calendar-title">2026년 7월</h2>
                    <button class="nav-btn" onclick="changeMonth(1)">&gt;</button>
                </div>
                <div class="weekdays">
                    <div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div><div>일</div>
                </div>
                <div class="days-grid" id="days-grid"></div>
            </section>

            <!-- 오른쪽: 계산기 영역 (폭을 좁혀서 우측 끝 위치 조정) -->
            <section class="calculator-section">
                <!-- 날짜 간격 계산 -->
                <div class="calc-card">
                    <h3>Date Interval</h3>
                    <div class="input-group">
                        <label>Start Date</label>
                        <input type="date" id="date1" onchange="calculateInterval()">
                    </div>
                    <div class="input-group">
                        <label>End Date</label>
                        <input type="date" id="date2" onchange="calculateInterval()">
                    </div>
                    <label class="checkbox-group">
                        <input type="checkbox" id="include-start-interval" onchange="calculateInterval()"> Include start date (+1 day)
                    </label>
                    <div class="result-box" id="interval-result">Select two dates</div>
                </div>

                <!-- 날짜 더하기/빼기 계산 -->
                <div class="calc-card">
                    <h3>Add / Subtract Days</h3>
                    <div class="input-group">
                        <label>Base Date</label>
                        <input type="date" id="base-date" onchange="calculateAddDays()">
                    </div>
                    <div class="input-group">
                        <label>Days to Add (+ or -)</label>
                        <input type="number" id="days-input" value="30" oninput="calculateAddDays()">
                    </div>
                    <label class="checkbox-group">
                        <input type="checkbox" id="include-start-add" checked onchange="calculateAddDays()"> Include base date (D-Day style)
                    </label>
                    <div class="result-box" id="add-result">Result date</div>
                </div>
            </section>
        </div>
    </main>
</div>

<script>
    const sidebar = document.getElementById('sidebar');
    function toggleSidebar() { sidebar.classList.toggle('active'); }
    
    document.getElementById('theme-toggle').addEventListener('click', () => { 
        document.body.classList.toggle('light-mode'); 
    });
    
    document.querySelector('.main-content').addEventListener('click', () => { 
        if (sidebar.classList.contains('active')) { sidebar.classList.remove('active'); } 
    });

    let currentDate = new Date();

    function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();

        document.getElementById('calendar-title').textContent = `${year}년 ${month + 1}월`;

        const grid = document.getElementById('days-grid');
        grid.innerHTML = '';

        let firstDayIndex = new Date(year, month, 1).getDay();
        firstDayIndex = (firstDayIndex === 0) ? 6 : firstDayIndex - 1;

        const lastDay = new Date(year, month + 1, 0).getDate();
        const today = new Date();

        for (let i = 0; i < firstDayIndex; i++) {
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'day empty';
            grid.appendChild(emptyDiv);
        }

        for (let day = 1; day <= lastDay; day++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'day';
            dayDiv.textContent = day;

            if (year === today.getFullYear() && month === today.getMonth() && day === today.getDate()) {
                dayDiv.classList.add('today');
            }

            grid.appendChild(dayDiv);
        }
    }

    function changeMonth(direction) {
        currentDate.setMonth(currentDate.getMonth() + direction);
        renderCalendar();
    }

    function calculateInterval() {
        const d1 = document.getElementById('date1').value;
        const d2 = document.getElementById('date2').value;
        const includeStart = document.getElementById('include-start-interval').checked;
        const resultBox = document.getElementById('interval-result');

        if (!d1 || !d2) {
            resultBox.textContent = 'Select two dates';
            return;
        }

        const date1 = new Date(d1);
        const date2 = new Date(d2);
        const diffTime = date2 - date1;
        let diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

        if (includeStart) {
            if (diffDays >= 0) diffDays += 1;
            else diffDays -= 1;
        }

        if (diffDays === 0) {
            resultBox.textContent = 'Same day (0 days)';
        } else if (diffDays > 0) {
            resultBox.textContent = `Difference: ${diffDays} days`;
        } else {
            resultBox.textContent = `Difference: ${Math.abs(diffDays)} days (Inverted)`;
        }
    }

    function calculateAddDays() {
        const bDate = document.getElementById('base-date').value;
        let daysVal = parseInt(document.getElementById('days-input').value);
        const includeStart = document.getElementById('include-start-add').checked;
        const resultBox = document.getElementById('add-result');

        if (!bDate || isNaN(daysVal)) {
            resultBox.textContent = 'Result date';
            return;
        }

        if (includeStart && daysVal !== 0) {
            daysVal = daysVal > 0 ? daysVal - 1 : daysVal + 1;
        }

        const date = new Date(bDate);
        date.setDate(date.getDate() + daysVal);

        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');

        resultBox.textContent = `Result: ${year}-${month}-${day}`;
    }

    function resetAll() {
        currentDate = new Date();
        renderCalendar();
        const todayStr = new Date().toISOString().split('T')[0];
        document.getElementById('date1').value = todayStr;
        document.getElementById('date2').value = todayStr;
        document.getElementById('base-date').value = todayStr;
        document.getElementById('days-input').value = 30;
        document.getElementById('include-start-interval').checked = false;
        document.getElementById('include-start-add').checked = true;
        calculateInterval();
        calculateAddDays();
    }

    window.onload = function() {
        renderCalendar();
        const todayStr = new Date().toISOString().split('T')[0];
        document.getElementById('date1').value = todayStr;
        document.getElementById('date2').value = todayStr;
        document.getElementById('base-date').value = todayStr;
        calculateInterval();
        calculateAddDays();
    };
</script>

</body>
</html>
