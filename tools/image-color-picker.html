<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>대표 색상 추출기</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; background-color: #121212; color: #fff; }
    .container { max-width: 600px; margin: 0 auto; }
    #preview { max-width: 100%; height: auto; margin-top: 15px; border-radius: 8px; }
    .palette { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
    .color-box {
      width: 80px; height: 80px; border-radius: 6px;
      display: flex; align-items: flex-end; justify-content: center;
      padding: 5px; font-size: 12px; font-weight: bold; color: #fff;
      text-shadow: 0 0 3px #000;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>대표 색상 추출기</h2>
    <input type="file" id="imageInput" accept="image/*">
    <br>
    <img id="preview" alt="업로드 이미지 미리보기" style="display:none;">
    <div class="palette" id="palette"></div>
  </div>

  <script>
    const colorThief = new ColorThief();
    const imageInput = document.getElementById('imageInput');
    const preview = document.getElementById('preview');
    const paletteContainer = document.getElementById('palette');

    // 수치가 0~255 정수인지 검증
    function isValidRGBComponent(val) {
      return Number.isInteger(val) && val >= 0 && val <= 255;
    }

    // RGB -> Hex 변환
    function rgbToHex(r, g, b) {
      const toHex = (c) => c.toString(16).padStart(2, '0');
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    imageInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        preview.src = event.target.result;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    });

    preview.addEventListener('load', () => {
      paletteContainer.innerHTML = '';

      try {
        // 최대 10개 색상 요청
        const rawPalette = colorThief.getPalette(preview, 10);
        if (!rawPalette) return;

        const validHexSet = new Set(); // 중복 제거용 Set

        rawPalette.forEach(color => {
          // 1. 배열 형태 검증
          if (!Array.isArray(color) || color.length < 3) return;

          const [r, g, b] = color;

          // 2. RGB 값이 모두 0~255 사이의 유효한 정수인지 검증
          if (isValidRGBComponent(r) && isValidRGBComponent(g) && isValidRGBComponent(b)) {
            const hex = rgbToHex(r, g, b);
            validHexSet.add(hex); // 유효한 Hex 값만 저장 (중복 자동 제거)
          }
        });

        // 검증을 통과한 순수 색상만 화면에 표시
        validHexSet.forEach(hex => {
          const box = document.createElement('div');
          box.className = 'color-box';
          box.style.backgroundColor = hex;
          box.textContent = hex;
          paletteContainer.appendChild(box);
        });

      } catch (e) {
        console.error("색상 추출 실패:", e);
      }
    });
  </script>
</body>
</html>
