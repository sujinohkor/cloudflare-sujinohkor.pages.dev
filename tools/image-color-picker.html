<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Color Picker</title>
    <link rel="icon" type="image/png" href="/assets/LOGO-orange.png">
    <style>
        /* 1. Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #202020; color: #fff; transition: background 0.3s; }
        
        /* 2. Layout */
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { 
            width: 250px; height: 100vh; position: fixed; left: 0; top: 0; 
            background-color: #101010; padding: 20px; z-index: 1000; 
            display: flex; flex-direction: column; transition: transform 0.3s ease;
        }
        
        /* PC: 메인 콘텐츠 영역 및 메인 작업 컨테이너 */
        .main-content { 
            margin-left: 250px; padding: 40px; flex: 1; 
            display: flex; flex-direction: column; height: 100vh; gap: 20px; overflow: hidden; transition: 0.3s;
        }

        .workspace-container {
            display: flex;
            flex-direction: row;
            flex: 1;
            gap: 20px;
            min-height: 0;
        }

        /* 3. Components */
        .menu-btn, .theme-btn { 
            width: 100%; padding: 10px; margin-bottom: 10px; cursor: pointer;
            background: #202020; color: #ff9e40; border: 2px solid #ff9e40; 
            border-radius: 50px; font-weight: bold; transition: all 0.3s;
        }
        .menu-btn:hover { background: #ff9e40; color: #101010; }
        
        /* 토글 버튼 OFF 상태 스타일 */
        .menu-btn.off {
            background: #101010;
            color: #666;
            border-color: #666;
        }
        .menu-btn.off:hover {
            background: #333;
            color: #fff;
        }

        .theme-btn:hover { background-color: #FDF5E6; color: #F38020; border-color: #FDF5E6; }
        
        /* PC: content-mid 영역 (이미지 미리보기) */
        .content-mid { 
            flex: 1; border: 2px solid #ff9e40; border-radius: 16px; display: flex; overflow: hidden; 
            padding: 20px; color: #888; font-family: 'Consolas', 'Courier New', 'Monaco', monospace, sans-serif; font-size: 1rem;
            cursor: pointer; transition: all 0.3s ease; user-select: none;
            flex-direction: column; align-items: center; justify-content: center; gap: 10px; text-align: center;
            position: relative;
        }
        .content-mid.dragover { background-color: rgba(255, 158, 64, 0.1 ); border-style: dashed; color: #ff9e40; }
        .content-mid.has-file {
            background-color: rgba(255, 158, 64, 0.05);
            padding: 10px;
        }

        .preview-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }

        /* PC: content-down 영역 (색상 팔레트 출력) */
        .content-down { 
            flex: 1; border: 2px solid #ff9e40; border-radius: 16px; display: flex; overflow-y: auto; 
            padding: 20px; background: transparent;
        }
        
        .palette-container {
            display: flex; flex-wrap: wrap; gap: 12px; width: 100%; align-content: flex-start;
        }
        
        .color-card {
            width: calc(20% - 10px); height: 90px; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding: 8px; font-size: 0.85rem; font-weight: bold; color: #fff;
            text-shadow: 0 0 4px #000; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.2s;
            cursor: pointer;
        }
        .color-card:hover { transform: translateY(-3px); }

        .empty-msg {
            display: flex; align-items: center; justify-content: center; width: 100%; height: 100%;
            color: #888; font-family: 'Consolas', monospace; font-size: 1rem;
        }

        /* 4. Theme (Light Mode) */
        body.light-mode { background-color: #fff; }
        body.light-mode .sidebar { background-color: #FDF5E6; }
        body.light-mode .menu-btn, body.light-mode .theme-btn { background: #FDF5E6; color: #F38020; border-color: #F38020; }
        body.light-mode .menu-btn:hover { background: #F38020; color: #ffffff; border-color: #F38020; }
        body.light-mode .menu-btn.off { background: #eee; color: #999; border-color: #ccc; }
        body.light-mode .menu-btn.off:hover { background: #ddd; color: #333; }
        body.light-mode .theme-btn:hover { background-color: #202020; color: #ff9e40; border-color: #202020; }
        body.light-mode .top-section h1, body.light-mode .top-section p { color: #202020; }
        body.light-mode .content-mid { color: #666; }
        body.light-mode .content-mid.has-file { background-color: rgba(243, 128, 32, 0.05); }
        body.light-mode .content-mid.dragover { background-color: rgba(243, 128, 32, 0.1 ); border-style: dashed; color: #f38020; }
        body.light-mode .menu-toggle-btn { color: #000000; }

        /* 5. Mobile Responsive */
        .menu-toggle-btn { display: none; position: fixed; bottom: 20px; left: 20px; z-index: 2000; padding: 10px 15px; background: #ff9e40; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
        
        @media (max-width: 600px) {
            .menu-toggle-btn { display: block; color: #ffffff; }
            .sidebar { transform: translateX(-250px); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; width: 100%; max-height: 100svh; flex: 1; display: flex; flex-direction: column; }
            
            .workspace-container { flex-direction: column; }
            .content-mid { flex: 3; }
            .content-down { flex: 2; }
            .color-card { width: calc(33.33% - 8px); height: 75px; }
        }
    </style>
</head>
<body>

<button class="menu-toggle-btn" onclick="toggleSidebar()">MENU</button>

<input type="file" id="file-selector" accept="image/*" style="display: none;">

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <button class="menu-btn" onclick="location.href='../index'">Home</button>
        <button id="theme-toggle" class="theme-btn">DAY / NIGHT</button>
        
        <div class="bottom-btns">
            <button class="menu-btn" onclick="uploadFile()">Upload</button>
            <button id="toggle-neutral-btn" class="menu-btn">Including Neutrals Now</button>
            <button class="menu-btn" onclick="savePalette()">Save the Color Swatch</button>
            <button class="menu-btn" onclick="resetAll()">Reset</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-section">
            <h1>Image Color Picker</h1>
            <p>Upload an image below to extract colors.</p>
        </header>
        
        <div class="workspace-container">
            <section class="content-mid"></section>
            <section class="content-down">
                <div class="palette-container" id="palette-container">
                    <div class="empty-msg">Extracted color swatch will appear here.</div>
                </div>
            </section>
        </div>
    </main>
</div>

<script>
    const sidebar = document.getElementById('sidebar');
    const contentMid = document.querySelector('.content-mid');
    const paletteContainer = document.getElementById('palette-container');
    const fileSelector = document.getElementById('file-selector');
    const toggleBtn = document.getElementById('toggle-neutral-btn');
    
    let loadedImage = null;
    let filterAchromatic = true; // 무채색 제외 토글 상태 (기본값: true)
    let extractedColorsList = []; // 저장 기능을 위한 추출 색상 저장 배열

    function toggleSidebar() { sidebar.classList.toggle('active'); }
    document.getElementById('theme-toggle').addEventListener('click', () => { document.body.classList.toggle('light-mode'); });
    document.querySelector('.main-content').addEventListener('click', () => { if (sidebar.classList.contains('active')) { sidebar.classList.remove('active'); } });

    // 1. 무채색(검은색, 흰색, 회색) 판별 함수
    function isAchromatic(r, g, b, threshold = 15) {
        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);
        return (max - min) <= threshold;
    }

    // 2. 두 색상(Hex) 간의 시각적 거리 계산 함수
    function getColorDistance(hex1, hex2) {
        const r1 = parseInt(hex1.slice(1, 3), 16);
        const g1 = parseInt(hex1.slice(3, 5), 16);
        const b1 = parseInt(hex1.slice(5, 7), 16);

        const r2 = parseInt(hex2.slice(1, 3), 16);
        const g2 = parseInt(hex2.slice(3, 5), 16);
        const b2 = parseInt(hex2.slice(5, 7), 16);

        return Math.sqrt(
            0.3 * Math.pow(r1 - r2, 2) +
            0.59 * Math.pow(g1 - g2, 2) +
            0.11 * Math.pow(b1 - b2, 2)
        );
    }

    // 3. 토글 버튼 클릭 이벤트
    toggleBtn.addEventListener('click', () => {
        filterAchromatic = !filterAchromatic;
        if (filterAchromatic) {
            toggleBtn.textContent = 'Excluding Neutrals Now';
            toggleBtn.classList.remove('off');
        } else {
            toggleBtn.textContent = 'Including Neutrals Now';
            toggleBtn.classList.add('off');
        }

        // 이미지가 로드된 상태라면 즉시 재추출
        if (loadedImage) { extractColors(loadedImage); }
    });

    // 초기 UI 설정
    function setInitialUI() {
        contentMid.classList.remove('has-file');
        contentMid.innerHTML = `<div style="font-size: 3rem;">🖼️</div><div>Drag & Drop an image file here or click to upload.</div>`;
        paletteContainer.innerHTML = `<div class="empty-msg">Extracted color swatch will appear here.</div>`;
        extractedColorsList = [];
    }
    setInitialUI();

    // 4. 핵심 색상 추출 함수
    function extractColors(img) {
        paletteContainer.innerHTML = '';

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        const scale = Math.min(150 / img.naturalWidth, 150 / img.naturalHeight, 1);
        canvas.width = Math.floor(img.naturalWidth * scale);
        canvas.height = Math.floor(img.naturalHeight * scale);

        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

        const colorCounts = {};

        for (let i = 0; i < imgData.length; i += 4) {
            const alpha = imgData[i + 3];
            if (alpha < 128) continue;

            const finalR = imgData[i];
            const finalG = imgData[i + 1];
            const finalB = imgData[i + 2];

            if (filterAchromatic && isAchromatic(finalR, finalG, finalB)) { continue; }

            const hex = "#" + [finalR, finalG, finalB]
                .map(x => x.toString(16).padStart(2, '0'))
                .join('');

            colorCounts[hex] = (colorCounts[hex] || 0) + 1;
        }

        const sortedCandidateColors = Object.keys(colorCounts)
            .sort((a, b) => colorCounts[b] - colorCounts[a]);

        const finalPalette = [];
        const minDistanceThreshold = 35;

        for (const hex of sortedCandidateColors) {
            if (finalPalette.length >= 10) break;

            const isTooSimilar = finalPalette.some(selectedHex => {
                return getColorDistance(hex, selectedHex) < minDistanceThreshold;
            });

            if (!isTooSimilar) { finalPalette.push(hex); }
        }

        extractedColorsList = finalPalette;

        // 팔레트 영역에 색상 카드 렌더링
        if (finalPalette.length === 0) {
            paletteContainer.innerHTML = `<div class="empty-msg">No colors found (Try turning off neutral filter).</div>`;
            return;
        }

        finalPalette.forEach(hex => {
            const card = document.createElement('div');
            card.className = 'color-card';
            card.style.backgroundColor = hex;
            card.textContent = hex.toUpperCase();
            
            // 색상 코드 클릭 시 복사 기능
            card.onclick = (e) => {
                e.stopPropagation();
                navigator.clipboard.writeText(hex.toUpperCase());
                alert(`Copied ${hex.toUpperCase()} to clipboard!`);
            };

            paletteContainer.appendChild(card);
        });
    }

    // 파일 로드 핸들러
    function handleFile(file) {
        if (!file) return;

        if (!file.type.startsWith('image/')) {
            alert('Please upload an image file.');
            return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
            const imageUrl = e.target.result;
            const img = new Image();
            
            img.onload = () => {
                loadedImage = img;
                
                // 이미지 미리보기 표시
                contentMid.classList.add('has-file');
                contentMid.innerHTML = `<img src="${imageUrl}" alt="Uploaded Preview" class="preview-img">`;
                
                // 색상 추출 실행
                extractColors(img);
            };
            img.src = imageUrl;
        };
        reader.readAsDataURL(file);
    }

    // 드래그 앤 드롭 이벤트
    contentMid.addEventListener('dragover', (e) => { e.preventDefault(); contentMid.classList.add('dragover'); });
    contentMid.addEventListener('dragleave', () => { contentMid.classList.remove('dragover'); });
    contentMid.addEventListener('drop', (e) => { 
        e.preventDefault(); 
        contentMid.classList.remove('dragover'); 
        const file = e.dataTransfer.files[0]; 
        handleFile(file); 
    });
    contentMid.addEventListener('click', () => { fileSelector.click(); });

    function uploadFile() { fileSelector.click(); }

    fileSelector.addEventListener('change', (e) => {
        const file = e.target.files[0];
        handleFile(file);
        e.target.value = ''; 
    });

    // 팔레트 색상 목록 텍스트 파일 저장 기능
    function savePalette() {
        if (extractedColorsList.length === 0) return alert("No extracted colors to save.");
        const text = extractedColorsList.map(c => c.toUpperCase()).join('\n');
        const blob = new Blob(['\uFEFF', text], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'ColorPalette.txt';
        link.click();
        URL.revokeObjectURL(link.href);
    }

    // 초기화 기능
    function resetAll() {
        loadedImage = null;
        setInitialUI();
    }
</script>
</body>
</html>
