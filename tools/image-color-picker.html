<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>대표 색상 추출기</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; background-color: #121212; color: #fff; }
    .container { max-width: 600px; margin: 0 auto; }
    #preview { max-width: 100%; height: auto; margin-top: 15px; border-radius: 8px; }
    .palette { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
    .color-box {
      width: 80px; height: 80px; border-radius: 6px;
      display: flex; align-items: flex-end; justify-content: center;
      padding: 5px; font-size: 12px; font-weight: bold; color: #fff;
      text-shadow: 0 0 3px #000;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>대표 색상 추출기</h2>
    <input type="file" id="imageInput" accept="image/*">
    <br>
    <img id="preview" alt="업로드 이미지 미리보기" style="display:none;">
    <div class="palette" id="palette"></div>
  </div>

  <script>
    const colorThief = new ColorThief();
    const imageInput = document.getElementById('imageInput');
    const preview = document.getElementById('preview');
    const paletteContainer = document.getElementById('palette');

    // Hex 변환 함수 (한 자릿수 수치 앞에는 0을 붙임)
    function componentToHex(c) {
      const hex = c.toString(16);
      return hex.length === 1 ? "0" + hex : hex;
    }

    function rgbToHex(r, g, b) {
      return "#" + componentToHex(r) + componentToHex(g) + componentToHex(b);
    }

    imageInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        preview.src = event.target.result;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    });

    preview.addEventListener('load', () => {
      paletteContainer.innerHTML = '';

      try {
        // Color Thief로 최대 10개 추출
        const palette = colorThief.getPalette(preview, 10);

        if (!palette) return;

        palette.forEach(color => {
          // 유효한 [r, g, b] 배열인 경우에만 DOM 생성
          if (Array.isArray(color) && color.length === 3) {
            const hex = rgbToHex(color[0], color[1], color[2]);
            const box = document.createElement('div');
            box.className = 'color-box';
            box.style.backgroundColor = hex;
            box.textContent = hex;
            paletteContainer.appendChild(box);
          }
        });
      } catch (e) {
        console.error("색상 추출 중 오류 발생:", e);
      }
    });
  </script>
</body>
</html>
