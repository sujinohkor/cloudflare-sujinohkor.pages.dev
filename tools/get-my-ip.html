<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get My IP</title>
    <link rel="icon" type="image/png" href="/assets/LOGO-orange.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <style>
        /* 1. Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #202020; color: #fff; transition: background 0.3s; }
        
        /* 2. Layout */
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { 
            width: 250px; height: 100vh; position: fixed; left: 0; top: 0; 
            background-color: #101010; padding: 20px; z-index: 1000; 
            display: flex; flex-direction: column; transition: transform 0.3s ease;
        }
        .main-content { 
            margin-left: 250px; padding: 40px; flex: 1; 
            display: flex; flex-direction: column; height: 100vh; gap: 20px; overflow: hidden; transition: 0.3s;
        }

        /* 3. Components */
        .menu-btn, .theme-btn { 
            width: 100%; padding: 10px; margin-bottom: 10px; cursor: pointer;
            background: #202020; color: #ff9e40; border: 2px solid #ff9e40; 
            border-radius: 50px; font-weight: bold; transition: all 0.3s;
        }
        .menu-btn:hover { background: #ff9e40; color: #101010; }
        .theme-btn:hover { background-color: #FDF5E6; color: #F38020; border-color: #FDF5E6; }

        .content-top { 
            flex: 1; border: 2px solid #ff9e40; border-radius: 16px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255, 158, 64, 0.02); min-height: 140px;
        }
        .ip-label { font-size: 1rem; color: #ff9e40; margin-bottom: 8px; font-weight: bold; letter-spacing: 1px; }
        .ip-address { font-size: 2.2rem; font-weight: bold; font-family: 'Consolas', monospace; color: #fff; text-align: center; width: 100%; padding: 0 15px; word-break: break-all; overflow-wrap: break-word; }

        .content-down { 
            flex: 2; display: flex; flex-direction: row; gap: 20px; overflow: hidden; 
        }
        .half-box { 
            flex: 1; border: 2px solid #ff9e40; border-radius: 16px; 
            overflow: hidden; display: flex; flex-direction: column; position: relative;
        }

        #map-container { width: 100%; height: 100%; min-height: 250px; background: #151515; z-index: 1; }
        
        /* info-container 세부 내역 레이아웃 */
        #info-container { 
            padding: 24px; 
            background: transparent; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }
        
        .info-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding-bottom: 6px; 
            border-bottom: 1px solid rgba(255, 158, 64, 0.15); 
            font-size: 0.9rem;
        }
        
        .info-label { 
            color: #ff9e40; 
            font-weight: 600; 
            flex-shrink: 0; 
            margin-right: 12px;
        }
        
        .info-value { 
            color: #e0e0e0; 
            font-family: 'Consolas', monospace; 
            text-align: right; 
            word-break: break-all;
        }

        /* 4. Theme (Light Mode) */
        body.light-mode { background-color: #fff; }
        body.light-mode .sidebar { background-color: #FDF5E6; }
        body.light-mode .menu-btn, body.light-mode .theme-btn { background: #FDF5E6; color: #F38020; border-color: #F38020; }
        body.light-mode .menu-btn:hover { background: #F38020; color: #ffffff; border-color: #F38020; }
        body.light-mode .theme-btn:hover { background-color: #202020; color: #ff9e40; border-color: #202020; }
        body.light-mode .top-section h1, body.light-mode .top-section p { color: #202020; }
        body.light-mode .ip-address { color: #000; }
        body.light-mode .menu-toggle-btn { color: #000000; }
        body.light-mode .info-value { color: #202020; }
        body.light-mode .info-row { border-bottom-color: rgba(243, 128, 32, 0.2); }

        /* 5. Mobile Responsive */
        .menu-toggle-btn { display: none; position: fixed; bottom: 20px; left: 20px; z-index: 2000; padding: 10px 15px; background: #ff9e40; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
        
        @media (max-width: 768px) {
            .menu-toggle-btn { display: block; color: #ffffff; }
            .sidebar { transform: translateX(-250px); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; width: 100%; overflow-y: auto; }
            .content-down { flex-direction: column; flex: none; height: auto; min-height: 600px; }
            .half-box { min-height: 280px; }
            .ip-address { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<button class="menu-toggle-btn" onclick="toggleSidebar()">MENU</button>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <button class="menu-btn" onclick="location.href='../index'">Home</button>
        <button id="theme-toggle" class="theme-btn">DAY / NIGHT</button>
        
        <div class="bottom-btns">
            <button class="menu-btn" onclick="copyIP()">Copy IP</button>
            <button class="menu-btn" onclick="fetchIPInfo()">Refresh</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-section">
            <h1>Get My IP</h1>
            <p>Check your public IP and geographical location.</p>
        </header>

        <section class="content-top">
            <div class="ip-label">YOUR PUBLIC IP ADDRESS</div>
            <div class="ip-address" id="user-ip">Loading...</div>
        </section>

        <section class="content-down">
            <div class="half-box">
                <div id="map-container"></div>
            </div>
            <div class="half-box" id="info-container">
                <!-- 정보 수신 시 스크립트로 동적 바인딩 -->
                <div style="text-align: center; color: #ff9e40; margin-top: 20px;">Fetching IP Details...</div>
            </div>
        </section>
    </main>
</div>

<script>
    const sidebar = document.getElementById('sidebar');
    const userIpElement = document.getElementById('user-ip');
    const infoContainer = document.getElementById('info-container');
    let map = null;
    let marker = null;
    let currentIP = '';

    function toggleSidebar() { sidebar.classList.toggle('active'); }
    document.getElementById('theme-toggle').addEventListener('click', () => { document.body.classList.toggle('light-mode'); });
    document.querySelector('.main-content').addEventListener('click', () => { if (sidebar.classList.contains('active')) { sidebar.classList.remove('active'); } });

    // Client OS 및 Browser 파싱 함수
    function getClientEnv() {
        const ua = navigator.userAgent;
        let os = "Unknown OS";
        let browser = "Unknown Browser";

        // OS 판별
        if (ua.indexOf("Android") !== -1) {
            const match = ua.match(/Android\s([0-9\.]+)/);
            os = match ? `Android ${match[1]}` : "Android";
        } else if (ua.indexOf("iPhone") !== -1 || ua.indexOf("iPad") !== -1) {
            os = "iOS";
        } else if (ua.indexOf("Windows NT 10.0") !== -1) {
            os = "Windows 10/11";
        } else if (ua.indexOf("Mac OS X") !== -1) {
            os = "macOS";
        } else if (ua.indexOf("Linux") !== -1) {
            os = "Linux";
        }

        // Browser 판별
        if (ua.indexOf("Chrome") !== -1 && ua.indexOf("Edg") === -1) {
            const match = ua.match(/Chrome\/([0-9\.]+)/);
            browser = match ? `Chrome ${match[1]}` : "Chrome";
        } else if (ua.indexOf("Edg") !== -1) {
            const match = ua.match(/Edg\/([0-9\.]+)/);
            browser = match ? `Edge ${match[1]}` : "Edge";
        } else if (ua.indexOf("Safari") !== -1 && ua.indexOf("Chrome") === -1) {
            const match = ua.match(/Version\/([0-9\.]+)/);
            browser = match ? `Safari ${match[1]}` : "Safari";
        } else if (ua.indexOf("Firefox") !== -1) {
            const match = ua.match(/Firefox\/([0-9\.]+)/);
            browser = match ? `Firefox ${match[1]}` : "Firefox";
        }

        return { os, browser };
    }

    async function fetchIPInfo() {
        userIpElement.innerText = "Loading...";

        try {
            const response = await fetch('https://ipwho.is/');
            if (!response.ok) throw new Error('Network response was not ok');

            const data = await response.json();
            
            if (!data.success) {
                throw new Error(data.message || 'IP lookup failed');
            }

            currentIP = data.ip;
            userIpElement.innerText = currentIP;

            // info-container 상세 정보 표시
            renderDetails(data);

            // 기본 IP 위치 지도 표시
            if (data.latitude && data.longitude) {
                renderMap(data.latitude, data.longitude, `${data.city || 'IP Location'} (IP)`);
            }

            // 기기 정밀 위치(GPS/Wi-Fi) 요청
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const gpsLat = position.coords.latitude;
                        const gpsLon = position.coords.longitude;
                        renderMap(gpsLat, gpsLon, "My Exact Location (GPS)");
                    },
                    (geoError) => {
                        console.warn("GPS 권한 거부 또는 조회 불가:", geoError);
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }
        } catch (error) {
            console.error("IP Fetch Error:", error);
            userIpElement.innerText = "Error Loading IP";
            infoContainer.innerHTML = `<div style="color: #ff4d4d; text-align: center;">Failed to load details.</div>`;
        }
    }

    // info-container 데이터 매핑 및 출력 함수
    function renderDetails(data) {
        const env = getClientEnv();
        
        // Time Zone 포맷팅 (+09:00 형식)
        let tzOffset = "UTC";
        if (data.timezone && data.timezone.offset !== undefined) {
            const hours = data.timezone.offset / 3600;
            const sign = hours >= 0 ? "+" : "-";
            const absHours = Math.abs(hours).toString().padStart(2, '0');
            tzOffset = `UTC ${sign}${absHours}:00`;
        }

        const details = [
            { label: "City", value: data.city || "Unknown" },
            { label: "State/Region", value: data.region || "Unknown" },
            { label: "Country", value: data.country || "Unknown" },
            { label: "Postal Code", value: data.postal || "Unknown" },
            { label: "Time Zone", value: tzOffset },
            { label: "ISP", value: data.connection?.isp || "Unknown" },
            { label: "ASN", value: data.connection?.asn || "Unknown" },
            { label: "AS Type", value: data.connection?.domain ? "Isp" : "Unknown" },
            { label: "Abuse contact", value: data.borders ? `abuse@${data.connection?.domain || 'isp.com'}` : "kornet_ip@kt.com" },
            { label: "Range", value: data.ip ? `${data.ip}/24` : "Unknown" },
            { label: "Name of your computer", value: "unknown" },
            { label: "Operating System", value: env.os },
            { label: "Your Browser", value: env.browser },
            { label: "Proxy", value: data.security?.proxy ? "Used" : "Not used" }
        ];

        infoContainer.innerHTML = details.map(item => `
            <div class="info-row">
                <span class="info-label">${item.label}:</span>
                <span class="info-value">${item.value}</span>
            </div>
        `).join('');
    }

    function renderMap(lat, lon, locationLabel) {
        if (!map) {
            map = L.map('map-container').setView([lat, lon], 13);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
        } else {
            map.setView([lat, lon], 13);
        }

        if (marker) map.removeLayer(marker);
        marker = L.marker([lat, lon]).addTo(map)
            .bindPopup(`<b>Location:</b> ${locationLabel}`)
            .openPopup();

        setTimeout(() => {
            if (map) map.invalidateSize();
        }, 200);
    }

    function copyIP() {
        if (!currentIP || currentIP === 'Loading...') return alert('IP Address is not loaded yet.');
        navigator.clipboard.writeText(currentIP).then(() => {
            alert('IP Address copied to clipboard!');
        });
    }

    window.addEventListener('DOMContentLoaded', fetchIPInfo);
</script>
</body>
</html>
