<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Generator</title>
    <link rel="icon" type="image/png" href="/assets/LOGO-orange.png">
    <style>
        /* 1. Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #202020; color: #fff; transition: background 0.3s; }
        
        /* 2. Layout */
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { 
            width: 250px; height: 100vh; position: fixed; left: 0; top: 0; 
            background-color: #101010; padding: 20px; z-index: 1000; 
            display: flex; flex-direction: column; transition: transform 0.3s ease;
        }
        .main-content { 
            margin-left: 250px; padding: 40px; flex: 1; 
            display: flex; flex-direction: column; height: 100vh; gap: 20px; overflow-y: auto; transition: 0.3s;
            /* 글래스 효과가 뒤에서 비치도록 배경에 은은한 그라데이션 적용 */
            background: linear-gradient(135deg, #2c1638 0%, #121c29 100%);
        }

        /* 3. Components */
        .menu-btn, .theme-btn { 
            width: 100%; padding: 10px; margin-bottom: 10px; cursor: pointer;
            background: #202020; color: #ff9e40; border: 2px solid #ff9e40; 
            border-radius: 50px; font-weight: bold; transition: all 0.3s;
        }
        .menu-btn:hover { background: #ff9e40; color: #101010; }
        .theme-btn:hover { background-color: #FDF5E6; color: #F38020; border-color: #FDF5E6; }

        /* Generator Container Layout (기본 틀) */
        .generator-wrapper {
            display: flex;
            gap: 30px;
            flex: 1;
            align-items: center;
            padding: 20px;
        }

        /* 각각의 div 박스(컨트롤 패널)에 글래스모피즘 효과 적용 */
        .controls {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #ff9e40;
        }

        .control-group input {
            width: 100%;
            accent-color: #ff9e40;
            cursor: pointer;
        }

        /* 각각의 div 박스(미리보기 영역)에 글래스모피즘 효과 적용 */
        .preview-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        #glass-preview {
            width: 250px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            transition: all 0.1s ease;
            /* 내부에서 실시간으로 변하는 미리보기 박스 자체의 배경 */
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #a1c4fd 100%);
        }

        textarea {
            width: 100%;
            height: 110px;
            margin-top: 15px;
            padding: 10px;
            font-family: monospace;
            background: rgba(10, 10, 10, 0.6);
            color: #00ff66;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            resize: none;
            outline: none;
        }

        /* 4. Theme (Light Mode) */
        body.light-mode { background-color: #fff; color: #000; }
        body.light-mode .sidebar { background-color: #FDF5E6; box-shadow: 4px 0 15px rgba(0, 0, 0, 0.05); }
        body.light-mode .menu-btn, body.light-mode .theme-btn { background: #FDF5E6; color: #F38020; border-color: #F38020; }
        body.light-mode .menu-btn:hover { background: #F38020; color: #ffffff; border-color: #F38020; }
        body.light-mode .theme-btn:hover { background-color: #202020; color: #ff9e40; border-color: #202020; }
        body.light-mode .top-section h1, body.light-mode .top-section p { color: #202020; }
        body.light-mode .menu-toggle-btn { color: #000000; }
        body.light-mode .main-content { background: linear-gradient(135deg, #fff5f0 0%, #f0f4ff 100%); }
        body.light-mode .controls, body.light-mode .preview-area {
            background: rgba(255, 255, 255, 0.6);
            border-color: rgba(243, 128, 32, 0.3);
            box-shadow: 0 8px 32px 0 rgba(243, 128, 32, 0.15);
        }
        body.light-mode .control-group label { color: #F38020; }
        body.light-mode .control-group input { accent-color: #F38020; }
        body.light-mode textarea { background: rgba(240, 240, 240, 0.8); color: #333; border-color: #ddd; }

        /* 5. Mobile Responsive */
        .menu-toggle-btn { display: none; position: fixed; bottom: 20px; left: 20px; z-index: 2000; padding: 10px 15px; background: #ff9e40; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
        
        @media (max-width: 768px) {
            .menu-toggle-btn { display: block; color: #ffffff; }
            .sidebar { transform: translateX(-250px); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; width: 100%; height: auto; }
            .generator-wrapper { flex-direction: column; padding: 15px; }
            .preview-area { width: 100%; min-height: 200px; }
            #glass-preview { width: 180px; height: 180px; }
        }
    </style>
</head>
<body>

<button class="menu-toggle-btn" onclick="toggleSidebar()">MENU</button>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <button class="menu-btn" onclick="location.href='../index'">Home</button>
        <button id="theme-toggle" class="theme-btn">DAY / NIGHT</button>
        
        <div class="bottom-btns"></div>
    </aside>

    <main class="main-content">
        <header class="top-section">
            <h1>🔮 Glassmorphism Generator</h1>
            <p>Customize glass effect style and copy CSS code easily.</p>
        </header>

        <div class="generator-wrapper">
            <div class="controls">
                <div class="control-group">
                    <label>Blur (블러): <span id="blur-val">10</span>px</label>
                    <input type="range" id="blur" min="0" max="20" value="10">
                </div>
                <div class="control-group">
                    <label>Opacity (투명도): <span id="opacity-val">0.2</span></label>
                    <input type="range" id="opacity" min="0" max="1" step="0.05" value="0.2">
                </div>
                <div class="control-group">
                    <label>Border Radius (둥글기): <span id="radius-val">16</span>px</label>
                    <input type="range" id="radius" min="0" max="100" value="16">
                </div>
                <div class="control-group">
                    <label>Border Width (테두리 두께): <span id="border-val">1</span>px</label>
                    <input type="range" id="border-width" min="0" max="10" value="1">
                </div>
                <div class="control-group">
                    <label>Shadow Opacity (그림자): <span id="shadow-val">0.1</span></label>
                    <input type="range" id="shadow-opacity" min="0" max="0.5" step="0.01" value="0.1">
                </div>

                <textarea id="code-output" readonly></textarea>
            </div>

            <div class="preview-area">
                <div id="glass-preview">Glass Box</div>
            </div>
        </div>
    </main>
</div>

<script>
    const sidebar = document.getElementById('sidebar');
    function toggleSidebar() { sidebar.classList.toggle('active'); }
    document.getElementById('theme-toggle').addEventListener('click', () => { document.body.classList.toggle('light-mode'); });
    document.querySelector('.main-content').addEventListener('click', () => { if (sidebar.classList.contains('active')) { sidebar.classList.remove('active'); } });

    const blurInput = document.getElementById('blur');
    const opacityInput = document.getElementById('opacity');
    const radiusInput = document.getElementById('radius');
    const borderWidthInput = document.getElementById('border-width');
    const shadowOpacityInput = document.getElementById('shadow-opacity');

    const blurVal = document.getElementById('blur-val');
    const opacityVal = document.getElementById('opacity-val');
    const radiusVal = document.getElementById('radius-val');
    const borderVal = document.getElementById('border-val');
    const shadowVal = document.getElementById('shadow-val');

    const preview = document.getElementById('glass-preview');
    const codeOutput = document.getElementById('code-output');

    function updateStyle() {
        const blur = blurInput.value;
        const opacity = opacityInput.value;
        const radius = radiusInput.value;
        const borderWidth = borderWidthInput.value;
        const shadowOpacity = shadowOpacityInput.value;

        blurVal.innerText = blur;
        opacityVal.innerText = opacity;
        radiusVal.innerText = radius;
        borderVal.innerText = borderWidth;
        shadowVal.innerText = shadowOpacity;

        // 스타일 적용
        preview.style.background = `rgba(255, 255, 255, ${opacity})`;
        preview.style.backdropFilter = `blur(${blur}px)`;
        preview.style.webkitBackdropFilter = `blur(${blur}px)`;
        preview.style.borderRadius = `${radius}px`;
        preview.style.border = `${borderWidth}px solid rgba(255, 255, 255, 0.3)`;
        preview.style.boxShadow = `0 8px 32px 0 rgba(0, 0, 0, ${shadowOpacity})`;

        // CSS 코드 문자열 생성
        codeOutput.value = 
`background: rgba(255, 255, 255, ${opacity});
backdrop-filter: blur(${blur}px);
-webkit-backdrop-filter: blur(${blur}px);
border-radius: ${radius}px;
border: ${borderWidth}px solid rgba(255, 255, 255, 0.3);
box-shadow: 0 8px 32px 0 rgba(0, 0, 0, ${shadowOpacity});`;
    }

    blurInput.addEventListener('input', updateStyle);
    opacityInput.addEventListener('input', updateStyle);
    radiusInput.addEventListener('input', updateStyle);
    borderWidthInput.addEventListener('input', updateStyle);
    shadowOpacityInput.addEventListener('input', updateStyle);

    updateStyle();
</script>
</body>
</html>
