<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PSD & AI 파일 뷰어</title>
  
  <!-- 1. PSD 파서 라이브러리 (psd.js UMD) -->
  <script src="https://unpkg.com/psd/dist/psd.min.js"></script>
  
  <!-- 2. AI(PDF 호환 데이터) 파서 라이브러리 (PDF.js) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
      background-color: #f8f9fa;
      color: #333;
    }
    .upload-box {
      border: 2px dashed #ccc;
      padding: 30px;
      border-radius: 8px;
      background: #fff;
      margin-bottom: 20px;
    }
    #status {
      font-weight: bold;
      margin: 15px 0;
    }
    .canvas-container {
      margin-top: 20px;
      overflow: auto;
      background: #e9ecef;
      padding: 20px;
      border-radius: 8px;
      display: inline-block;
      max-width: 100%;
    }
    #resultImg, canvas {
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      background-color: #fff;
      max-width: 100%;
      height: auto;
      display: none;
    }
  </style>
</head>
<body>

  <h1>PSD / AI 파일 리더</h1>
  
  <div class="upload-box">
    <input type="file" id="fileInput" accept=".psd,.ai">
    <p style="color: #666; font-size: 0.9rem; margin-top: 8px;">
      Photoshop(.psd) 및 Illustrator(.ai) 파일을 업로드하세요.
    </p>
  </div>

  <div id="status">파일을 선택해주세요.</div>

  <div class="canvas-container">
    <img id="resultImg" alt="PSD 미리보기">
    <canvas id="viewCanvas"></canvas>
  </div>

  <script>
    // PDF.js 워커 세팅
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const canvas = document.getElementById('viewCanvas');
    const resultImg = document.getElementById('resultImg');
    const ctx = canvas.getContext('2d');

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const fileName = file.name.toLowerCase();
      status.innerText = '파일 분석 중...';
      
      // 화면 초기화
      canvas.style.display = 'none';
      resultImg.style.display = 'none';
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      try {
        if (fileName.endsWith('.psd')) {
          await renderPSD(file);
        } else if (fileName.endsWith('.ai')) {
          const arrayBuffer = await file.arrayBuffer();
          await renderAI(arrayBuffer);
        } else {
          status.innerText = '지원하지 않는 파일 형식입니다.';
        }
      } catch (err) {
        console.error(err);
        status.innerText = `에러 발생: ${err.message}`;
      }
    });

    // 1. PSD 파일 렌더링 (psd.js 파서 사용)
    function renderPSD(file) {
      return new Promise((resolve, reject) => {
        status.innerText = 'PSD 파싱 중...';
        
        if (typeof PSD === 'undefined') {
          reject(new Error('PSD 파서 라이브러리(PSD)를 불러오지 못했습니다.'));
          return;
        }

        const url = URL.createObjectURL(file);
        PSD.fromURL(url).then((psd) => {
          psd.parse();
          const image = psd.image.toPng(); // PNG 이미지 추출
          
          resultImg.src = image.src;
          resultImg.style.display = 'inline-block';
          status.innerText = `PSD 완료 (${psd.header.width} x ${psd.header.height} px)`;
          resolve();
        }).catch(reject);
      });
    }

    // 2. AI 파일 렌더링 (PDF.js 사용)
    async function renderAI(buffer) {
      status.innerText = 'AI 데이터 분석 중...';

      const loadingTask = pdfjsLib.getDocument({ data: buffer });
      const pdf = await loadingTask.promise;
      
      const page = await pdf.getPage(1);
      const viewport = page.getViewport({ scale: 1.5 });

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      const renderContext = {
        canvasContext: ctx,
        viewport: viewport
      };

      await page.render(renderContext).promise;
      canvas.style.display = 'inline-block';
      status.innerText = `AI 완료 (${Math.round(viewport.width)} x ${Math.round(viewport.height)} px)`;
    }
  </script>
</body>
</html>
