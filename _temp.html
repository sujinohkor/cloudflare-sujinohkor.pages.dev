<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Text Follower Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #202020;
            color: #fff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 100vh;
        }

        .workspace-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
        }

        .content-top {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .content-top label {
            color: #ff9e40;
            font-weight: bold;
        }
        .content-top input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #101010;
            border: 2px solid #ff9e40;
            border-radius: 16px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .content-mid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .content-mid label {
            color: #ff9e40;
            font-weight: bold;
        }
        .content-mid textarea {
            width: 100%;
            height: 100%;
            min-height: 250px;
            padding: 12px;
            background: #101010;
            border: 2px solid #ff9e40;
            border-radius: 16px;
            color: #00ff66;
            font-family: 'Consolas', monospace;
            font-size: 0.9rem;
            resize: none;
            outline: none;
        }

        .content-down-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }
        .content-down-wrapper label {
            color: #ff9e40;
            font-weight: bold;
        }
        .content-down {
            position: relative;
            flex: 1;
            min-height: 250px;
            border: 2px dashed #ff9e40;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 158, 64, 0.05);
            overflow: hidden;
            cursor: crosshair;
        }
        .content-down p {
            color: #888;
            font-size: 1.1rem;
            pointer-events: none;
            user-select: none;
        }

        .trail-char {
            position: absolute;
            pointer-events: none;
            font-weight: bold;
            color: #ff9e40;
            text-shadow: 0 0 5px rgba(255, 158, 64, 0.8);
            transition: transform 0.1s ease-out, opacity 0.2s ease;
            user-select: none;
            z-index: 100;
        }

        /* PC 레이아웃 (769px 이상) */
        @media (min-width: 769px) {
            .workspace-container {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }
            .content-mid {
                flex: 1;
            }
        }

        /* 모바일 레이아웃 (768px 이하) - Preview 영역 하단 확장 적용 */
        @media (max-width: 768px) {
            body {
                min-height: 100svh; /* 모바일 가상 뷰포트 높이 반영 */
            }
            .workspace-container {
                gap: 15px;
            }
            .content-mid {
                flex: initial; /* 모바일에서는 높이 고정 */
            }
            .content-mid textarea {
                height: 180px;
                min-height: 180px;
            }
            .content-down-wrapper {
                flex: 1; /* 남은 하단 공간을 모두 차지 */
            }
            .content-down {
                height: 100%;
                min-height: 200px;
            }
        }
    </style>
</head>
<body>

    <div class="content-top">
        <label for="text-input">마우스 뒤에 표시할 텍스트 입력</label>
        <input type="text" id="text-input" value="Hello World!" placeholder="글자를 입력하세요...">
    </div>

    <div class="workspace-container">
        <div class="content-mid">
            <label for="code-output">생성된 HTML 소스코드</label>
            <textarea id="code-output" readonly></textarea>
        </div>

        <div class="content-down-wrapper">
            <label>미리보기 (Preview)</label>
            <div class="content-down" id="preview-area">
                <p>이 영역 위에 마우스를 올리면 효과를 확인할 수 있습니다.</p>
            </div>
        </div>
    </div>

<script>
    const textInput = document.getElementById('text-input');
    const codeOutput = document.getElementById('code-output');
    const previewArea = document.getElementById('preview-area');

    let trailElements = [];
    let mousePos = { x: 0, y: 0 };
    let charPositions = [];

    function updateGeneratedCode(text) {
        const template = 
`<script>
(function() {
  const text = "${text}";
  const chars = [];
  let pos = { x: 0, y: 0 };
  let history = [];

  text.split('').forEach((ch, i) => {
    const el = document.createElement('span');
    el.style.cssText = 'position:fixed; pointer-events:none; color:#ff9e40; font-weight:bold; z-index:9999; transition:transform 0.1s ease-out;';
    el.textContent = ch === ' ' ? '\\u00A0' : ch;
    document.body.appendChild(el);
    chars.push(el);
    history.push({ x: 0, y: 0 });
  });

  window.addEventListener('mousemove', (e) => {
    pos.x = e.clientX;
    pos.y = e.clientY;
  });

  function render() {
    history.unshift({ ...pos });
    history.pop();
    chars.forEach((el, i) => {
      const p = history[Math.min(i * 3, history.length - 1)];
      el.style.transform = \`translate(\${p.x + (i * 12) + 15}px, \${p.y + 15}px)\`;
    });
    requestAnimationFrame(render);
  }
  render();
})();
<\/script>`;
        codeOutput.value = template;
    }

    function setupPreviewText(text) {
        trailElements.forEach(el => el.remove());
        trailElements = [];
        charPositions = [];

        const chars = text.split('');
        chars.forEach((ch, index) => {
            const span = document.createElement('span');
            span.className = 'trail-char';
            span.textContent = ch === ' ' ? '\u00A0' : ch;
            span.style.opacity = '0';
            previewArea.appendChild(span);
            trailElements.push(span);
            charPositions.push({ x: 0, y: 0 });
        });
    }

    textInput.addEventListener('input', (e) => {
        const val = e.target.value;
        updateGeneratedCode(val);
        setupPreviewText(val);
    });

    previewArea.addEventListener('mousemove', (e) => {
        const rect = previewArea.getBoundingClientRect();
        mousePos.x = e.clientX - rect.left;
        mousePos.y = e.clientY - rect.top;

        trailElements.forEach(el => el.style.opacity = '1');
    });

    previewArea.addEventListener('mouseleave', () => {
        trailElements.forEach(el => el.style.opacity = '0');
    });

    function animate() {
        let currentX = mousePos.x;
        let currentY = mousePos.y;

        for (let i = 0; i < trailElements.length; i++) {
            if (i === 0) {
                charPositions[i].x += (currentX + 12 - charPositions[i].x) * 0.3;
                charPositions[i].y += (currentY + 12 - charPositions[i].y) * 0.3;
            } else {
                const prev = charPositions[i - 1];
                charPositions[i].x += (prev.x + 12 - charPositions[i].x) * 0.3;
                charPositions[i].y += (prev.y - charPositions[i].y) * 0.3;
            }

            if (trailElements[i]) {
                trailElements[i].style.left = `${charPositions[i].x}px`;
                trailElements[i].style.top = `${charPositions[i].y}px`;
            }
        }
        requestAnimationFrame(animate);
    }

    updateGeneratedCode(textInput.value);
    setupPreviewText(textInput.value);
    animate();
</script>

</body>
</html>
