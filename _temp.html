<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HWPX Viewer & Editor</title>
    <link rel="icon" type="image/png" href="/assets/LOGO-orange.png">
    <!-- JSZip (HWPX 압축 해제용) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #202020; color: #fff; transition: background 0.3s; }
        .app-container { display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 250px; height: 100vh; position: fixed; left: 0; top: 0; background-color: #101010; padding: 20px; z-index: 1000; display: flex; flex-direction: column; transition: transform 0.3s ease; }
        .main-content { margin-left: 250px; padding: 40px; flex: 1; display: flex; flex-direction: column; height: 100vh; gap: 20px; overflow: hidden; transition: 0.3s; }
        
        .menu-btn, .theme-btn, .upload-btn { width: 100%; padding: 10px; margin-bottom: 10px; cursor: pointer; background: #202020; color: #ff9e40; border: 2px solid #ff9e40; border-radius: 50px; font-weight: bold; transition: all 0.3s; text-align: center; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
        .upload-btn { background: #ff9e40; color: #101010; }
        .upload-btn:hover { background: #e08b35; }
        .menu-btn:hover { background: #ff9e40; color: #101010; }
        
        .workspace-container { display: flex; flex-direction: column; flex: 1; min-height: 0; gap: 12px; }
        .content-mid-header { color: #ff9e40; font-weight: bold; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        
        /* 문서 뷰어 / 에디터 영역 */
        .editor-container-wrapper { position: relative; display: flex; width: 100%; flex: 1; min-height: 0; background: #141414; border: 2px solid #ff9e40; border-radius: 16px; overflow-y: auto; padding: 30px; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5); transition: background 0.3s, border-color 0.3s; }
        .placeholder { color: #666; text-align: center; margin: auto; font-family: 'Consolas', monospace; }
        
        /* HWPX 렌더링 스타일 */
        .hwp-p { margin-bottom: 12px; word-break: break-all; line-height: 1.6; color: #ddd; }
        .hwp-table { width: 100%; border-collapse: collapse; margin: 20px 0; background: #1c1c1c; }
        .hwp-table th, .hwp-table td { border: 1px solid #ff9e40; padding: 8px 12px; font-size: 0.9rem; color: #fff; vertical-align: middle; }
        .hwp-table th { background: rgba(255, 158, 64, 0.2); }

        /* 데이모드 스타일 */
        body.light-mode { background-color: #fff; color: #202020; }
        body.light-mode .sidebar { background-color: #FDF5E6; box-shadow: 4px 0 15px rgba(0, 0, 0, 0.05); }
        body.light-mode .menu-btn { background: #FDF5E6; color: #F38020; border-color: #F38020; }
        body.light-mode .menu-btn:hover { background: #F38020; color: #ffffff; }
        body.light-mode .upload-btn { background: #F38020; color: #ffffff; }
        body.light-mode .top-section h1, body.light-mode .top-section p { color: #202020; }
        body.light-mode .editor-container-wrapper { background: #e2e8f0 !important; border-color: #F38020; box-shadow: 0 10px 20px rgba(243, 128, 32, 0.15); }
        body.light-mode .hwp-p { color: #1e293b; }
        body.light-mode .hwp-table { background: #ffffff; }
        body.light-mode .hwp-table th, body.light-mode .hwp-table td { border-color: #cbd5e1; color: #0f172a; }
        body.light-mode .hwp-table th { background: #f1f5f9; }

        .menu-toggle-btn { display: none; position: fixed; bottom: 20px; left: 20px; z-index: 2000; padding: 10px 15px; background: #ff9e40; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; color: #fff; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-250px); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; }
            .menu-toggle-btn { display: block; }
        }
    </style>
</head>
<body>

<button class="menu-toggle-btn" onclick="toggleSidebar()">MENU</button>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <button class="menu-btn" onclick="location.href='../index'">Home</button>
        <button id="theme-toggle" class="menu-btn">DAY / NIGHT</button>
        <label class="upload-btn">
            📁 파일 열기
            <input type="file" id="hwpx-file" accept=".hwpx" style="display:none;">
        </label>
        <button class="menu-btn" onclick="location.reload()">Reset</button>
    </aside>

    <main class="main-content">
        <header class="top-section">
            <h1>HWPX Document Viewer</h1>
            <p>브라우저에서 안전하게 HWPX 파일의 텍스트와 표 구조를 렌더링합니다.</p>
        </header>

        <div class="workspace-container">
            <div class="content-mid-header">
                <span>Document Workspace</span>
            </div>
            <div class="editor-container-wrapper" id="output">
                <div class="placeholder">좌측 메뉴에서 [파일 열기] 버튼을 눌러 HWPX 파일을 선택해주세요.</div>
            </div>
        </div>
    </main>
</div>

<script>
    const sidebar = document.getElementById('sidebar');
    window.toggleSidebar = () => sidebar.classList.toggle('active');
    
    const themeToggle = document.getElementById('theme-toggle');
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('light-mode');
    });

    const fileInput = document.getElementById('hwpx-file');
    const outputBox = document.getElementById('output');

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        outputBox.innerHTML = '<div class="placeholder">HWPX 문서 구조와 표 병합 정보를 분석하는 중입니다...</div>';

        try {
            const zip = new JSZip();
            const zipContent = await zip.loadAsync(file);

            const sectionFiles = Object.keys(zipContent.files).filter(filename => 
                filename.startsWith('Contents/section') && filename.endsWith('.xml')
            );

            if (sectionFiles.length === 0) {
                outputBox.innerHTML = '<div class="placeholder" style="color: #ff6b6b;">유효한 HWPX 문서 구조를 찾을 수 없습니다.</div>';
                return;
            }

            let renderHTML = '';

            for (const filename of sectionFiles) {
                const xmlText = await zipContent.files[filename].async('text');
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
                
                const elements = xmlDoc.getElementsByTagName('*');
                let currentParagraphText = '';

                for (let node of elements) {
                    const localName = node.localName;

                    if (localName === 'p') {
                        if (currentParagraphText.trim() !== '') {
                            renderHTML += `<div class="hwp-p">${escapeHtml(currentParagraphText)}</div>`;
                            currentParagraphText = '';
                        }
                    } else if (localName === 't') {
                        if (node.textContent) {
                            currentParagraphText += node.textContent;
                        }
                    } else if (localName === 'tbl') {
                        if (currentParagraphText.trim() !== '') {
                            renderHTML += `<div class="hwp-p">${escapeHtml(currentParagraphText)}</div>`;
                            currentParagraphText = '';
                        }

                        renderHTML += '<table class="hwp-table">';
                        const cells = node.getElementsByTagName('*');
                        
                        for (let cell of cells) {
                            if (cell.localName === 'tr') {
                                renderHTML += '<tr>';
                            } else if (cell.localName === 'tc') {
                                let colSpan = '1';
                                let rowSpan = '1';
                                
                                const cellAddr = cell.getElementsByTagName('*');
                                for (let ca of cellAddr) {
                                    if (ca.localName === 'cellAddr' || ca.localName === 'cellSpan') {
                                        const cs = ca.getAttribute('colSpan') || ca.getAttribute('colspan');
                                        const rs = ca.getAttribute('rowSpan') || ca.getAttribute('rowspan');
                                        if (cs) colSpan = cs;
                                        if (rs) rowSpan = rs;
                                    }
                                }

                                let cellText = '';
                                const tNodes = cell.getElementsByTagName('*');
                                for (let tn of tNodes) {
                                    if (tn.localName === 't' && tn.textContent) {
                                        cellText += tn.textContent + ' ';
                                    }
                                }

                                let spanAttr = '';
                                if (parseInt(colSpan) >  1) spanAttr += ` colspan="${colSpan}"`;
                                if (parseInt(rowSpan) > 1) spanAttr += ` rowspan="${rowSpan}"`;

                                renderHTML += `<td${spanAttr}>${escapeHtml(cellText.trim())}</td>`;
                            }
                        }
                        renderHTML += '</table>';
                    }
                }

                if (currentParagraphText.trim() !== '') {
                    renderHTML += `<div class="hwp-p">${escapeHtml(currentParagraphText)}</div>`;
                }
            }

            outputBox.innerHTML = renderHTML ? renderHTML : '<div class="placeholder">추출할 내용이 없습니다.</div>';

        } catch (err) {
            console.error(err);
            outputBox.innerHTML = `<div class="placeholder" style="color: #ff6b6b;">파일을 읽는 중 오류가 발생했습니다: ${err.message}</div>`;
        } finally {
            fileInput.value = '';
        }
    });

    function escapeHtml(text) {
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }
</script>
</body>
</html>
