<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #101010; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .card { 
            background: #202020; 
            padding: 30px; 
            border-radius: 16px; 
            border: 2px solid #ff9e40; 
            width: 340px; 
            text-align: center; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        
        /* 도시 검색 영역 스타일 */
        .search-box {
            display: flex;
            gap: 6px;
            margin-bottom: 15px;
        }
        .search-input {
            flex: 1;
            padding: 8px 12px;
            background: #151515;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }
        .search-input:focus {
            border-color: #ff9e40;
        }
        .search-btn {
            padding: 8px 14px;
            background: #ff9e40;
            color: #101010;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
        }

        /* API 선택 버튼 스타일 */
        .api-switcher {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .api-btn {
            flex: 1;
            padding: 8px 0;
            background: #151515;
            color: #888;
            border: 1px solid #333;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .api-btn.active {
            background: #ff9e40;
            color: #101010;
            border-color: #ff9e40;
        }

        .city { font-size: 1.5rem; color: #ff9e40; font-weight: bold; margin-bottom: 10px; text-transform: capitalize; }
        .temp { font-size: 3rem; font-weight: bold; margin: 15px 0; }
        .desc { font-size: 1.1rem; color: #ccc; }
        .details { margin-top: 20px; font-size: 0.9rem; color: #888; display: flex; justify-content: space-around; }
    </style>
</head>
<body>

    <div class="card">
        <!-- 도시 검색 영역 -->
        <div class="search-box">
            <input type="text" id="city-input" class="search-input" placeholder="도시명 입력 (예: Tokyo, London)" value="Seoul" onkeydown="if(event.key==='Enter') searchCity()">
            <button class="search-btn" onclick="searchCity()">검색</button>
        </div>

        <!-- API 선택 스위처 -->
        <div class="api-switcher">
            <button class="api-btn active" id="btn-wttr" onclick="switchApi('wttr')">wttr.in</button>
            <button class="api-btn" id="btn-meteo" onclick="switchApi('meteo')">Open-Meteo</button>
        </div>

        <div class="city" id="city-name">Seoul</div>
        <div class="desc" id="weather-desc">불러오는 중...</div>
        <div class="temp" id="temp">--°C</div>
        <div class="details">
            <span id="detail-1">체감 --°C</span>
            <span id="detail-2">습도 --%</span>
        </div>
    </div>

    <script>
        let currentProvider = 'wttr';
        let currentCity = 'Seoul';

        // Open-Meteo WMO 코드 매핑
        function getWeatherDescription(code) {
            if (code === 0) return '맑음';
            if (code >= 1 && code <= 3) return '구름 조금/흐림';
            if (code >= 45 && code <= 48) return '안개';
            if (code >= 51 && code <= 67) return '비';
            if (code >= 71 && code <= 77) return '눈';
            if (code >= 80 && code <= 82) return '소나기';
            if (code >= 95) return '뇌우';
            return '흐림';
        }

        // 도시 이름으로 위도, 경도 좌표 구하기 (Open-Meteo 지오코딩 API 활용)
        async function getCoordinates(city) {
            const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`;
            const response = await fetch(url);
            const data = await response.json();

            if (!data.results || data.results.length === 0) {
                throw new Error('도시를 찾을 수 없습니다.');
            }

            return {
                latitude: data.results[0].latitude,
                longitude: data.results[0].longitude,
                name: data.results[0].name
            };
        }

        // wttr.in 데이터 로드
        async function fetchWttr(city) {
            const response = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`);
            if (!response.ok) throw new Error('wttr.in 데이터 조회 실패');
            const data = await response.json();
            const current = data.current_condition[0];

            return {
                temp: current.temp_C,
                desc: current.lang_kr?.[0]?.value || current.weatherDesc[0].value,
                detail1: `체감 ${current.FeelsLikeC}°C`,
                detail2: `습도 ${current.humidity}%`
            };
        }

        // Open-Meteo 데이터 로드
        async function fetchOpenMeteo(city) {
            const coords = await getCoordinates(city);
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${coords.latitude}&longitude=${coords.longitude}&current_weather=true&hourly=relativehumidity_2m`;
            
            const response = await fetch(url);
            if (!response.ok) throw new Error('Open-Meteo 데이터 조회 실패');
            const data = await response.json();
            const currentWeather = data.current_weather;
            const humidity = data.hourly.relativehumidity_2m[0];

            return {
                temp: Math.round(currentWeather.temperature),
                desc: getWeatherDescription(currentWeather.weathercode),
                detail1: `습도 ${humidity}%`,
                detail2: `풍속 ${currentWeather.windspeed}m/s`
            };
        }

        // 날씨 데이터 업데이트 실행 함수
        async function updateWeather() {
            document.getElementById('weather-desc').innerText = '불러오는 중...';
            document.getElementById('city-name').innerText = currentCity;

            try {
                let weatherData;
                if (currentProvider === 'wttr') {
                    weatherData = await fetchWttr(currentCity);
                } else {
                    weatherData = await fetchOpenMeteo(currentCity);
                }

                document.getElementById('temp').innerText = `${weatherData.temp}°C`;
                document.getElementById('weather-desc').innerText = weatherData.desc;
                document.getElementById('detail-1').innerText = weatherData.detail1;
                document.getElementById('detail-2').innerText = weatherData.detail2;
            } catch (error) {
                console.error('Failed to fetch weather data:', error);
                document.getElementById('weather-desc').innerText = '도시를 찾을 수 없음';
                document.getElementById('temp').innerText = '--°C';
                document.getElementById('detail-1').innerText = '체감 --°C';
                document.getElementById('detail-2').innerText = '습도 --%';
            }
        }

        // 도시 검색 처리
        function searchCity() {
            const input = document.getElementById('city-input').value.trim();
            if (!input) return;
            currentCity = input;
            updateWeather();
        }

        // 버튼 클릭 시 Provider 변경 및 UI 업데이트
        function switchApi(provider) {
            if (currentProvider === provider) return;
            
            currentProvider = provider;

            document.getElementById('btn-wttr').classList.toggle('active', provider === 'wttr');
            document.getElementById('btn-meteo').classList.toggle('active', provider === 'meteo');

            updateWeather();
        }

        // 최초 실행
        updateWeather();
    </script>
</body>
</html>
