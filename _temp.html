<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Speed Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #202020;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: #101010;
            border: 2px solid #ff9e40;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #ff9e40;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        p.desc {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .speed-display {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
        }

        .speed-box {
            background: #202020;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 15px;
            width: 45%;
        }

        .speed-box h3 {
            font-size: 0.85rem;
            color: #ff9e40;
            margin-bottom: 8px;
        }

        .speed-value {
            font-size: 1.4rem;
            font-weight: bold;
            color: #fff;
        }

        .unit {
            font-size: 0.75rem;
            color: #888;
        }

        .start-btn {
            width: 100%;
            padding: 12px;
            background: #ff9e40;
            color: #101010;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .start-btn:hover {
            background: #e08b35;
        }

        .start-btn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #ff9e40;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Speed Test</h1>
    <p class="desc">Check your download and upload speeds.</p>

    <div class="speed-display">
        <div class="speed-box">
            <h3>DOWNLOAD</h3>
            <div class="speed-value" id="download-speed">0.00</div>
            <div class="unit">Mbps</div>
        </div>
        <div class="speed-box">
            <h3>UPLOAD</h3>
            <div class="speed-value" id="upload-speed">0.00</div>
            <div class="unit">Mbps</div>
        </div>
    </div>

    <button class="start-btn" id="start-btn" onclick="startTest()">Start Test</button>
    <div class="status" id="status">Ready to test</div>
</div>

<script>
    async function startTest() {
        const startBtn = document.getElementById('start-btn');
        const statusEl = document.getElementById('status');
        const downloadEl = document.getElementById('download-speed');
        const uploadEl = document.getElementById('upload-speed');

        startBtn.disabled = true;
        downloadEl.textContent = '0.00';
        uploadEl.textContent = '0.00';

        try {
            // 1. 멀티스레드(병렬 요청) 다운로드 속도 측정
            statusEl.textContent = 'Measuring download speed...';
            
            const fileUrl = 'https://upload.wikimedia.org/wikipedia/commons/2/2d/Snake_River_%285mb%29.jpg';
            const concurrentRequests = 4; // 동시에 4개 연결
            
            const startTime = performance.now();
            
            const promises = Array.from({ length: concurrentRequests }, () => 
                fetch(fileUrl + '?cache=' + Math.random())
                    .then(res => res.blob())
            );

            const blobs = await Promise.all(promises);
            const endTime = performance.now();

            const durationInSeconds = (endTime - startTime) / 1000;
            const totalBytes = blobs.reduce((sum, blob) => sum + blob.size, 0);
            const totalBits = totalBytes * 8;
            
            const downloadSpeed = ((totalBits / durationInSeconds) / 1024 / 1024).toFixed(2);
            downloadEl.textContent = downloadSpeed;

            // 2. 업로드 속도 측정
            statusEl.textContent = 'Measuring upload speed...';
            
            const dataSizeInBytes = 2 * 1024 * 1024; // 2MB 더미 데이터
            const data = new Uint8Array(dataSizeInBytes);
            
            const uploadStartTime = performance.now();
            
            await fetch('https://httpbin.org/post', {
                method: 'POST',
                body: data
            });

            const uploadEndTime = performance.now();
            const uploadDuration = (uploadEndTime - uploadStartTime) / 1000;
            const uploadSizeInBits = dataSizeInBytes * 8;

            const uploadSpeed = ((uploadSizeInBits / uploadDuration) / 1024 / 1024).toFixed(2);
            uploadEl.textContent = uploadSpeed;

            statusEl.textContent = 'Test completed successfully!';
        } catch (err) {
            console.error(err);
            statusEl.textContent = 'Error occurred during the test.';
        } finally {
            startBtn.disabled = false;
        }
    }
</script>

</body>
</html>
