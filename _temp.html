<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Image Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #202020; color: #fff; height: 100vh; overflow: hidden; display: flex; }
        
        .sidebar { width: 250px; background-color: #101010; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .menu-btn { width: 100%; padding: 10px; cursor: pointer; background: #202020; color: #ff9e40; border: 2px solid #ff9e40; border-radius: 50px; font-weight: bold; text-align: center; text-decoration: none; }
        .menu-btn:hover { background: #ff9e40; color: #101010; }

        .main-content { flex: 1; padding: 20px; display: flex; flex-direction: column; height: 100vh; gap: 10px; }
        .editor-wrapper { flex: 1; border: 2px solid #ff9e40; border-radius: 16px; overflow: hidden; background: #141414; }
        
        /* Photopea <iframe> 스타일 */
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <a href="../index" class="menu-btn">Home</a>
        <button class="menu-btn" onclick="location.reload()">Reset</button>
    </aside>

    <main class="main-content">
        <h1>Online Image Editor (Powered by Photopea)</h1>
        <div class="editor-wrapper">
            <!-- Photopea 공식 iframe 삽입 -->
            <iframe src="https://www.photopea.com"></iframe>
        </div>
    </main>

</body>
</html>
