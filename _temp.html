<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 배경 제거</title>
</head>
<body>
  <h1>AI 배경 제거</h1>
  <input type="file" id="imageInput" accept="image/*">
  <br><br>
  <div id="status" style="font-weight: bold; color: #333;"></div>
  <br>
  <img id="resultImage" style="max-width: 500px; display: none;" alt="결과 이미지">

  <script type="module">
    import imglyRemoveBackground from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/+esm';

    const imageInput = document.getElementById('imageInput');
    const status = document.getElementById('status');
    const resultImage = document.getElementById('resultImage');

    imageInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      status.innerText = '준비 중...';
      resultImage.style.display = 'none';

      try {
        // progress 콜백을 추가해 진행 상태를 실시간으로 출력합니다.
        const blob = await imglyRemoveBackground(file, {
          progress: (key, current, total) => {
            if (total > 0) {
              const percent = Math.round((current / total) * 100);
              status.innerText = `[${key}] 진행 중... ${percent}% (${current}/${total})`;
            } else {
              status.innerText = `[${key}] 처리 중...`;
            }
          }
        });
        
        resultImage.src = URL.createObjectURL(blob);
        resultImage.style.display = 'block';
        status.innerText = '완료!';
      } catch (err) {
        console.error(err);
        status.innerText = `에러 발생: ${err.message}`;
      }
    });
  </script>
</body>
</html>
