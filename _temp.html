<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #101010; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .card { 
            background: #202020; 
            padding: 30px; 
            border-radius: 16px; 
            border: 2px solid #ff9e40; 
            width: 340px; 
            text-align: center; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        
        /* Search Box Style */
        .search-box {
            display: flex;
            gap: 6px;
            margin-bottom: 15px;
        }
        .search-input {
            flex: 1;
            padding: 8px 12px;
            background: #151515;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }
        .search-input:focus {
            border-color: #ff9e40;
        }
        .search-btn {
            padding: 8px 14px;
            background: #ff9e40;
            color: #101010;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
        }

        /* API Switcher Style */
        .api-switcher {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .api-btn {
            flex: 1;
            padding: 8px 0;
            background: #151515;
            color: #888;
            border: 1px solid #333;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .api-btn.active {
            background: #ff9e40;
            color: #101010;
            border-color: #ff9e40;
        }

        .city { font-size: 1.5rem; color: #ff9e40; font-weight: bold; margin-bottom: 10px; text-transform: capitalize; }
        .temp { font-size: 3rem; font-weight: bold; margin: 15px 0; }
        .desc { font-size: 1.1rem; color: #ccc; }
        .details { margin-top: 20px; font-size: 0.9rem; color: #888; display: flex; justify-content: space-around; }
    </style>
</head>
<body>

    <div class="card">
        <!-- Combo Box (Editable Dropdown) -->
        <div class="search-box">
            <input type="text" id="city-input" list="city-list" class="search-input" placeholder="Select or type city" value="Seoul" onchange="searchCity()" onkeydown="if(event.key==='Enter') searchCity()">
            <datalist id="city-list">
                <!-- Major Global Cities -->
                <option value="Seoul"></option>
                <option value="Tokyo"></option>
                <option value="New York"></option>
                <option value="London"></option>
                <option value="Paris"></option>
                <option value="Sydney"></option>
                <option value="Berlin"></option>
                <option value="Toronto"></option>
                <option value="Singapore"></option>
                <option value="Dubai"></option>
                <option value="Los Angeles"></option>
                <option value="Rome"></option>
            </datalist>
            <button class="search-btn" onclick="searchCity()">Search</button>
        </div>

        <!-- API Switcher -->
        <div class="api-switcher">
            <button class="api-btn active" id="btn-wttr" onclick="switchApi('wttr')">wttr.in</button>
            <button class="api-btn" id="btn-meteo" onclick="switchApi('meteo')">Open-Meteo</button>
        </div>

        <div class="city" id="city-name">Seoul</div>
        <div class="desc" id="weather-desc">Loading...</div>
        <div class="temp" id="temp">--°C</div>
        <div class="details">
            <span id="detail-1">Feels Like --°C</span>
            <span id="detail-2">Humidity --%</span>
        </div>
    </div>

    <script>
        let currentProvider = 'wttr';
        let currentCity = 'Seoul';

        // Open-Meteo WMO Code Mapping (English)
        function getWeatherDescription(code) {
            if (code === 0) return 'Clear sky';
            if (code >= 1 && code <= 3) return 'Partly cloudy';
            if (code >= 45 && code <= 48) return 'Fog';
            if (code >= 51 && code <= 67) return 'Drizzle / Rain';
            if (code >= 71 && code <= 77) return 'Snow fall';
            if (code >= 80 && code <= 82) return 'Rain showers';
            if (code >= 95) return 'Thunderstorm';
            return 'Overcast';
        }

        // Get Latitude & Longitude for Open-Meteo
        async function getCoordinates(city) {
            const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`;
            const response = await fetch(url);
            const data = await response.json();

            if (!data.results || data.results.length === 0) {
                throw new Error('City not found');
            }

            return {
                latitude: data.results[0].latitude,
                longitude: data.results[0].longitude,
                name: data.results[0].name
            };
        }

        // Fetch Data from wttr.in
        async function fetchWttr(city) {
            const response = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`);
            if (!response.ok) throw new Error('wttr.in request failed');
            const data = await response.json();
            const current = data.current_condition[0];

            return {
                temp: current.temp_C,
                desc: current.weatherDesc[0].value,
                detail1: `Feels Like ${current.FeelsLikeC}°C`,
                detail2: `Humidity ${current.humidity}%`
            };
        }

        // Fetch Data from Open-Meteo
        async function fetchOpenMeteo(city) {
            const coords = await getCoordinates(city);
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${coords.latitude}&longitude=${coords.longitude}&current_weather=true&hourly=relativehumidity_2m`;
            
            const response = await fetch(url);
            if (!response.ok) throw new Error('Open-Meteo request failed');
            const data = await response.json();
            const currentWeather = data.current_weather;
            const humidity = data.hourly.relativehumidity_2m[0];

            return {
                temp: Math.round(currentWeather.temperature),
                desc: getWeatherDescription(currentWeather.weathercode),
                detail1: `Humidity ${humidity}%`,
                detail2: `Wind ${currentWeather.windspeed}m/s`
            };
        }

        // Update UI
        async function updateWeather() {
            document.getElementById('weather-desc').innerText = 'Loading...';
            document.getElementById('city-name').innerText = currentCity;

            try {
                let weatherData;
                if (currentProvider === 'wttr') {
                    weatherData = await fetchWttr(currentCity);
                } else {
                    weatherData = await fetchOpenMeteo(currentCity);
                }

                document.getElementById('temp').innerText = `${weatherData.temp}°C`;
                document.getElementById('weather-desc').innerText = weatherData.desc;
                document.getElementById('detail-1').innerText = weatherData.detail1;
                document.getElementById('detail-2').innerText = weatherData.detail2;
            } catch (error) {
                console.error('Failed to fetch weather data:', error);
                document.getElementById('weather-desc').innerText = 'City Not Found';
                document.getElementById('temp').innerText = '--°C';
                document.getElementById('detail-1').innerText = 'Feels Like --°C';
                document.getElementById('detail-2').innerText = 'Humidity --%';
            }
        }

        // Search Action
        function searchCity() {
            const input = document.getElementById('city-input').value.trim();
            if (!input) return;

            currentCity = input;
            updateWeather();
        }

        // Switch Provider
        function switchApi(provider) {
            if (currentProvider === provider) return;
            
            currentProvider = provider;

            document.getElementById('btn-wttr').classList.toggle('active', provider === 'wttr');
            document.getElementById('btn-meteo').classList.toggle('active', provider === 'meteo');

            updateWeather();
        }

        // Initial Run
        updateWeather();
    </script>
</body>
</html>
