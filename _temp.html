<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Mini Dino Game</title>
    <style>
        body { text-align: center; background: #f7f7f7; padding-top: 50px; user-select: none; }
        canvas { background: #fff; border-bottom: 2px solid #535353; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Space 바 또는 화면을 클릭하여 점프하세요!</h2>
    <canvas id="game" width="600" height="200"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        // 공룡 객체
        const dino = {
            x: 50, y: 140, width: 30, height: 30,
            dy: 0, gravity: 0.45, jumpPower: -9.5, isGrounded: true
        };

        // 장애물(선인장) 배열
        let cactusArray = [];
        let score = 0;
        let isGameOver = false;

        function jump() {
            if (dino.isGrounded && !isGameOver) {
                dino.dy = dino.jumpPower;
                dino.isGrounded = false;
            }
        }

        // 키보드 점프 처리 (스크롤 방지 추가)
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                jump();
            }
        });

        // 마우스 클릭 / 터치 점프 처리
        window.addEventListener('click', jump);
        window.addEventListener('touchstart', (e) => {
            jump();
        });

        function spawnCactus() {
            // 기존: 0.01
            if (Math.random() < 0.007) { // 0.007 ~ 0.008 정도로 낮추면 간식이 적당해집니다.
                cactusArray.push({ x: 600, y: 140, width: 25, height: 30 });
            }
        }

        function update() {
            if (isGameOver) return;

            // 1. 공룡 물리 계산
            dino.dy += dino.gravity;
            dino.y += dino.dy;

            if (dino.y >= 140) {
                dino.y = 140;
                dino.dy = 0;
                dino.isGrounded = true;
            }

            // 2. 장애물 이동 및 충돌 검사
            spawnCactus();
            for (let i = cactusArray.length - 1; i >= 0; i--) {
                let c = cactusArray[i];
                c.x -= 2; //숫자가 작을수록 천천히 움직임

                const padding = 6;
                if (dino.x + padding < c.x + c.width - padding &&
                    dino.x + dino.width - padding > c.x + padding &&
                    dino.y + padding < c.y + c.height - padding &&
                    dino.y + dino.height - padding > c.y + padding) {
                    isGameOver = true;
                    setTimeout(() => {
                        alert(`Game Over! Score: ${Math.floor(score)}`);
                        location.reload();
                    }, 10);
                }

                if (c.x < -30) cactusArray.splice(i, 1);
            }

            score += 0.05;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 공룡 이모지 좌우 반전하여 그리기 (앞을 보도록 설정)
            ctx.save(); // 상태 저장
            ctx.translate(dino.x + dino.width, dino.y); // 공룡 위치로 기준점 이동
            ctx.scale(-1, 1); // 좌우 반전

            ctx.font = '30px Segoe UI Emoji, Apple Color Emoji, sans-serif';
            ctx.textBaseline = 'top';
            ctx.fillText('🦖', 0, 0);

            ctx.restore(); // 이전 상태 복원

            // 선인장 이모지 그리기
            cactusArray.forEach(c => {
                ctx.fillText('🌵', c.x, c.y);
            });

            // 점수 표시
            ctx.fillStyle = '#000';
            ctx.font = '16px monospace';
            ctx.fillText(`Score: ${Math.floor(score)}`, 480, 20);
        }

        function gameLoop() {
            update();
            draw();
            if (!isGameOver) requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
