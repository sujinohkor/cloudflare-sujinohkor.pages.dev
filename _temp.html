<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>누끼 따기</title>
</head>
<body>
  <h1>AI 배경 제거</h1>
  <input type="file" id="imageInput" accept="image/*">
  <br><br>
  <div id="status"></div>
  <img id="resultImage" style="max-width: 500px; display: none;">

  <script>
    const imageInput = document.getElementById('imageInput');
    const status = document.getElementById('status');
    const resultImage = document.getElementById('resultImage');

    // 2단계에서 생성된 본인의 Worker URL을 넣으세요.
    const WORKER_URL = 'https://remove-bg-worker.sujinohkor.workers.dev';

    imageInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      status.innerText = '누끼 따는 중... (약 1~2초 소요)';
      resultImage.style.display = 'none';

      // Worker로 보낼 폼 데이터 생성
      const formData = new FormData();
      formData.append('image', file);

      try {
        const response = await fetch(WORKER_URL, {
          method: 'POST',
          body: formData
        });
      
        if (!response.ok) {
          // Worker가 보내주는 에러 텍스트 읽어오기
          const errorText = await response.text();
          throw new Error(`[서버 에러 ${response.status}] ${errorText}`);
        }
      
        const blob = await response.blob();
        resultImage.src = URL.createObjectURL(blob);
        resultImage.style.display = 'block';
        status.innerText = '완료!';
      } catch (err) {
        console.error(err);
        // 원인을 화면에 상세히 표시
        status.innerText = `에러 발생: ${err.message}`;
      }
    });
  </script>
</body>
</html>
