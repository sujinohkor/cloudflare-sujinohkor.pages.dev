<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Mini Dino Game</title>
    <style>
        body { text-align: center; background: #f7f7f7; padding-top: 50px; }
        canvas { background: #fff; border-bottom: 2px solid #535353; }
    </style>
</head>
<body>
    <h2>Space 바를 눌러 점프하세요!</h2>
    <canvas id="game" width="600" height="200"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        // 공룡 객체 (크기와 물리 값 조정)
        const dino = {
            x: 50, y: 140, width: 30, height: 30,
            dy: 0, gravity: 0.4, jumpPower: -8, isGrounded: true
        };

        // 장애물(선인장) 배열
        let cactusArray = [];
        let score = 0;
        let isGameOver = false;

        // 점프 입력 처리
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && dino.isGrounded && !isGameOver) {
                dino.dy = dino.jumpPower;
                dino.isGrounded = false;
            }
        });

        function spawnCactus() {
            if (Math.random() < 0.01) { // 장애물 생성 확률 감소
                cactusArray.push({ x: 600, y: 140, width: 25, height: 30 });
            }
        }

        function update() {
            if (isGameOver) return;

            // 1. 공룡 물리 계산
            dino.dy += dino.gravity;
            dino.y += dino.dy;

            if (dino.y >= 140) { // 바닥 착지 위치
                dino.y = 140;
                dino.dy = 0;
                dino.isGrounded = true;
            }

            // 2. 장애물 이동 및 충돌 검사
            spawnCactus();
            for (let i = cactusArray.length - 1; i >= 0; i--) {
                let c = cactusArray[i];
                c.x -= 3; // 장애물 이동 속도 감소 (5 -> 3)

                // 이모지 여백 고려, 히트박스 보정 (-5px)
                const padding = 5;
                if (dino.x + padding < c.x + c.width - padding &&
                    dino.x + dino.width - padding > c.x + padding &&
                    dino.y + padding < c.y + c.height - padding &&
                    dino.y + dino.height - padding > c.y + padding) {
                    isGameOver = true;
                    alert(`Game Over! Score: ${Math.floor(score)}`);
                    location.reload();
                }

                if (c.x < -30) cactusArray.splice(i, 1);
            }

            score += 0.05; // 점수 증가 속도 완화
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 공룡 이모지 그리기
            ctx.font = '30px Segoe UI Emoji, Apple Color Emoji, sans-serif';
            ctx.textBaseline = 'top';
            ctx.fillText('🦖', dino.x, dino.y);

            // 선인장 이모지 그리기
            cactusArray.forEach(c => {
                ctx.fillText('🌵', c.x, c.y);
            });

            // 점수 표시
            ctx.fillStyle = '#000';
            ctx.font = '16px monospace';
            ctx.fillText(`Score: ${Math.floor(score)}`, 480, 20);
        }

        function gameLoop() {
            update();
            draw();
            if (!isGameOver) requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
