<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Mini Dino Game</title>
    <style>
        body { text-align: center; background: #f7f7f7; padding-top: 50px; }
        canvas { background: #fff; border-bottom: 2px solid #535353; }
    </style>
</head>
<body>
    <h2>Space 바를 눌러 점프하세요!</h2>
    <canvas id="game" width="600" height="200"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        // 공룡 객체
        const dino = {
            x: 50, y: 150, width: 20, height: 20,
            dy: 0, gravity: 0.6, jumpPower: -10, isGrounded: true
        };

        // 장애물(선인장) 배열
        let cactusArray = [];
        let score = 0;
        let isGameOver = false;

        // 점프 입력 처리
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && dino.isGrounded && !isGameOver) {
                dino.dy = dino.jumpPower;
                dino.isGrounded = false;
            }
        });

        function spawnCactus() {
            if (Math.random() < 0.015) { // 장애물 생성 확률
                cactusArray.push({ x: 600, y: 150, width: 15, height: 20 });
            }
        }

        function update() {
            if (isGameOver) return;

            // 1. 공룡 물리 계산
            dino.dy += dino.gravity;
            dino.y += dino.dy;

            if (dino.y >= 150) { // 바닥 착지
                dino.y = 150;
                dino.dy = 0;
                dino.isGrounded = true;
            }

            // 2. 장애물 이동 및 충돌 검사
            spawnCactus();
            for (let i = cactusArray.length - 1; i >= 0; i--) {
                let c = cactusArray[i];
                c.x -= 5; // 장애물 이동 속도

                // 간단한 사각형 충돌 판정 (AABB)
                if (dino.x < c.x + c.width &&
                    dino.x + dino.width > c.x &&
                    dino.y < c.y + c.height &&
                    dino.y + dino.height > c.y) {
                    isGameOver = true;
                    alert(`Game Over! Score: ${Math.floor(score)}`);
                    location.reload();
                }

                if (c.x < -20) cactusArray.splice(i, 1);
            }

            score += 0.1;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 공룡 그리기
            ctx.fillStyle = '#535353';
            ctx.fillRect(dino.x, dino.y, dino.width, dino.height);

            // 장애물 그리기
            ctx.fillStyle = '#ff4d4d';
            cactusArray.forEach(c => ctx.fillRect(c.x, c.y, c.width, c.height));

            // 점수 표시
            ctx.fillStyle = '#000';
            ctx.font = '16px monospace';
            ctx.fillText(`Score: ${Math.floor(score)}`, 500, 30);
        }

        function gameLoop() {
            update();
            draw();
            if (!isGameOver) requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
