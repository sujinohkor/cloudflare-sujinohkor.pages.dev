<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 배경 제거</title>
</head>
<body>
  <h1>AI 배경 제거</h1>
  <input type="file" id="imageInput" accept="image/*">
  <br><br>
  <div id="status"></div>
  <br>
  <img id="resultImage" style="max-width: 500px; display: none;" alt="결과 이미지">

  <!-- ES Module 방식으로 라이브러리를 직접 가져옵니다 -->
  <script type="module">
    import imglyRemoveBackground from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/+esm';

    const imageInput = document.getElementById('imageInput');
    const status = document.getElementById('status');
    const resultImage = document.getElementById('resultImage');

    imageInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      status.innerText = 'AI 모델을 불러오고 배경을 제거하는 중입니다... (최초 시도 시 약 5~10초 소요)';
      resultImage.style.display = 'none';

      try {
        // 배경 제거 실행
        const blob = await imglyRemoveBackground(file);
        
        // 결과를 화면에 표시
        resultImage.src = URL.createObjectURL(blob);
        resultImage.style.display = 'block';
        status.innerText = '완료!';
      } catch (err) {
        console.error(err);
        status.innerText = `에러 발생: ${err.message}`;
      }
    });
  </script>
</body>
</html>
