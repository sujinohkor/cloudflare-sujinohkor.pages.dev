<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #101010; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .card { 
            background: #202020; 
            padding: 30px; 
            border-radius: 16px; 
            border: 2px solid #ff9e40; 
            width: 320px; 
            text-align: center; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .city { font-size: 1.5rem; color: #ff9e40; font-weight: bold; margin-bottom: 10px; }
        .temp { font-size: 3rem; font-weight: bold; margin: 15px 0; }
        .desc { font-size: 1.1rem; color: #ccc; text-transform: capitalize; }
        .details { margin-top: 20px; font-size: 0.9rem; color: #888; display: flex; justify-content: space-around; }
        .loading { color: #888; }
    </style>
</head>
<body>

    <div class="card" id="weather-card">
        <div class="loading">날씨 정보를 불러오는 중...</div>
    </div>

    <script>
        // 1. OpenWeatherMap API Key 입력 (https://openweathermap.org 에서 무료 발급)
        const API_KEY = 'YOUR_OPENWEATHERMAP_API_KEY'; 
        const CITY = 'Seoul'; // 원하는 도시 이름

        async function getWeather() {
            const card = document.getElementById('weather-card');
            
            try {
                // OpenWeatherMap API 직접 호출
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&appid=${API_KEY}&units=metric&lang=kr`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                // 화면에 데이터 가공해서 렌더링
                card.innerHTML = `
                    <div class="city">${data.name}, ${data.sys.country}</div>
                    <div class="desc">${data.weather[0].description}</div>
                    <div class="temp">${Math.round(data.main.temp)}°C</div>
                    <div class="details">
                        <span>체감 ${Math.round(data.main.feels_like)}°C</span>
                        <span>습도 ${data.main.humidity}%</span>
                    </div>
                `;
            } catch (error) {
                console.error('Failed to fetch weather data:', error);
                card.innerHTML = `<div style="color: #ff4d4d;">날씨 정보를 불러올 수 없습니다.<br>API Key를 확인해주세요.</div>`;
            }
        }

        getWeather();
    </script>
</body>
</html>
