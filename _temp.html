<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PSD & AI 파일 뷰어</title>
  
  <!-- 1. PSD 파서 라이브러리 -->
  <script src="https://cdn.jsdelivr.net/npm/ag-psd/dist/bundle-min.js"></script>
  
  <!-- 2. AI(PDF 호환 데이터) 파서 라이브러리 (PDF.js) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
      background-color: #f8f9fa;
      color: #333;
    }
    .upload-box {
      border: 2px dashed #ccc;
      padding: 30px;
      border-radius: 8px;
      background: #fff;
      margin-bottom: 20px;
    }
    #status {
      font-weight: bold;
      margin: 15px 0;
    }
    .canvas-container {
      margin-top: 20px;
      overflow: auto;
      background: #e9ecef;
      padding: 20px;
      border-radius: 8px;
      display: inline-block;
      max-width: 100%;
    }
    canvas {
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      background-color: #fff; /* 투명 배경 확인용 */
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>

  <h1>PSD / AI 파일 리더</h1>
  
  <div class="upload-box">
    <input type="file" id="fileInput" accept=".psd,.ai">
    <p style="color: #666; font-size: 0.9rem; margin-top: 8px;">
      Photoshop(.psd) 및 Illustrator(.ai) 파일을 업로드하세요.
    </p>
  </div>

  <div id="status">파일을 선택해주세요.</div>

  <div class="canvas-container">
    <canvas id="viewCanvas"></canvas>
  </div>

  <script>
    // PDF.js 워커 세팅 (AI 파일 파싱 필수)
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const canvas = document.getElementById('viewCanvas');
    const ctx = canvas.getContext('2d');

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const fileName = file.name.toLowerCase();
      status.innerText = '파일 분석 중...';
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const arrayBuffer = await file.arrayBuffer();

      try {
        if (fileName.endsWith('.psd')) {
          renderPSD(arrayBuffer);
        } else if (fileName.endsWith('.ai')) {
          await renderAI(arrayBuffer);
        } else {
          status.innerText = '지원하지 않는 파일 형식입니다.';
        }
      } catch (err) {
        console.error(err);
        status.innerText = `에러 발생: ${err.message}`;
      }
    });

    // 1. PSD 파일 렌더링 함수
    function renderPSD(buffer) {
      status.innerText = 'PSD 파싱 중...';
      const psd = agPsd.readPsd(buffer);

      if (!psd.canvas) {
        throw new Error('PSD 내부 이미지 데이터를 읽을 수 없습니다.');
      }

      canvas.width = psd.width;
      canvas.height = psd.height;
      ctx.drawImage(psd.canvas, 0, 0);

      status.innerText = `PSD 완료 (${psd.width} x ${psd.height} px)`;
    }

    // 2. AI 파일 렌더링 함수 (내장 PDF 스트림 이용)
    async function renderAI(buffer) {
      status.innerText = 'AI 데이터 분석 중...';

      // AI 파일 내 내장된 PDF 로드
      const loadingTask = pdfjsLib.getDocument({ data: buffer });
      const pdf = await loadingTask.promise;
      
      // 첫 번째 페이지 추출
      const page = await pdf.getPage(1);
      const viewport = page.getViewport({ scale: 1.5 }); // 렌더링 해상도 배율

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      const renderContext = {
        canvasContext: ctx,
        viewport: viewport
      };

      await page.render(renderContext).promise;
      status.innerText = `AI 완료 (${Math.round(viewport.width)} x ${Math.round(viewport.height)} px)`;
    }
  </script>
</body>
</html>
