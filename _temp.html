<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>AI 배경 제거</title>
  <!-- 브라우저용 무료 AI 누끼 라이브러리 -->
  <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/index.js"></script>
</head>
<body>
  <h1>AI 배경 제거</h1>
  <input type="file" id="imageInput" accept="image/*">
  <br><br>
  <div id="status"></div>
  <img id="resultImage" style="max-width: 500px; display: none;">

  <script>
    const imageInput = document.getElementById('imageInput');
    const status = document.getElementById('status');
    const resultImage = document.getElementById('resultImage');

    imageInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      status.innerText = 'AI가 배경 제거 중입니다... (약 2~3초 소요)';
      resultImage.style.display = 'none';

      try {
        // 브라우저 내부 AI 로컬 실행 (서버/API 사용 안 함)
        const blob = await imglyRemoveBackground(file);
        
        resultImage.src = URL.createObjectURL(blob);
        resultImage.style.display = 'block';
        status.innerText = '완료!';
      } catch (err) {
        console.error(err);
        status.innerText = `에러 발생: ${err.message}`;
      }
    });
  </script>
</body>
</html>
