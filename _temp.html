<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Animation Generator</title>
    <link rel="icon" type="image/png" href="/assets/LOGO-orange.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #202020; color: #fff; transition: background 0.3s, color 0.3s; }
        
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { 
            width: 250px; height: 100vh; position: fixed; left: 0; top: 0; 
            background-color: #101010; padding: 20px; z-index: 1000; 
            display: flex; flex-direction: column; transition: transform 0.3s ease; 
        }
        
        .main-content { 
            margin-left: 250px; padding: 40px; flex: 1; 
            display: flex; flex-direction: column; min-height: 100vh; gap: 20px; transition: 0.3s; 
        }

        .workspace-container {
            display: flex;
            flex-direction: row;
            flex: 1;
            gap: 20px;
            min-height: 500px;
        }

        .menu-btn, .theme-btn { 
            width: 100%; padding: 10px; margin-bottom: 10px; cursor: pointer;
            background: #202020; color: #ff9e40; border: 2px solid #ff9e40; 
            border-radius: 50px; font-weight: bold; transition: all 0.3s; text-align: center;
        }
        .menu-btn:hover { background: #ff9e40; color: #101010; }
        .theme-btn:hover { background-color: #FDF5E6; color: #F38020; border-color: #FDF5E6; }

        /* 왼쪽: 미리보기 영역 */
        .preview-section {
            flex: 1; border: 2px solid #ff9e40; border-radius: 16px; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
            background: #1c1c1c; padding: 20px; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        #svg-preview-box {
            width: 100%;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 오른쪽: 컨트롤 및 소스 복사 영역 */
        .control-section {
            flex: 1; border: 2px solid #ff9e40; border-radius: 16px; display: flex; 
            flex-direction: column; padding: 20px; background: #1c1c1c; gap: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            overflow-y: auto;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-group label {
            font-size: 0.85rem;
            color: #ff9e40;
            font-weight: bold;
        }

        .control-group select, .control-group input {
            background: #252525;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 8px 12px;
            color: #fff;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .control-group select:focus, .control-group input:focus {
            outline: none;
            border-color: #ff9e40;
        }

        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .action-btn {
            background: #ff9e40;
            color: #101010;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .action-btn:hover {
            background: #e08b35;
        }

        .action-btn.secondary {
            background: #252525;
            color: #ff9e40;
            border: 1px solid #ff9e40;
        }

        .action-btn.secondary:hover {
            background: #ff9e40;
            color: #101010;
        }

        /* Light Mode */
        body.light-mode { background-color: #fff; color: #000; }
        body.light-mode .sidebar { background-color: #FDF5E6; box-shadow: 4px 0 15px rgba(0, 0, 0, 0.05); }
        body.light-mode .menu-btn, body.light-mode .theme-btn { background: #FDF5E6; color: #F38020; border-color: #F38020; }
        body.light-mode .menu-btn:hover { background: #F38020; color: #ffffff; }
        body.light-mode .theme-btn:hover { background-color: #202020; color: #ff9e40; }
        body.light-mode .preview-section, body.light-mode .control-section {
            background-color: #fafafa;
            border-color: #F38020;
            box-shadow: 0 10px 20px rgba(243, 128, 32, 0.15);
        }
        body.light-mode .control-group select, body.light-mode .control-group input {
            background: #fff; color: #000; border-color: #ccc;
        }
        body.light-mode .control-group label { color: #F38020; }

        .menu-toggle-btn { display: none; position: fixed; bottom: 20px; left: 20px; z-index: 2000; padding: 10px 15px; background: #ff9e40; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }

        @media (max-width: 850px) {
            .menu-toggle-btn { display: block; color: #ffffff; }
            .sidebar { transform: translateX(-250px); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; }
            .workspace-container { flex-direction: column; }
        }
    </style>
</head>
<body>

<button class="menu-toggle-btn" onclick="toggleSidebar()">MENU</button>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <button class="menu-btn" onclick="location.href='../index'">Home</button>
        <button id="theme-toggle" class="theme-btn">DAY / NIGHT</button>
        <div class="bottom-btns">
            <button class="menu-btn" onclick="resetConfig()">Reset</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-section">
            <h1>SVG Animation Generator</h1>
            <p>Customize shapes, colors, and animations, then download or copy web sources instantly.</p>
        </header>

        <div class="workspace-container">
            <!-- 왼쪽: 애니메이션 실시간 미리보기 -->
            <section class="preview-section">
                <div id="svg-preview-box"></div>
            </section>

            <!-- 오른쪽: 컨트롤 및 내보내기 -->
            <section class="control-section">
                <div class="control-group">
                    <label>Shape Type</label>
                    <select id="shape-type" onchange="updateAnimation()">
                        <option value="circle">Circle (원형)</option>
                        <option value="rect">Rectangle (사각형)</option>
                        <option value="polygon">Polygon (삼각형)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Animation Effect</label>
                    <select id="anim-effect" onchange="updateAnimation()">
                        <option value="spin">Rotation / Spin (회전)</option>
                        <option value="pulse">Pulse / Scale (크기 변동)</option>
                        <option value="bounce">Bounce / Move (상하 이동)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Base Color</label>
                    <input type="color" id="shape-color" value="#ff9e40" oninput="updateAnimation()">
                </div>

                <div class="control-group">
                    <label>Animation Speed (Seconds)</label>
                    <input type="number" id="anim-speed" value="2" min="0.5" max="10" step="0.5" oninput="updateAnimation()">
                </div>

                <div class="action-btns">
                    <button class="action-btn" onclick="downloadSVG()">Download SVG</button>
                    <button class="action-btn secondary" onclick="copySource('html')">Copy HTML</button>
                    <button class="action-btn secondary" onclick="copySource('markdown')">Copy Markdown</button>
                </div>
            </section>
        </div>
    </main>
</div>

<script>
    const sidebar = document.getElementById('sidebar');
    function toggleSidebar() { sidebar.classList.toggle('active'); }
    
    document.getElementById('theme-toggle').addEventListener('click', () => { 
        document.body.classList.toggle('light-mode'); 
    });

    function getSVGContent() {
        const shape = document.getElementById('shape-type').value;
        const effect = document.getElementById('anim-effect').value;
        const color = document.getElementById('shape-color').value;
        const speed = document.getElementById('anim-speed').value;

        let shapeTags = '';
        if (shape === 'circle') {
            shapeTags = `<circle cx="150" cy="150" r="60" fill="${color}" />`;
        } else if (shape === 'rect') {
            shapeTags = `<rect x="90" y="90" width="120" height="120" rx="15" fill="${color}" />`;
        } else if (shape === 'polygon') {
            shapeTags = `<polygon points="150,80 220,210 80,210" fill="${color}" />`;
        }

        let cssAnimation = '';
        if (effect === 'spin') {
            cssAnimation = `
                @keyframes spin {
                    0% { transform: rotate(0deg); transform-origin: center; }
                    100% { transform: rotate(360deg); transform-origin: center; }
                }
                .anim-target { animation: spin ${speed}s linear infinite; }
            `;
        } else if (effect === 'pulse') {
            cssAnimation = `
                @keyframes pulse {
                    0%, 100% { transform: scale(1); transform-origin: center; }
                    50% { transform: scale(1.25); transform-origin: center; }
                }
                .anim-target { animation: pulse ${speed}s ease-in-out infinite; }
            `;
        } else if (effect === 'bounce') {
            cssAnimation = `
                @keyframes bounce {
                    0%, 100% { transform: translateY(0); }
                    50% { transform: translateY(-30px); }
                }
                .anim-target { animation: bounce ${speed}s ease-in-out infinite; }
            `;
        }

        return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
    <style>
        ${cssAnimation}
    </style>
    <g class="anim-target">
        ${shapeTags}
    </g>
</svg>`;
    }

    function updateAnimation() {
        const previewBox = document.getElementById('svg-preview-box');
        previewBox.innerHTML = getSVGContent();
    }

    function downloadSVG() {
        const svgData = getSVGContent();
        const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'animated-graphic.svg';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    function copySource(type) {
        const svgData = getSVGContent();
        let textToCopy = '';

        if (type === 'html') {
            textToCopy = svgData;
        } else if (type === 'markdown') {
            const encoded = encodeURIComponent(svgData);
            textToCopy = `![Animated SVG](data:image/svg+xml;utf8,${encoded})`;
        }

        navigator.clipboard.writeText(textToCopy).then(() => {
            alert(`${type.toUpperCase()} source copied to clipboard!`);
        }).catch(err => {
            console.error('Failed to copy: ', err);
            alert('Failed to copy source.');
        });
    }

    function resetConfig() {
        document.getElementById('shape-type').value = 'circle';
        document.getElementById('anim-effect').value = 'spin';
        document.getElementById('shape-color').value = '#ff9e40';
        document.getElementById('anim-speed').value = '2';
        updateAnimation();
    }

    window.onload = function() {
        updateAnimation();
    };
</script>

</body>
</html>
