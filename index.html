<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUJIN's FUN SITE</title>
    <style>
        body { background: #101010; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; transition: background 0.3s, color 0.3s; }
        .container { width: 100%; max-width: 1200px; padding: 0 20px; box-sizing: border-box; }

        /* 헤더 정렬 */
        .header-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin: 30px 0;
        }
        .header-wrapper h1 { margin: 0; font-size: 1.8rem; }
        #theme-toggle {
            padding: 8px 16px; cursor: pointer; background: #202020; color: #ff9e40;
            border: 2px solid #ff9e40; border-radius: 20px;
        }

        /* 라이트 모드 */
        body.light-mode { background: #FFFFFF; color: #000000; }
        body.light-mode .card { background: #FDF5E6; }
        body.light-mode .card p { color: #555; }
        body.light-mode .highlight-text { color: #F38020; }
        body.light-mode #theme-toggle { background: #FDF5E6; color: #F38020; border-color: #F38020; }
        body.light-mode .arrow, body.light-mode .websites-list a, body.light-mode .websites-list h4 { color: #000000; }
        body.light-mode .card:hover { box-shadow: 0 10px 20px rgba(243, 128, 32, 0.3); }

        /* 카드 그리드 */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, 370px); justify-content: center; gap: 20px; margin-top: 50px; }
        .card { width: 370px; height: 200px; background: #202020; padding: 24px; border-radius: 12px; border: 2px solid transparent; transition: all 0.3s ease; cursor: pointer; box-sizing: border-box; }
        .card:hover { transform: translateY(-10px); border-color: #ff9e40; box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1); }
        .card h3 { margin: 0 0 5px 0; font-size: 1.25rem; }
        .card p { margin: 0 0 10px 0; color: #aaa; font-size: 0.9rem; }
        .icon { font-size: 2rem; margin-bottom: 10px; display: inline-block; }
        .arrow { display: inline-block; color: #ff9e40; font-weight: bold; }

        /* 웹사이트 섹션 */
        .websites-section { margin-top: 50px; text-align: center; }
        .websites-list { list-style: none; padding: 0; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .highlight-text { color: #ff9e40; }
        
        .typing-container { display: block; width: 90%; max-width: 600px; margin: 0 auto; }
        .typing-container img { width: 100%; height: auto; }

        @media (max-width: 600px) {
            .card-grid { grid-template-columns: 1fr; }
            .card { width: 100%; height: auto; display: flex; align-items: center; gap: 20px; border-radius: 50px; }
            .card p, .card .arrow { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="https://git.io/typing-svg" class="typing-container">
            <img src="https://readme-typing-svg.demolab.com?font=Fira+Code&size=25&pause=1000&color=FF9E40&center=true&vCenter=true&width=600&lines=Hi%2C+I+am+Sujin+Oh.;Thank+you+for+visiting+here.;This+is+my+FUN+site+for+coding+practice.;I+hope+you+enjoy+it+as+much+as+I+do." alt="Typing SVG" />
        </a>
        
        <div class="header-wrapper">
            <div style="flex:1;"></div> <!-- 제목 중앙 정렬용 균형잡이 -->
            <h1 class="highlight-text">SUJIN's FUN SITE</h1>
            <div style="flex:1; text-align: right;">
                <button id="theme-toggle">DAY / NIGHT</button>
            </div>
        </div>

        <div class="card-grid">
            <!-- 카드들... -->
            <a href="#" class="card"><div class="icon">W</div><h3>Word Counter</h3><p>word-counter</p><span class="arrow">Go to Word Counter →</span></a>
            <a href="#" class="card"><div class="icon">I</div><h3>Image to ASCII</h3><p>image-ascii</p><span class="arrow">Go to Image to ASCII →</span></a>
            <!-- 나머지 카드 생략 -->
        </div>

        <div class="websites-section">
            <h3 class="highlight-text">SUJIN's WEBSITES</h3>
            <ul class="websites-list">
                <li><h4><strong>Web.</strong> <a href="#">link</a></h4></li>
                <li><h4><strong>Dev.</strong> <a href="#">link</a></h4></li>
            </ul>
        </div>
    </div>

    <script>
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
        });
    </script>
</body>
</html>
