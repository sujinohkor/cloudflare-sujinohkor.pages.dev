<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUJIN's FUN SITE</title>
    <style>
        /* 1. Global Reset & Base */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #101010; color: #fff; font-family: 'Segoe UI', sans-serif; transition: background 0.3s, color 0.3s; }
        a { text-decoration: none; color: inherit; }
        
        /* 2. Layout Structure */
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .typing-container { display: block; width: 90%; max-width: 600px; margin: 20px auto 10px auto; }
        .typing-container img { width: 100%; height: auto; }
        
        /* 3. Header */
        .header-wrapper { 
            display: flex; align-items: center; justify-content: flex-end; 
            min-height: 80px; position: relative; 
        }
        .header-wrapper h1 { 
            position: absolute; left: 0; right: 0; text-align: center; 
            pointer-events: none; color: #ff9e40;
        }
        #theme-toggle { 
            z-index: 10; padding: 8px 16px; cursor: pointer; background: #202020; 
            color: #ff9e40; border: 2px solid #ff9e40; border-radius: 20px;
        }

        /* 4. Card Grid */
        .card-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, 370px); 
            justify-content: center; gap: 20px; margin-top: 30px; 
        }
        .card { 
            width: 370px; height: 200px; background: #202020; padding: 24px; 
            border-radius: 12px; border: 2px solid transparent; transition: all 0.3s ease;
        }
        .card:hover { transform: translateY(-10px); border-color: #ff9e40; box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        .icon { font-size: 2rem; margin-bottom: 10px; display: inline-block; transition: transform 0.3s; }
        .card:hover .icon { transform: rotate(-15deg) scale(1.1); }
        .card h3 { font-size: 1.25rem; margin-bottom: 5px; }
        .card p { color: #aaa; font-size: 0.9rem; margin-bottom: 10px; }
        .arrow { font-weight: bold; color: #ff9e40; transition: transform 0.3s; display: inline-block; }
        .card:hover .arrow { transform: translateX(10px); }

        /* 5. Websites Section */
        .websites-section { margin-top: 40px; text-align: center; }
        .highlight-text { color: #ff9e40; margin: 20px 0; }
        .websites-list { list-style: none; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .websites-list h4 { font-weight: normal; color: #ccc; }

        /* 6. Tooltip */
        .tooltip { position: relative; cursor: pointer; }
        .tooltip::after { 
            content: attr(data-tooltip); position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            background: #333; color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem;
            white-space: nowrap; opacity: 0; visibility: hidden; transition: 0.3s; border: 1px solid #ff9e40;
        }
        .tooltip:hover::after { opacity: 1; visibility: visible; top: -40px; }

        /* 7. Light Mode */
        body.light-mode { background: #fff; color: #000; }
        body.light-mode .card { background: #FDF5E6; }
        body.light-mode .card p { color: #555; }
        body.light-mode #theme-toggle { background: #FDF5E6; color: #F38020; border-color: #F38020; }
        body.light-mode .websites-list h4, body.light-mode .websites-list a { color: #000; }

        /* 8. Responsive */
        @media (max-width: 600px) {
            .card-grid { grid-template-columns: 1fr; }
            .card { width: 100%; height: auto; display: flex; align-items: center; gap: 15px; border-radius: 50px; }
            .card p, .card .arrow { display: none; }
            .websites-list { flex-direction: column; gap: 5px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="https://git.io/typing-svg" class="typing-container">
            <img src="https://readme-typing-svg.demolab.com?font=Fira+Code&size=25&pause=1000&color=FF9E40&center=true&vCenter=true&width=600&lines=Hi%2C+I+am+Sujin+Oh.;Thank+you+for+visiting+here.;This+is+my+FUN+site+for+coding+practice." alt="Typing SVG" />
        </a>
        
        <div class="header-wrapper">
            <h1 class="highlight-text">SUJIN's FUN SITE</h1>
            <button id="theme-toggle">DAY / NIGHT</button>
        </div>

        <div class="card-grid">
            <!-- 예시 카드 1개 (나머지 동일하게 적용 가능) -->
            <a href="#" class="card">
                <div class="icon">W</div>
                <h3>Word Counter</h3>
                <p>word-counter</p>
                <span class="arrow">Go to Word Counter →</span>
            </a>
            <!-- 카드들 반복 -->
        </div>

        <div class="websites-section">
            <h3 class="highlight-text">SUJIN's WEBSITES</h3>
            <ul class="websites-list">
                <li><h4><strong>Web.</strong> <a href="#" class="tooltip" data-tooltip="CV site">sujinohkor.kr</a></h4></li>
            </ul>
        </div>
    </div>

    <script>
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
        });
    </script>
</body>
</html>
