<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUJIN's TOOL ARCHIVE</title>
    <style>
        body { background: #111827; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; }
        
        /* 카드 레이아웃 스타일 */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { 
            background: #1e293b; padding: 24px; border-radius: 12px; border: 2px solid transparent;
            transition: all 0.3s ease; cursor: pointer;
        }
        
        /* 호버 효과 */
        .card:hover { transform: translateY(-10px); border-color: #3b82f6; }
        .card:hover .icon { transform: rotate(15deg) scale(1.1); }
        .card:hover .arrow { transform: translateX(10px); }

        .icon { font-size: 2rem; margin-bottom: 15px; transition: transform 0.3s ease; display: inline-block; }
        .arrow { display: inline-block; transition: transform 0.3s ease; color: #3b82f6; font-weight: bold; }
        
        a { text-decoration: none; color: inherit; }
        .highlight-text { color: #ff9e40; text-align: center; margin: 30px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="highlight-text">SUJIN's TOOL ARCHIVE</h1>
    
    <div class="card-grid">
        <!-- Word Counter 카드 예시 -->
        <a href="https://sujinohkor.pages.dev/tools/word-counter" class="card">
            <div class="icon">W</div>
            <h3>Word Counter</h3>
            <p>입력한 텍스트의 글자 수를 실시간으로 정확하게 계산합니다.</p>
            <span class="arrow">Word Counter 바로가기 →</span>
        </a>

        <!-- 필요에 따라 이 아래에 동일한 구조로 카드들을 추가하세요 -->
        <a href="https://sujinohkor.pages.dev/tools/image-ascii" class="card">
            <div class="icon">A</div>
            <h3>Image to ASCII</h3>
            <p>이미지를 ASCII 문자로 변환하여 독특한 아트를 만듭니다.</p>
            <span class="arrow">Image to ASCII 바로가기 →</span>
        </a>
    </div>
</div>

</body>
</html>
